  {id:79,en:"lattice",tr:"kafes yapısı, örgü, ızgara düzeni",syn:"grid, framework, mesh, structure",usage:"lattice structure / crystal lattice / lattice of relationships",examples:["The atoms are arranged in a regular crystal lattice.","The fence was made of a decorative wooden lattice.","Social networks can be mapped as a complex lattice of connections."],category:"İsim",mastery:0},
  {id:80,en:"ambiguity",tr:"belirsizlik, muğlaklık, çift anlamlılık",syn:"vagueness, uncertainty, obscurity",usage:"ambiguity in language / moral ambiguity / avoid ambiguity",examples:["The ambiguity of the instructions led to confusion.","Great literature often embraces ambiguity rather than resolving it.","Legal texts must be written carefully to avoid any ambiguity."],category:"İsim",mastery:0},
  {id:81,en:"occur",tr:"olmak, meydana gelmek, aklına gelmek",syn:"happen, take place, arise",usage:"occur frequently / occur to sb / errors occur",examples:["This phenomenon occurs naturally in tropical climates.","It suddenly occurred to her that she had forgotten the meeting.","Errors are most likely to occur when people are tired."],category:"Fiil",mastery:0},
  {id:82,en:"thrive",tr:"gelişmek, büyümek, serpilmek",syn:"flourish, prosper, bloom",usage:"thrive in an environment / thrive under pressure / businesses thrive",examples:["Some bacteria thrive in extremely hostile environments.","Creative industries tend to thrive in cities with strong cultural infrastructure.","Children thrive when they feel secure and supported."],category:"Fiil",mastery:0},
  {id:83,en:"verify",tr:"doğrulamak, teyit etmek, kanıtlamak",syn:"confirm, validate, check, authenticate",usage:"verify information / verify a claim / verify identity",examples:["Always verify the source before sharing information online.","The experiment was repeated three times to verify the results.","Journalists are required to verify facts before publishing."],category:"Fiil",mastery:0},
  {id:84,en:"validity",tr:"geçerlilik, doğruluk, sağlamlık",syn:"soundness, legitimacy, credibility",usage:"validity of an argument / research validity / question the validity",examples:["The validity of the study was questioned due to its small sample size.","Several scholars challenged the validity of the author's central claim.","Data validity is essential for reliable research conclusions."],category:"İsim",mastery:0},
  {id:85,en:"bias",tr:"önyargı, taraflılık, eğilim",syn:"prejudice, partiality, slant",usage:"cognitive bias / selection bias / biased towards / avoid bias",examples:["Confirmation bias leads people to seek information that supports their beliefs.","The study was criticised for its sampling bias.","Researchers must acknowledge potential sources of bias in their methodology."],category:"İsim",mastery:0},
  {id:86,en:"cause",tr:"neden olmak, yol açmak; neden, sebep; dava",syn:"bring about, trigger, result in; reason, motive",usage:"cause damage / cause concern / root cause / serve a cause",examples:["Deforestation is one of the main causes of climate change.","Lack of sleep can cause serious cognitive impairment.","She dedicated her life to the cause of social justice."],category:"Akademik",mastery:0},
  {id:87,en:"reveal",tr:"ortaya koymak, açığa çıkarmak, göstermek",syn:"disclose, uncover, expose, show",usage:"reveal findings / reveal the truth / the data reveals",examples:["The investigation revealed widespread corruption in the system.","Studies reveal a strong link between diet and mental health.","The author gradually reveals the protagonist's troubled past."],category:"Fiil",mastery:0},
  {id:88,en:"ensure",tr:"sağlamak, garantilemek, güvence altına almak",syn:"guarantee, secure, make certain",usage:"ensure accuracy / ensure compliance / ensure that...",examples:["Steps must be taken to ensure the safety of all participants.","The policy aims to ensure equal access to education.","Please ensure that all documents are submitted before the deadline."],category:"Fiil",mastery:0},
  {id:89,en:"plagiarism",tr:"intihal, fikir hırsızlığı",syn:"copying, intellectual theft, misappropriation",usage:"commit plagiarism / plagiarism detection / avoid plagiarism",examples:["The student was expelled for plagiarism.","Plagiarism detection software is now widely used in universities.","Proper citation is the best way to avoid plagiarism."],category:"İsim",mastery:0},
  {id:90,en:"confirm",tr:"doğrulamak, onaylamak, pekiştirmek",syn:"verify, validate, corroborate",usage:"confirm findings / confirm a booking / confirm that...",examples:["The second experiment confirmed the original hypothesis.","Please confirm your attendance by Friday.","These results confirm what earlier studies had suggested."],category:"Fiil",mastery:0},
  {id:91,en:"arrogant",tr:"kibirli, kendini beğenmiş, ukala",syn:"conceited, haughty, presumptuous",usage:"arrogant attitude / arrogant assumption / come across as arrogant",examples:["His arrogant dismissal of opposing views undermined his credibility.","It would be arrogant to assume we have all the answers.","She came across as arrogant, though she was simply very confident."],category:"Sıfat",mastery:0},
  {id:92,en:"clarify",tr:"açıklamak, netleştirmek, aydınlatmak",syn:"explain, elucidate, make clear",usage:"clarify a point / clarify meaning / clarify the situation",examples:["Could you clarify what you mean by that term?","The professor clarified the assignment requirements after class.","This section aims to clarify the distinction between the two concepts."],category:"Fiil",mastery:0},
  {id:93,en:"break into parts",tr:"parçalara bölmek, kısımlara ayırmak",syn:"decompose, segment, divide, analyse",usage:"break the argument / process / concept into parts",examples:["To understand the system, it helps to break it into parts.","The methodology breaks the research process into five distinct parts.","Breaking a complex problem into parts makes it easier to solve."],category:"Akademik",mastery:0},
  {id:94,en:"inaccurate",tr:"yanlış, hatalı, doğru olmayan",syn:"incorrect, erroneous, misleading, false",usage:"inaccurate data / inaccurate claim / factually inaccurate",examples:["The report contained several inaccurate figures.","It would be inaccurate to say that the policy had no effect.","Inaccurate translations can fundamentally distort a text's meaning."],category:"Sıfat",mastery:0},
  {id:95,en:"fabricate",tr:"uydurmak, icat etmek; üretmek, imal etmek",syn:"invent, make up, falsify; manufacture",usage:"fabricate evidence / fabricate a story / fabricate data",examples:["The witness had fabricated his entire testimony.","Scientists who fabricate data face serious professional consequences.","The components are fabricated in a factory and assembled on site."],category:"Fiil",mastery:0},
  {id:96,en:"commodities",tr:"mallar, emtialar, ticari ürünler",syn:"goods, products, merchandise, raw materials",usage:"agricultural/natural commodities / commodity prices / trade commodities",examples:["Oil and gold are among the world's most traded commodities.","Rising commodity prices have increased the cost of production.","The global commodity market is highly sensitive to political instability."],category:"İsim",mastery:0},
  {id:97,en:"audience",tr:"izleyici, dinleyici kitlesi; hedef kitle; kabul",syn:"viewers, listeners, readership, public",usage:"target audience / reach an audience / engage the audience",examples:["The speaker struggled to maintain the audience's attention.","Every piece of writing should be tailored to its intended audience.","The film attracted a global audience of over 50 million."],category:"İsim",mastery:0},
  {id:98,en:"facilitate",tr:"kolaylaştırmak, mümkün kılmak, sağlamak",syn:"enable, assist, support, promote",usage:"facilitate learning / facilitate communication / facilitate access",examples:["Technology can facilitate communication across vast distances.","The new policy aims to facilitate access to affordable housing.","The mediator helped to facilitate a productive dialogue between the two sides."],category:"Fiil",mastery:0},
  {id:99,en:"assessment",tr:"değerlendirme, ölçme, biçme",syn:"evaluation, appraisal, judgment, review",usage:"risk/performance assessment / carry out an assessment / self-assessment",examples:["A thorough assessment of the situation is needed before acting.","Students are required to complete a self-assessment at the end of each module.","The environmental impact assessment took over a year to complete."],category:"İsim",mastery:0},
  {id:100,en:"appropriation",tr:"tahsis; el koyma; kültürel sahiplenme",syn:"allocation, seizure; cultural borrowing",usage:"cultural appropriation / appropriation of funds / land appropriation",examples:["The film sparked debate about cultural appropriation.","The government approved the appropriation of funds for public housing.","Critics accused the brand of the appropriation of indigenous symbols."],category:"İsim",mastery:0},
  {id:101,en:"consider",tr:"düşünmek, göz önünde bulundurmak, hesaba katmak",syn:"take into account, reflect on, weigh up",usage:"consider the implications / consider whether / consider all options",examples:["We must consider the long-term consequences of this decision.","The committee will consider all applications before deciding.","Have you considered the possibility that the data might be flawed?"],category:"Fiil",mastery:0},
  {id:102,en:"signify",tr:"anlamına gelmek, belirtmek, işaret etmek",syn:"indicate, denote, mean, represent",usage:"signify a change / signify that... / what does X signify?",examples:["A red light signifies danger in most cultures.","This shift in tone signifies a change in the author's perspective.","The results signify a breakthrough in the treatment of the disease."],category:"Fiil",mastery:0},
  {id:103,en:"demonstrate",tr:"kanıtlamak, göstermek, ortaya koymak",syn:"show, prove, illustrate, exhibit",usage:"demonstrate that / demonstrate a skill / demonstrate clearly",examples:["The experiment clearly demonstrates the relationship between the two variables.","She demonstrated remarkable leadership under difficult circumstances.","Research has demonstrated that early intervention is highly effective."],category:"Fiil",mastery:0},
  {id:104,en:"indicate",tr:"göstermek, belirtmek, işaret etmek",syn:"show, suggest, point to, signal",usage:"indicate a trend / the data indicates / indicate that...",examples:["The survey results indicate a growing distrust of institutions.","Early signs indicate that the treatment is working.","The arrow indicates the direction of the current."],category:"Fiil",mastery:0},
  {id:105,en:"examine",tr:"incelemek, analiz etmek, sorgulamak",syn:"investigate, analyse, scrutinise, explore",usage:"examine evidence / examine the relationship / examine in detail",examples:["This chapter examines the causes of the financial crisis.","The doctor examined the patient thoroughly before making a diagnosis.","It is important to examine our own assumptions critically."],category:"Fiil",mastery:0},
  {id:106,en:"touch on",tr:"değinmek, kısaca ele almak",syn:"mention briefly, refer to, cover lightly",usage:"touch on a topic / touch on the key issues / briefly touch on",examples:["The lecture only touched on the surface of this complex issue.","Her essay touches on several key themes without exploring any in depth.","I'd like to touch on one final point before concluding."],category:"Akademik",mastery:0},
  {id:107,en:"mere",tr:"sadece, yalnızca, salt, basit",syn:"only, simply, nothing more than",usage:"a mere suggestion / mere coincidence / merely (adverb form)",examples:["It was a mere coincidence that they arrived at the same time.","The cost is a mere fraction of what it would have been ten years ago.","His objection was a mere formality — the decision had already been made."],category:"Sıfat",mastery:0},
  {id:108,en:"drawing on",tr:"yararlanarak, başvurarak, -den ilham alarak",syn:"using, building on, utilising, referencing",usage:"drawing on research / drawing on personal experience / drawing on evidence",examples:["Drawing on a wide range of sources, the author builds a compelling case.","The policy was developed drawing on best practices from several countries.","She delivered the speech drawing on her decades of experience."],category:"Akademik",mastery:0},
  {id:109,en:"assert",tr:"ileri sürmek, iddia etmek, savunmak",syn:"claim, argue, maintain, contend",usage:"assert that / assert a position / assert one's rights",examples:["The author asserts that economic inequality is the root cause of social unrest.","She confidently asserted her right to be heard at the meeting.","Critics assert that the study's methodology is fundamentally flawed."],category:"Fiil",mastery:0},
  {id:110,en:"estimate",tr:"tahmin etmek, hesaplamak; tahmin",syn:"calculate roughly, approximate, gauge",usage:"estimate the cost / estimate that... / rough estimate",examples:["Experts estimate that the project will take three years to complete.","It is estimated that over one billion people lack access to clean water.","The initial estimate proved to be wildly inaccurate."],category:"Akademik",mastery:0},
  {id:111,en:"maintain",tr:"sürdürmek, korumak; savunmak, iddia etmek",syn:"keep up, sustain, preserve; argue, claim",usage:"maintain standards / maintain that... / maintain a position",examples:["It is difficult to maintain motivation over a long period.","She has consistently maintained that the decision was the correct one.","The government maintains that the policy has been a success."],category:"Fiil",mastery:0},
  {id:112,en:"convince",tr:"ikna etmek, inandırmak, kandırmak",syn:"persuade, win over, assure",usage:"convince sb of sth / convince sb to do sth / hard to convince",examples:["It took considerable effort to convince the committee to change its decision.","The evidence convinced even the most sceptical observers.","She convinced herself that everything would work out fine."],category:"Fiil",mastery:0},
  {id:113,en:"underestimate",tr:"küçümsemek, hafife almak, yanlış değerlendirmek",syn:"undervalue, misjudge, downplay",usage:"underestimate the difficulty / underestimate sb / not to be underestimated",examples:["Politicians often underestimate the public's ability to understand complex issues.","Never underestimate the power of small, consistent actions.","The researchers underestimated the time needed for data collection."],category:"Fiil",mastery:0},
  // ── YENİ AKADEMİK KELİMELER ────────────────────────────────
  {id:114,en:"undermine",tr:"zayıflatmak, baltalamak, temelini sarsmak",syn:"weaken, erode, compromise, sabotage",usage:"undermine authority / credibility / confidence / an argument",examples:["Constant criticism can undermine a child's self-confidence.","The scandal seriously undermined the government's authority.","Such flawed methodology undermines the validity of the entire study."],category:"Fiil",mastery:0},
  {id:115,en:"empirical",tr:"deneysel, gözleme dayalı, ampirik",syn:"observational, experimental, evidence-based, factual",usage:"empirical evidence / data / research / study",examples:["The theory is supported by a substantial body of empirical evidence.","Empirical research relies on observation rather than pure speculation.","There is little empirical data to support this hypothesis."],category:"Sıfat",mastery:0},
  {id:116,en:"hypothesis",tr:"hipotez, varsayım, kuramsal öngörü",syn:"theory, assumption, proposition, supposition",usage:"formulate / test / support / reject a hypothesis",examples:["The researchers tested their hypothesis through a series of controlled experiments.","The data failed to support the original hypothesis.","A good hypothesis must be both specific and testable."],category:"İsim",mastery:0},
  {id:117,en:"paradigm",tr:"paradigma, düşünsel çerçeve, örnek model",syn:"model, framework, pattern, standard",usage:"paradigm shift / dominant paradigm / new paradigm",examples:["The discovery led to a paradigm shift in modern physics.","This book challenges the dominant paradigm in economic thought.","We need a new paradigm for understanding human behaviour in the digital age."],category:"Akademik",mastery:0},
  {id:118,en:"corroborate",tr:"doğrulamak, desteklemek, pekiştirmek",syn:"confirm, support, verify, substantiate",usage:"corroborate evidence / a claim / a theory / findings",examples:["Several witnesses corroborated her version of events.","These new findings corroborate earlier research on the subject.","Without additional data to corroborate the claim, it remains speculative."],category:"Fiil",mastery:0},
  // ── YDS / YÖKDİL ÇIKMIŞ KELİMELER (2010-2026 derlemesi) ──
  {id:119,en:"attribute",tr:"atfetmek, bağlamak, isnat etmek",syn:"ascribe, credit, assign",usage:"attribute X to Y / be attributed to",examples:["Scientists attribute the recent climate shift to human activity.","Her success can largely be attributed to perseverance.","The painting is attributed to a 17th-century Dutch artist."],category:"Fiil",mastery:0},
  {id:120,en:"mitigate",tr:"hafifletmek, azaltmak, yumuşatmak",syn:"alleviate, lessen, ease, reduce",usage:"mitigate the effects / risk / damage / impact",examples:["New regulations were introduced to mitigate the impact of pollution.","Vaccination programmes mitigate the spread of infectious diseases.","Nothing could mitigate the severity of the punishment."],category:"Fiil",mastery:0},
  {id:121,en:"exacerbate",tr:"kötüleştirmek, ağırlaştırmak, daha kötü hale getirmek",syn:"worsen, aggravate, intensify",usage:"exacerbate a problem / situation / tension / illness",examples:["Cutting the budget will only exacerbate the existing crisis.","Stress can exacerbate symptoms of chronic illness.","His careless remarks exacerbated the diplomatic tension."],category:"Fiil",mastery:0},
  {id:122,en:"exemplify",tr:"örneklendirmek, en iyi örneği olmak",syn:"illustrate, embody, typify, represent",usage:"exemplify a quality / an approach / a trend",examples:["Her career exemplifies the challenges faced by women in science.","This study exemplifies the kind of rigorous research we need.","The building exemplifies modernist architecture at its finest."],category:"Fiil",mastery:0},
  {id:123,en:"circumvent",tr:"atlatmak, dolanmak, kuralları aşmak",syn:"bypass, evade, sidestep, get around",usage:"circumvent a rule / restriction / law / problem",examples:["The company found ways to circumvent the new regulations.","Engineers designed the route to circumvent the wetlands.","You cannot simply circumvent the standard procedures."],category:"Fiil",mastery:0},
  {id:124,en:"delineate",tr:"ana hatlarıyla belirtmek, sınırlarını çizmek, betimlemek",syn:"outline, describe, define, sketch",usage:"delineate boundaries / responsibilities / a plan / a strategy",examples:["The contract clearly delineates each party's responsibilities.","The author delineates a vivid portrait of post-war Europe.","Roles within the team must be carefully delineated."],category:"Fiil",mastery:0},
  {id:125,en:"counteract",tr:"karşı koymak, etkisini gidermek, dengelemek",syn:"offset, neutralise, counter, oppose",usage:"counteract the effects / influence / damage",examples:["Antioxidants help counteract the damage caused by free radicals.","The government took measures to counteract rising inflation.","Exercise can counteract the negative effects of a sedentary lifestyle."],category:"Fiil",mastery:0},
  {id:126,en:"precipitate",tr:"hızlandırmak, tetiklemek, yol açmak",syn:"trigger, provoke, hasten, bring about",usage:"precipitate a crisis / conflict / decision / collapse",examples:["The assassination precipitated the outbreak of war.","His resignation precipitated a leadership crisis.","Severe drought precipitated mass migration to urban areas."],category:"Fiil",mastery:0},
  {id:127,en:"discern",tr:"ayırt etmek, fark etmek, sezmek",syn:"perceive, detect, distinguish, recognise",usage:"discern a difference / pattern / motive",examples:["It is difficult to discern any clear pattern in the data.","She discerned a faint smile on his otherwise serious face.","Researchers can now discern subtle differences between cell types."],category:"Fiil",mastery:0},
  {id:128,en:"constitute",tr:"oluşturmak, teşkil etmek, anlamına gelmek",syn:"make up, comprise, form, represent",usage:"constitute a majority / threat / violation / problem",examples:["Women constitute over 60% of the workforce in this sector.","Such behaviour constitutes a serious breach of contract.","These findings constitute strong evidence for the theory."],category:"Fiil",mastery:0},
  {id:129,en:"devise",tr:"tasarlamak, geliştirmek, icat etmek",syn:"design, invent, formulate, conceive",usage:"devise a plan / strategy / method / solution",examples:["Researchers devised a new method for measuring brain activity.","She devised a clever strategy to win the negotiation.","The system was devised to detect fraudulent transactions."],category:"Fiil",mastery:0},
  {id:130,en:"underpin",tr:"desteklemek, temelini oluşturmak, dayanak olmak",syn:"support, reinforce, substantiate, buttress",usage:"underpin a theory / argument / economy / belief",examples:["Strong empirical evidence underpins this theory.","Trust underpins every successful long-term relationship.","Government subsidies underpin the agricultural sector."],category:"Fiil",mastery:0},
  {id:131,en:"align",tr:"hizalamak, uyumlu hale getirmek, aynı çizgide olmak",syn:"match, coordinate, conform, line up",usage:"align with / align goals / interests / values",examples:["Our policies must align with international standards.","The new strategy aligns the company's goals with customer needs.","Several countries aligned themselves with the new coalition."],category:"Fiil",mastery:0},
  {id:132,en:"address",tr:"ele almak, müdahale etmek, hitap etmek",syn:"tackle, deal with, confront, handle",usage:"address an issue / a problem / concerns / the audience",examples:["The committee will address these concerns at next week's meeting.","We must urgently address the root causes of inequality.","She addressed the conference with a powerful opening speech."],category:"Fiil",mastery:0},
  {id:133,en:"emanate",tr:"yayılmak, kaynaklanmak, çıkmak",syn:"originate, issue, flow, radiate",usage:"emanate from / emanate authority / confidence",examples:["A faint smell of smoke was emanating from the kitchen.","Her quiet authority seemed to emanate from years of experience.","The new policy emanated from a desire to improve transparency."],category:"Fiil",mastery:0},
  {id:134,en:"arbitrary",tr:"keyfi, rastgele, gelişigüzel",syn:"random, capricious, indiscriminate, whimsical",usage:"arbitrary decision / rule / power / number",examples:["The selection process appeared completely arbitrary.","Citizens criticised the arbitrary use of executive power.","Choosing this date was somewhat arbitrary, but it had to be done."],category:"Sıfat",mastery:0},
  {id:135,en:"compelling",tr:"inandırıcı, çürütülemez, ilgi çekici",syn:"convincing, persuasive, gripping, forceful",usage:"compelling evidence / argument / reason / story",examples:["The lawyer presented compelling evidence to the jury.","She made a compelling case for additional research funding.","It's a compelling novel that I couldn't put down."],category:"Sıfat",mastery:0},
  {id:136,en:"cumbersome",tr:"hantal, kullanışsız, ağır işleyen",syn:"unwieldy, awkward, burdensome, inefficient",usage:"cumbersome process / procedure / system / equipment",examples:["The current bureaucratic procedures are slow and cumbersome.","The old machine was cumbersome and difficult to operate.","Filing taxes manually is a cumbersome task."],category:"Sıfat",mastery:0},
  {id:137,en:"indispensable",tr:"vazgeçilmez, mutlak gerekli, olmazsa olmaz",syn:"essential, vital, crucial, irreplaceable",usage:"indispensable to / for sb / sth",examples:["Smartphones have become indispensable in modern life.","Her experience makes her indispensable to the team.","Clean water is indispensable for human survival."],category:"Sıfat",mastery:0},
  {id:138,en:"coherent",tr:"tutarlı, mantıksal bütünlük taşıyan, anlaşılır",syn:"logical, consistent, intelligible, organised",usage:"coherent argument / strategy / plan / explanation",examples:["The author presents a coherent argument throughout the book.","The team lacks a coherent strategy for the next quarter.","Her response was clear, coherent and well-reasoned."],category:"Sıfat",mastery:0},
  {id:139,en:"ambiguous",tr:"belirsiz, çift anlamlı, muğlak",syn:"unclear, vague, equivocal, obscure",usage:"ambiguous statement / wording / message / situation",examples:["The wording of the contract is deliberately ambiguous.","His ambiguous response left everyone confused.","The results of the study remain ambiguous."],category:"Sıfat",mastery:0},
  {id:140,en:"ubiquitous",tr:"her yerde bulunan, yaygın, her tarafta olan",syn:"omnipresent, pervasive, universal, widespread",usage:"ubiquitous presence / phenomenon / use",examples:["Smartphones have become ubiquitous in modern society.","Plastic pollution is now ubiquitous in the world's oceans.","Surveillance cameras are ubiquitous in major cities."],category:"Sıfat",mastery:0},
  {id:141,en:"contentious",tr:"tartışmalı, ihtilaflı, münakaşa yaratan",syn:"controversial, disputed, debatable, divisive",usage:"contentious issue / topic / debate / point",examples:["Immigration remains a deeply contentious political issue.","The proposal sparked a contentious debate among scholars.","She avoided contentious topics during the dinner."],category:"Sıfat",mastery:0},
  {id:142,en:"negligible",tr:"önemsiz, ihmal edilebilir, göz ardı edilebilir",syn:"insignificant, minimal, trivial, minor",usage:"negligible amount / effect / impact / difference",examples:["The difference between the two methods is negligible.","Side effects of the medication were largely negligible.","The risk to public health is considered negligible."],category:"Sıfat",mastery:0},
  {id:143,en:"salient",tr:"önemli, göze çarpan, dikkat çekici",syn:"prominent, conspicuous, notable, striking",usage:"salient feature / point / aspect / characteristic",examples:["Let's focus on the salient points of the report.","The most salient feature of the design is its simplicity.","She summarised the salient arguments in two sentences."],category:"Sıfat",mastery:0},
  {id:144,en:"inherent",tr:"doğasında olan, özünde bulunan, ayrılmaz",syn:"intrinsic, innate, fundamental, built-in",usage:"inherent in / inherent risk / problem / quality",examples:["There are inherent risks in any extreme sport.","Curiosity is inherent in young children.","The contradictions are inherent in the system itself."],category:"Sıfat",mastery:0},
  {id:145,en:"pervasive",tr:"yaygın, sirayet eden, her yere nüfuz eden",syn:"widespread, prevailing, all-pervading, ubiquitous",usage:"pervasive influence / problem / sense / belief",examples:["Social media has a pervasive influence on modern youth.","There is a pervasive sense of disillusionment among voters.","Corruption was pervasive at every level of government."],category:"Sıfat",mastery:0},
  {id:146,en:"plausible",tr:"akla yatkın, makul, inandırıcı",syn:"believable, credible, reasonable, conceivable",usage:"plausible explanation / reason / theory / excuse",examples:["She offered a plausible explanation for her absence.","The most plausible theory is that the virus originated in animals.","His story sounded plausible at first."],category:"Sıfat",mastery:0},
  {id:147,en:"ramifications",tr:"sonuçlar, etkiler, yansımalar",syn:"consequences, implications, repercussions, effects",usage:"far-reaching / wider / serious ramifications",examples:["The decision has serious ramifications for future trade.","We must consider all the ramifications before acting.","The scandal had political ramifications across Europe."],category:"İsim",mastery:0},
  {id:148,en:"consensus",tr:"uzlaşı, görüş birliği, ortak fikir",syn:"agreement, accord, unanimity, common ground",usage:"reach / build / form a consensus / general consensus",examples:["Scientists have reached a consensus on climate change.","There is a growing consensus that reform is necessary.","The committee failed to build consensus on the proposal."],category:"İsim",mastery:0},
  {id:149,en:"discrepancy",tr:"tutarsızlık, çelişki, uyuşmazlık",syn:"inconsistency, disparity, mismatch, divergence",usage:"discrepancy between / in / among",examples:["There is a clear discrepancy between the two reports.","Auditors discovered discrepancies in the financial records.","The discrepancy in salary between genders remains significant."],category:"İsim",mastery:0},
  {id:150,en:"emergence",tr:"ortaya çıkış, doğuş, belirme",syn:"appearance, rise, advent, arrival",usage:"the emergence of sth / since the emergence of",examples:["The emergence of new technologies is reshaping industries.","We are witnessing the emergence of a new political movement.","The emergence of resistant bacteria poses a serious threat."],category:"İsim",mastery:0},
  {id:151,en:"proximity",tr:"yakınlık, mesafe yakınlığı, civar",syn:"closeness, nearness, vicinity",usage:"in close proximity to / proximity to",examples:["The hotel's proximity to the airport was a major advantage.","Living in close proximity to nature improves wellbeing.","The two villages are in such close proximity that they share resources."],category:"İsim",mastery:0},
  {id:152,en:"predicament",tr:"zor durum, çıkmaz, müşkül vaziyet",syn:"dilemma, plight, difficulty, quandary",usage:"in a predicament / face / find oneself in a predicament",examples:["The company found itself in a serious financial predicament.","She didn't know how to escape her current predicament.","His predicament was made worse by the lack of support."],category:"İsim",mastery:0},
  {id:153,en:"backlash",tr:"sert tepki, geri tepme, karşı çıkış",syn:"reaction, resistance, protest, opposition",usage:"backlash against / public / political backlash",examples:["The new policy provoked a fierce public backlash.","There was a backlash against the company's controversial decision.","She faced significant backlash for her remarks on social media."],category:"İsim",mastery:0},
  {id:154,en:"surge",tr:"ani artış, dalgalanma, sıçrama",syn:"rise, increase, jump, upsurge",usage:"a surge in / of sth / surge in demand / cases / prices",examples:["There has been a surge in demand for online learning.","The country experienced a surge of patriotism after the victory.","A sudden surge in oil prices affected the global economy."],category:"İsim",mastery:0},
  {id:155,en:"setback",tr:"aksilik, gerileme, geri adım",syn:"obstacle, hindrance, reversal, blow",usage:"suffer / face / experience a setback",examples:["Despite suffering several setbacks, she completed the project.","The company faced a major setback when their lead engineer left.","The peace talks experienced a serious setback last week."],category:"İsim",mastery:0},
  {id:156,en:"rationale",tr:"mantık, gerekçe, dayanak",syn:"reasoning, justification, logic, basis",usage:"the rationale behind / for sth",examples:["The rationale behind the decision was never made clear.","She explained the rationale for her research methodology.","I don't understand the rationale for these new rules."],category:"İsim",mastery:0},
  {id:157,en:"arguably",tr:"tartışmaya açık biçimde, muhtemelen, belki de",syn:"possibly, conceivably, perhaps",usage:"arguably + comparative / superlative",examples:["She is arguably the greatest scientist of her generation.","This is arguably the most important discovery of the decade.","Their team is arguably stronger than ours on paper."],category:"Zarf",mastery:0},
  {id:158,en:"inadvertently",tr:"kazara, istemeden, bilmeden",syn:"accidentally, unintentionally, unwittingly",usage:"inadvertently + verb",examples:["She inadvertently deleted the entire file.","The journalist inadvertently revealed her source.","He inadvertently caused offence with his remark."],category:"Zarf",mastery:0},
  {id:159,en:"ostensibly",tr:"görünüşte, sözde, görünürde",syn:"apparently, seemingly, supposedly",usage:"ostensibly + clause / for sth",examples:["He was ostensibly there to help, but his real motive was different.","The meeting was ostensibly about budget cuts.","She left ostensibly to take a phone call, but never returned."],category:"Zarf",mastery:0},
  {id:160,en:"concurrently",tr:"eş zamanlı olarak, aynı anda",syn:"simultaneously, at the same time, together",usage:"run / work / occur concurrently",examples:["The two studies were carried out concurrently.","She is concurrently running three different projects.","His sentences will be served concurrently rather than consecutively."],category:"Zarf",mastery:0},
  {id:161,en:"albeit",tr:"her ne kadar, gerçi, olsa da",syn:"although, though, even if",usage:"albeit + adjective / phrase (no clause)",examples:["The plan was successful, albeit costly.","She agreed to help, albeit reluctantly.","It was a victory, albeit a narrow one."],category:"Akademik",mastery:0},
  {id:162,en:"nonetheless",tr:"yine de, buna rağmen, bununla birlikte",syn:"nevertheless, however, still, even so",usage:"sentence-initial or mid-position",examples:["The evidence is incomplete; nonetheless, the conclusion stands.","He was tired; nonetheless, he finished the marathon.","Her argument has flaws but is, nonetheless, worth considering."],category:"Akademik",mastery:0},
  {id:163,en:"notwithstanding",tr:"-e rağmen, -e karşın",syn:"despite, in spite of, regardless of",usage:"notwithstanding + noun / clause + notwithstanding",examples:["Notwithstanding the difficulties, the team completed the project.","Her objections notwithstanding, the proposal was approved.","Notwithstanding the rain, the ceremony went ahead."],category:"Akademik",mastery:0},
  {id:164,en:"set out",tr:"yola çıkmak, başlamak, ortaya koymak",syn:"begin, embark, depart, present",usage:"set out to do sth / set out one's plans",examples:["They set out at dawn to climb the mountain.","She set out to prove her critics wrong.","The report sets out a comprehensive new strategy."],category:"Phrasal Verbs",mastery:0},
  {id:165,en:"carry on",tr:"devam etmek, sürdürmek",syn:"continue, proceed, persist, keep going",usage:"carry on with sth / carry on doing sth",examples:["Despite the criticism, she carried on with her research.","Please carry on — I didn't mean to interrupt you.","They carried on working until late at night."],category:"Phrasal Verbs",mastery:0},
  {id:166,en:"put up with",tr:"tahammül etmek, katlanmak, dayanmak",syn:"tolerate, endure, bear, stand",usage:"put up with sth / sb",examples:["I won't put up with this kind of behaviour any longer.","She had to put up with constant criticism from her colleagues.","How do you put up with so much noise?"],category:"Phrasal Verbs",mastery:0},
  {id:167,en:"bring up",tr:"gündeme getirmek, dile getirmek; yetiştirmek",syn:"raise, mention, rear, broach",usage:"bring up an issue / topic / a child",examples:["She brought up several important points during the meeting.","He was brought up by his grandparents in the countryside.","I didn't want to bring up the subject again."],category:"Phrasal Verbs",mastery:0},
  {id:168,en:"take on",tr:"üstlenmek, işe almak, kabul etmek",syn:"accept, assume, undertake, hire",usage:"take on a task / role / responsibility / staff",examples:["She took on too many responsibilities and got burnt out.","The company is taking on twenty new employees this month.","He took on the role of CEO during a difficult period."],category:"Phrasal Verbs",mastery:0},
  // ── EK 82 KELİME (id 169-250) — YDS/YÖKDİL akademik havuz ──
  {id:169,en:"contend",tr:"iddia etmek, mücadele etmek, baş etmek",syn:"argue, assert, claim; struggle",usage:"contend that / contend with sth",examples:["Critics contend that the policy will harm small businesses.","She had to contend with constant interruptions during the talk.","Researchers contend that the data has been misinterpreted."],category:"Fiil",mastery:0},
  {id:170,en:"scrutinize",tr:"yakından incelemek, ince eleyip sık dokumak",syn:"examine, inspect, analyse closely",usage:"scrutinize evidence / records / behaviour",examples:["The auditors scrutinized every expense in the report.","Voters tend to scrutinize a candidate's past speeches.","Her conclusions were scrutinized by senior researchers."],category:"Fiil",mastery:0},
  {id:171,en:"evoke",tr:"çağrıştırmak, uyandırmak, anımsatmak",syn:"elicit, arouse, summon, bring to mind",usage:"evoke memories / emotions / a response",examples:["The smell of jasmine evoked memories of her childhood.","The painting evokes a deep sense of melancholy.","His speech evoked strong reactions from the audience."],category:"Fiil",mastery:0},
  {id:172,en:"ascertain",tr:"saptamak, kesinleştirmek, emin olmak",syn:"determine, establish, verify, confirm",usage:"ascertain the truth / facts / cause",examples:["Investigators are trying to ascertain the cause of the fire.","It is difficult to ascertain how many people were affected.","First, we need to ascertain whether the data is accurate."],category:"Fiil",mastery:0},
  {id:173,en:"hinder",tr:"engellemek, geciktirmek, zorlaştırmak",syn:"impede, obstruct, hamper, delay",usage:"hinder progress / development / efforts",examples:["The lack of funding has hindered the project's progress.","Bad weather hindered the rescue operation.","Outdated regulations are hindering innovation in the sector."],category:"Fiil",mastery:0},
  {id:174,en:"deter",tr:"caydırmak, vazgeçirmek, engellemek",syn:"discourage, dissuade, prevent, put off",usage:"deter sb from doing sth",examples:["High prices have not deterred customers from buying the product.","Tougher penalties may deter would-be offenders.","Cold weather did not deter the protesters."],category:"Fiil",mastery:0},
  {id:175,en:"deplete",tr:"tüketmek, azaltmak, bitirmek",syn:"exhaust, use up, drain, reduce",usage:"deplete resources / reserves / supplies",examples:["Overfishing has severely depleted fish stocks in the area.","The long expedition depleted their food supplies.","Stress can deplete the body's natural energy reserves."],category:"Fiil",mastery:0},
  {id:176,en:"surpass",tr:"aşmak, geçmek, üstün gelmek",syn:"exceed, outdo, outstrip, transcend",usage:"surpass expectations / a target / a record",examples:["The team surpassed all expectations this season.","Sales figures have surpassed last year's total.","Her performance surpassed even her own personal best."],category:"Fiil",mastery:0},
  {id:177,en:"withstand",tr:"dayanmak, direnmek, kaldırmak",syn:"endure, resist, tolerate, weather",usage:"withstand pressure / criticism / heat",examples:["The bridge is designed to withstand earthquakes.","She managed to withstand intense criticism from the press.","These materials can withstand extreme temperatures."],category:"Fiil",mastery:0},
  {id:178,en:"infer",tr:"çıkarsamak, sonuç çıkarmak, anlamak",syn:"deduce, conclude, gather, surmise",usage:"infer from / infer that",examples:["From her silence, I inferred that she disagreed.","Readers can infer the author's bias from the tone.","One can infer a great deal from a single sentence."],category:"Fiil",mastery:0},
  {id:179,en:"jeopardize",tr:"tehlikeye atmak, riske sokmak",syn:"endanger, imperil, threaten, compromise",usage:"jeopardize a career / chances / safety",examples:["One careless remark could jeopardize the entire negotiation.","Smoking jeopardizes not only your health but also others'.","She refused to jeopardize her career for short-term gain."],category:"Fiil",mastery:0},
  {id:180,en:"elicit",tr:"ortaya çıkarmak, almak (yanıt/tepki), uyandırmak",syn:"draw out, evoke, extract, prompt",usage:"elicit a response / information / a reaction",examples:["The teacher's question elicited surprising answers from the class.","Interviewers use specific techniques to elicit honest responses.","His comments elicited an angry reaction on social media."],category:"Fiil",mastery:0},
  {id:181,en:"foster",tr:"teşvik etmek, beslemek, geliştirmek",syn:"encourage, promote, nurture, cultivate",usage:"foster creativity / cooperation / a sense of",examples:["The programme aims to foster creativity among young students.","Open discussions foster a sense of trust within the team.","Good leaders foster an environment of mutual respect."],category:"Fiil",mastery:0},
  {id:182,en:"conform",tr:"uymak, uyum sağlamak, riayet etmek",syn:"comply, adapt, obey, follow",usage:"conform to / with standards / rules / norms",examples:["All products must conform to international safety standards.","Teenagers often feel pressured to conform to their peers.","The building does not conform to current fire regulations."],category:"Fiil",mastery:0},
  {id:183,en:"dispel",tr:"gidermek, dağıtmak (kuşku/korku), savuşturmak",syn:"eliminate, banish, allay, remove",usage:"dispel doubts / fears / myths / rumours",examples:["The CEO's statement helped dispel rumours about layoffs.","Recent studies have dispelled many myths about caffeine.","Her warm welcome dispelled all my initial anxiety."],category:"Fiil",mastery:0},
  {id:184,en:"transcend",tr:"aşmak, ötesine geçmek, üstesinden gelmek",syn:"surpass, exceed, go beyond, rise above",usage:"transcend boundaries / limits / differences",examples:["Great art transcends cultural and language barriers.","Her achievements transcend those of her predecessors.","Music has the power to transcend political differences."],category:"Fiil",mastery:0},
  {id:185,en:"allege",tr:"iddia etmek (henüz kanıtlanmamış), öne sürmek",syn:"claim, assert, contend, accuse",usage:"allege that / be alleged to + V",examples:["The witness alleged that the suspect was at the scene.","She is alleged to have stolen confidential documents.","Critics allege that the report was politically motivated."],category:"Fiil",mastery:0},
  {id:186,en:"refute",tr:"çürütmek, reddetmek (kanıtla)",syn:"disprove, rebut, contradict, deny",usage:"refute an argument / a claim / allegations",examples:["The scientist refuted the theory with new experimental data.","She firmly refuted the allegations made against her.","No one has yet refuted his original hypothesis."],category:"Fiil",mastery:0},
  {id:187,en:"perpetuate",tr:"devam ettirmek, sürdürmek, kalıcı kılmak",syn:"sustain, prolong, maintain, continue",usage:"perpetuate stereotypes / myths / a cycle",examples:["These advertisements perpetuate harmful stereotypes.","Poverty tends to perpetuate itself across generations.","We must not perpetuate the mistakes of the past."],category:"Fiil",mastery:0},
  {id:188,en:"propagate",tr:"yaymak, çoğaltmak, sirayet ettirmek",syn:"spread, disseminate, transmit, reproduce",usage:"propagate ideas / information / a species",examples:["Social media propagates information at unprecedented speed.","The fake news was rapidly propagated online.","Plants propagate themselves through various mechanisms."],category:"Fiil",mastery:0},
  {id:189,en:"diminish",tr:"azalmak, küçülmek, küçültmek",syn:"decrease, reduce, lessen, decline",usage:"diminish in size / value / importance",examples:["The threat has not diminished over time.","His authority diminished after the scandal.","Inflation has diminished the value of savings."],category:"Fiil",mastery:0},
  {id:190,en:"impose",tr:"dayatmak, zorla kabul ettirmek, koymak",syn:"enforce, inflict, levy, dictate",usage:"impose a tax / a rule / restrictions / a fine",examples:["The government imposed new restrictions on travel.","Heavy fines were imposed on companies violating the law.","She didn't want to impose her views on anyone."],category:"Fiil",mastery:0},
  {id:191,en:"emerge",tr:"ortaya çıkmak, belirmek, doğmak",syn:"appear, surface, arise, develop",usage:"emerge from / emerge as",examples:["A new pattern emerged from the analysis.","She emerged as the strongest candidate in the election.","Several issues emerged during the discussion."],category:"Fiil",mastery:0},
  {id:192,en:"prevail",tr:"hâkim olmak, kazanmak, geçerli olmak",syn:"triumph, dominate, win, persist",usage:"prevail over / prevail upon sb to + V",examples:["In the end, justice prevailed.","Calm finally prevailed after weeks of tension.","Traditional values still prevail in many rural areas."],category:"Fiil",mastery:0},
  {id:193,en:"prevalent",tr:"yaygın, hâkim, baskın",syn:"widespread, common, dominant, pervasive",usage:"prevalent in / among / throughout",examples:["Smoking is prevalent among young adults in many countries.","Obesity is becoming increasingly prevalent worldwide.","Such attitudes are no longer prevalent in modern workplaces."],category:"Sıfat",mastery:0},
  {id:194,en:"profound",tr:"derin, derinlikli, köklü",syn:"deep, intense, far-reaching, significant",usage:"profound impact / change / understanding",examples:["The accident had a profound effect on her outlook on life.","His writings show a profound understanding of human nature.","The Industrial Revolution brought profound changes to society."],category:"Sıfat",mastery:0},
  {id:195,en:"formidable",tr:"zorlu, korkutucu, çetin (bir biçimde güçlü)",syn:"daunting, intimidating, fearsome, powerful",usage:"formidable opponent / challenge / task",examples:["She faced a formidable opponent in the final round.","The team has a formidable record this season.","Climbing the mountain is a formidable challenge."],category:"Sıfat",mastery:0},
  {id:196,en:"tangible",tr:"somut, elle tutulur, gözle görülür",syn:"concrete, palpable, real, perceptible",usage:"tangible evidence / benefits / results",examples:["The new policy has produced tangible results.","Investors want tangible evidence of progress.","There is a tangible sense of excitement in the air."],category:"Sıfat",mastery:0},
  {id:197,en:"conducive",tr:"elverişli, uygun, yol açan",syn:"favourable, beneficial, encouraging, helpful",usage:"conducive to (always followed by 'to')",examples:["A quiet environment is conducive to studying.","These conditions are not conducive to economic growth.","Open communication is conducive to a healthy relationship."],category:"Sıfat",mastery:0},
  {id:198,en:"scarce",tr:"kıt, az bulunur, nadir",syn:"rare, limited, sparse, in short supply",usage:"scarce resources / supplies / opportunities",examples:["Water is becoming increasingly scarce in this region.","Job opportunities are scarce in rural areas.","Information about the disease was scarce at first."],category:"Sıfat",mastery:0},
  {id:199,en:"redundant",tr:"gereksiz, fazlalık, lüzumsuz; işsiz",syn:"unnecessary, superfluous, excess",usage:"redundant information / staff / phrase",examples:["The phrase 'free gift' contains a redundant word.","About 200 workers were made redundant during the restructuring.","Several sections of the report are redundant."],category:"Sıfat",mastery:0},
  {id:200,en:"elusive",tr:"yakalanması zor, kavraması güç, belirsiz",syn:"hard to grasp, evasive, intangible",usage:"elusive answer / goal / suspect / dream",examples:["A definitive answer to this question remains elusive.","She has an elusive quality that makes her hard to interview.","The suspect proved elusive for several weeks."],category:"Sıfat",mastery:0},
  {id:201,en:"paramount",tr:"birinci derecede önemli, en önde gelen",syn:"supreme, foremost, chief, primary",usage:"of paramount importance / paramount concern",examples:["Safety is of paramount importance in nuclear plants.","Her paramount concern is her family's wellbeing.","Education is of paramount importance for development."],category:"Sıfat",mastery:0},
  {id:202,en:"marginal",tr:"önemsiz, kenarda, sınırda",syn:"slight, minor, insignificant, peripheral",usage:"marginal increase / difference / role",examples:["The party won by only a marginal majority.","There was a marginal improvement in test scores.","His role in the decision was marginal at best."],category:"Sıfat",mastery:0},
  {id:203,en:"lucrative",tr:"kazançlı, kârlı, getirisi yüksek",syn:"profitable, remunerative, rewarding, gainful",usage:"lucrative business / deal / market / career",examples:["She left her job for a more lucrative position abroad.","The pharmaceutical industry is highly lucrative.","Real estate has proven to be a lucrative investment."],category:"Sıfat",mastery:0},
  {id:204,en:"mundane",tr:"sıradan, basmakalıp, dünyevi",syn:"ordinary, routine, everyday, dull",usage:"mundane tasks / details / existence",examples:["He longed to escape his mundane office job.","Even mundane tasks can be made enjoyable with the right music.","She found beauty in the most mundane objects."],category:"Sıfat",mastery:0},
  {id:205,en:"vulnerable",tr:"savunmasız, hassas, kırılgan",syn:"susceptible, exposed, defenceless, at risk",usage:"vulnerable to / vulnerable population",examples:["Elderly people are vulnerable to extreme heat.","The system is vulnerable to cyber attacks.","Children are particularly vulnerable to misinformation."],category:"Sıfat",mastery:0},
  {id:206,en:"sustainable",tr:"sürdürülebilir, kalıcı, devam ettirilebilir",syn:"viable, maintainable, renewable",usage:"sustainable development / growth / energy",examples:["We need a more sustainable approach to energy production.","The current growth rate is not sustainable in the long term.","Sustainable agriculture protects soil and biodiversity."],category:"Sıfat",mastery:0},
  {id:207,en:"sporadic",tr:"ara sıra olan, düzensiz, dağınık",syn:"occasional, intermittent, irregular, scattered",usage:"sporadic outbreaks / fighting / contact",examples:["There were sporadic outbreaks of violence in the city.","Their communication has been sporadic over the past year.","Sporadic rain showers are expected throughout the day."],category:"Sıfat",mastery:0},
  {id:208,en:"perpetual",tr:"daimi, sürekli, ebedi",syn:"continuous, constant, unending, everlasting",usage:"perpetual motion / state / cycle",examples:["She lives in a perpetual state of anxiety.","The two countries seemed locked in perpetual conflict.","He has a perpetual smile on his face."],category:"Sıfat",mastery:0},
  {id:209,en:"intricate",tr:"karmaşık, ince işçilikli, çetrefilli",syn:"complex, complicated, elaborate, detailed",usage:"intricate pattern / design / details / system",examples:["The carpet had an intricate floral pattern.","The plot of the novel is incredibly intricate.","Understanding the intricate workings of the brain takes years."],category:"Sıfat",mastery:0},
  {id:210,en:"viable",tr:"uygulanabilir, geçerli, yaşayabilir",syn:"feasible, workable, practical, possible",usage:"viable option / alternative / solution / business",examples:["Solar power is now a viable alternative to fossil fuels.","The business plan is not financially viable.","We need to find a viable solution before the deadline."],category:"Sıfat",mastery:0},
  {id:211,en:"meticulous",tr:"titiz, çok dikkatli, kılı kırk yaran",syn:"thorough, careful, painstaking, scrupulous",usage:"meticulous attention / care / planning",examples:["She is meticulous about keeping accurate records.","The investigation was conducted with meticulous care.","His meticulous research took over a decade to complete."],category:"Sıfat",mastery:0},
  {id:212,en:"superficial",tr:"yüzeysel, derinlikten yoksun, sığ",syn:"shallow, surface-level, cursory",usage:"superficial knowledge / analysis / wound",examples:["The article gives only a superficial analysis of the issue.","She suffered only superficial injuries in the accident.","His knowledge of the subject is rather superficial."],category:"Sıfat",mastery:0},
  {id:213,en:"scrutiny",tr:"yakın inceleme, mercek altına alma",syn:"examination, inspection, investigation",usage:"under scrutiny / close scrutiny",examples:["The new law is coming under intense public scrutiny.","His financial records were subjected to careful scrutiny.","Politicians are always under scrutiny from the media."],category:"İsim",mastery:0},
  {id:214,en:"paradox",tr:"paradoks, çelişki, görünür çelişki",syn:"contradiction, anomaly, inconsistency",usage:"a paradox / it's a paradox that",examples:["It is a paradox that more communication can lead to less understanding.","The paradox of choice means too many options can paralyse us.","She enjoys exploring the paradoxes of modern life."],category:"İsim",mastery:0},
  {id:215,en:"threshold",tr:"eşik, başlangıç noktası, sınır",syn:"limit, boundary, brink, doorway",usage:"on the threshold of / cross / reach a threshold",examples:["The country is on the threshold of major political change.","Her pain threshold is remarkably high.","Sales finally crossed the million-dollar threshold."],category:"İsim",mastery:0},
  {id:216,en:"trajectory",tr:"gidişat, izlenen yol, yörünge",syn:"path, course, direction, route",usage:"upward / downward trajectory / career trajectory",examples:["The company is on an impressive upward trajectory.","Her career trajectory took an unexpected turn.","Scientists calculated the trajectory of the missile."],category:"İsim",mastery:0},
  {id:217,en:"prerequisite",tr:"ön şart, gereklilik",syn:"requirement, precondition, necessity",usage:"a prerequisite for / of",examples:["A degree in mathematics is a prerequisite for this course.","Trust is a prerequisite for any successful partnership.","Patience is a prerequisite of teaching young children."],category:"İsim",mastery:0},
  {id:218,en:"magnitude",tr:"büyüklük, önem derecesi, çap",syn:"size, scale, extent, significance",usage:"the magnitude of / of great magnitude",examples:["The magnitude of the problem was greater than expected.","An earthquake of magnitude 7.0 struck the region.","People underestimate the magnitude of climate change."],category:"İsim",mastery:0},
  {id:219,en:"scope",tr:"kapsam, alan, boyut",syn:"range, extent, breadth, coverage",usage:"the scope of / within / beyond the scope of",examples:["This topic is beyond the scope of our research.","We need to broaden the scope of the investigation.","The project's scope was reduced due to budget cuts."],category:"İsim",mastery:0},
  {id:220,en:"fluctuation",tr:"dalgalanma, iniş çıkış, değişim",syn:"variation, change, swing, oscillation",usage:"fluctuation in / of prices / temperature",examples:["The market has seen significant price fluctuations.","Hormonal fluctuations can affect mood and energy.","Temperature fluctuations damaged the crops."],category:"İsim",mastery:0},
  {id:221,en:"framework",tr:"çerçeve, yapı, sistem",syn:"structure, system, model, foundation",usage:"a framework for / within a framework",examples:["The new law provides a framework for environmental protection.","Researchers proposed a theoretical framework for the study.","We need a clear framework for evaluating performance."],category:"İsim",mastery:0},
  {id:222,en:"perception",tr:"algı, görüş, anlayış",syn:"view, understanding, awareness, insight",usage:"perception of / public perception",examples:["Public perception of the brand has improved significantly.","Cultural background shapes our perception of beauty.","His perception of the situation differs from mine."],category:"İsim",mastery:0},
  {id:223,en:"premise",tr:"varsayım, dayanak, öncül",syn:"assumption, basis, foundation, hypothesis",usage:"on the premise that / the basic premise",examples:["The argument rests on a flawed premise.","His theory is built on the premise that humans are rational.","The basic premise of the book is that history repeats itself."],category:"İsim",mastery:0},
  {id:224,en:"prospect",tr:"olasılık, beklenti, görünüm",syn:"likelihood, possibility, outlook, chance",usage:"the prospect of / good / bright prospects",examples:["The prospect of war alarmed the international community.","She faces excellent career prospects after graduation.","There is little prospect of a quick resolution."],category:"İsim",mastery:0},
  {id:225,en:"incentive",tr:"teşvik, dürtü, güdü",syn:"motivation, inducement, stimulus, encouragement",usage:"incentive to + V / financial incentives",examples:["The government offers tax incentives to green businesses.","Higher salaries serve as a powerful incentive.","There is little incentive to change if results are good."],category:"İsim",mastery:0},
  {id:226,en:"compromise",tr:"uzlaşma, taviz, ödün; tehlikeye atmak",syn:"agreement, settlement; jeopardize",usage:"reach a compromise / compromise on / sth",examples:["After hours of debate, they finally reached a compromise.","She refused to compromise her principles for money.","Sleep deprivation can compromise the immune system."],category:"İsim",mastery:0},
  {id:227,en:"endeavour",tr:"çaba, gayret, girişim",syn:"effort, attempt, undertaking, enterprise",usage:"endeavour to + V / human endeavour",examples:["She made every endeavour to complete the project on time.","Scientific endeavour requires patience and persistence.","The team will endeavour to deliver the best possible service."],category:"İsim",mastery:0},
  {id:228,en:"presumably",tr:"muhtemelen, sanırım, herhalde",syn:"probably, supposedly, conceivably",usage:"presumably + clause",examples:["Presumably, the train will arrive on time.","She didn't come to the meeting, presumably because she was ill.","Presumably, you have already read the report."],category:"Zarf",mastery:0},
  {id:229,en:"henceforth",tr:"bundan böyle, bundan sonra",syn:"from now on, hereafter, in future",usage:"henceforth + clause (formal)",examples:["Henceforth, all visitors must wear identification badges.","The committee will henceforth meet on Tuesdays.","She decided to be henceforth more careful with her finances."],category:"Zarf",mastery:0},
  {id:230,en:"scarcely",tr:"neredeyse hiç, güçlükle, ancak",syn:"hardly, barely, only just",usage:"scarcely + V / had scarcely + V3 when",examples:["She had scarcely arrived when the phone rang.","I could scarcely believe what I was hearing.","There is scarcely any food left in the fridge."],category:"Zarf",mastery:0},
  {id:231,en:"predominantly",tr:"ağırlıklı olarak, büyük çoğunlukla",syn:"mainly, mostly, primarily, chiefly",usage:"predominantly + adj/adv",examples:["The audience was predominantly young.","The region is predominantly agricultural.","The cast is predominantly female."],category:"Zarf",mastery:0},

  {id:"tenses",title:"Zamanlar",icon:"⏰",color:"#6366f1",subs:[
    {t:"Present Simple",r:"Alışkanlıklar, genel gerçekler, bilimsel gerçekler, programlı gelecek.",s:"S + V1 (he/she/it → +s)",ex:["She reads every morning. (Her sabah okur.)","The Earth orbits the Sun. (Dünya Güneş'in etrafında döner.)","They don't eat meat. (Et yemezler.)","The train leaves at 8. (Tren 8'de kalkıyor — tarife.)"],tip:"Belirteçler: always, usually, often, sometimes, rarely, never. Durum fiilleri (know, love, believe, want, seem) sürekli zamanlarda kullanılmaz!"},
    {t:"Present Continuous",r:"Şu an gerçekleşen eylem, geçici durum, yakın gelecek planı, kızgınlık bildiren 'always' kullanımı.",s:"S + am/is/are + V-ing",ex:["She is reading right now. (Şu an okuyor.)","I'm working from home this week. (Bu hafta evden çalışıyorum — geçici.)","They are meeting the minister tomorrow. (Yarın bakanla görüşüyorlar — plan.)","He is always leaving his keys everywhere! (Anahtarlarını hep her yere bırakıyor! — şikâyet)"],tip:"'always + Present Continuous' = can sıkıcı alışkanlıktan şikâyet. Durum fiilleri (know, understand, own) bu zamanda kullanılmaz."},
    {t:"Past Simple",r:"Geçmişte belli bir zamanda başlayıp biten eylem. Zaman belirteci genellikle vardır.",s:"S + V2",ex:["She studied all night before the exam. (Sınav öncesi bütün gece çalıştı.)","Scientists discovered a new species in 2019. (Bilim insanları 2019'da yeni bir tür keşfetti.)","He didn't come to the party. (Partiye gelmedi.)","Did you see that film last week? (Geçen hafta o filmi gördün mü?)"],tip:"Belirteçler: yesterday, last night, in 1990, ago, in the past. Present Perfect ile fark: Past Simple → zaman bellidir. Present Perfect → zaman belirsiz ya da şu anla bağlantılı."},
    {t:"Past Continuous",r:"Geçmişte devam eden eylem; başka bir eylemle kesilen arka plan. İki paralel eylemi veya geçmişteki anlık sahneyi anlatmak için de kullanılır.",s:"S + was/were + V-ing",ex:["While I was studying, the phone rang. (Çalışırken telefon çaldı — süren eylem kesildi.)","They were having dinner when the power cut out. (Elektrik kesildiğinde yemek yiyorlardı.)","It was snowing and the wind was howling when we left. (Çıktığımızda kar yağıyordu ve rüzgâr uğulduyordu — arka plan.)","At 9 PM last night, I was working on the report. (Dün gece 21:00'de rapor üzerinde çalışıyordum.)"],tip:"'While + Past Continuous, Past Simple' yapısı çok yaygın. Kesen eylem → Past Simple. Devam eden arka plan → Past Continuous."},
    {t:"Present Perfect",r:"Geçmişte gerçekleşti ama şu anla bağlantısı var. 3 temel kullanım: (1) deneyim, (2) sonucu şu anda hissedilen eylem, (3) 'for/since' ile hâlâ süren durum.",s:"S + have/has + V3",ex:["I have visited Japan twice. (Japonya'yı iki kez ziyaret ettim — hayat boyu deneyim.)","She has just finished the report. (Raporu az önce bitirdi — şu anda hazır.)","I've lost my keys! Can you help? (Anahtarlarımı kaybettim! — sonucu şu an devam ediyor.)","He has worked here since 2010. (2010'dan beri burada çalışıyor — hâlâ devam ediyor.)"],tip:"Belirteçler: just, already, yet, ever, never, for, since, recently, so far. 'I went to Paris last year' ✅ ama 'I have gone to Paris last year' ❌ — 'last year' gibi belirli geçmiş zaman belirteci varsa Past Simple kullanılır!"},
    {t:"Present Perfect Continuous",r:"Geçmişte başlayıp hâlâ devam eden veya az önce biten bir eylemin SÜRECİNİ vurgular. Yorgunluk, iz, neden gibi sonuçlar şu anda görülür.",s:"S + have/has + been + V-ing",ex:["I have been studying for three hours and I'm exhausted. (Üç saattir çalışıyorum ve yoruldum — süreç + sonuç.)","She has been waiting for over an hour! (Bir saatten fazladır bekliyor! — devam ediyor, sinirlendirici.)","Why are your hands dirty? — I've been fixing the car. (Eline niye kir bulaştı? — az önce bitti, izi var.)","They have been arguing all morning. (Sabahtan beri tartışıyorlar.)"],tip:"Present Perfect vs Present Perfect Continuous: 'I have read the book' → kitabı bitirdim (tamamlama). 'I have been reading the book' → okuyorum, devam ediyor (süreç). Durum fiilleri (know, believe, own) bu zamanda kullanılmaz."},
    {t:"Past Perfect",r:"Geçmişte iki eylem var; biri diğerinden ÖNCE tamamlanmıştı. 'Daha geride kalan geçmiş' için kullanılır.",s:"S + had + V3",ex:["She had finished her work before he arrived. (O gelmeden önce işini bitirmişti.)","By the time we got there, the meeting had already ended. (Oraya vardığımızda toplantı çoktan bitmişti.)","He had never seen snow before that winter. (O kıştan önce hiç kar görmemişti.)","I didn't go to the party because I had already eaten. (Zaten yemiştim, o yüzden partiye gitmedim.)"],tip:"'by the time', 'before', 'after', 'already', 'when' ile çok kullanılır. Type 3 If Clause'da şart bölümünde zorunlu: 'If she had studied...'"},
    {t:"Past Perfect Continuous",r:"Geçmişte belirli bir ana kadar süredir devam eden eylemi anlatır. Yorgunluk, iz veya bir durumun nedenini geçmişte açıklamak için kullanılır.",s:"S + had + been + V-ing",ex:["She had been waiting for two hours when he finally arrived. (O geldiğinde iki saattir bekliyordu — süre vurgusu.)","He was exhausted because he had been working non-stop all day. (Dur durak bilmeden bütün gün çalıştığı için yorgundu — neden.)","By the time the ambulance arrived, the doctors had been treating the patient for an hour. (Ambulans geldiğinde doktorlar bir saattir hastayı tedavi ediyordu.)","I had been learning Spanish for a year before I moved to Madrid. (Madrid'e taşınmadan önce bir yıldır İspanyolca öğreniyordum.)"],tip:"Past Perfect vs Past Perfect Continuous: 'had finished' → tamamlandı (sonuç). 'had been working' → süreç devam ediyordu (yorgunluk/iz). 'for/since' ile süre vurgulanıyorsa Continuous tercih edilir."},
    {t:"Future Continuous",r:"Gelecekte belirli bir anda devam ediyor olacak eylem. Kibarca bilgi sorma veya tahmini doğal bir plan olarak sunma için de kullanılır.",s:"S + will be + V-ing",ex:["Don't call me at 3 PM — I'll be having a meeting. (Saat 15:00'te arama, toplantıdayım.)","This time next week, we'll be lying on a beach in Greece. (Gelecek hafta bu saatte Yunanistan'da plajda uzanıyor olacağız.)","Will you be using the car tonight? (Bu gece arabayı kullanacak mısın? — kibarca soru.)","She'll be presenting her research at the conference tomorrow. (Yarın konferansta araştırmasını sunuyor olacak.)"],tip:"'At this time tomorrow / next week / in two hours' gibi ifadelerle gelir. 'Will you be + V-ing?' → çok nazik bir bilgi/talep sorusu."},
    {t:"Future Perfect",r:"Gelecekte belirli bir zamana kadar tamamlanmış olacak eylem. Genellikle 'by + zaman' ifadesiyle kullanılır.",s:"S + will have + V3",ex:["By the time she arrives, we will have finished dinner. (O geldiğinde yemeği bitirmiş olacağız.)","By next year, he will have worked here for a decade. (Gelecek yıla kadar burada on yıl çalışmış olacak.)","I will have submitted the report before the deadline. (Son tarihe kadar raporu teslim etmiş olacağım.)","By 2030, scientists will have discovered new solutions to climate change. (2030'a kadar bilim insanları iklim değişikliğine yeni çözümler keşfetmiş olacak.)"],tip:"'By + zaman' (by then, by Friday, by 2030, by the time...) ile çok kullanılır. Future Perfect Continuous: 'will have been + V-ing' → süreyi vurgular: 'I will have been studying for six hours by midnight.'"},
