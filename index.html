  {id:"modals",title:"Modal Fiiller",icon:"🔑",color:"#10b981",subs:[
    {t:"can / could",r:"can → yetenek, izin. could → geçmiş yetenek, kibar rica.",s:"S + can/could + V1",ex:["She can speak three languages fluently. (Üç dil akıcı konuşabiliyor.)","Could you help me with this, please? (Buna yardım edebilir misiniz?)","He could swim when he was five. (Beş yaşındayken yüzebiliyordu.)","This could be the solution we need. (Bu ihtiyacımız olan çözüm olabilir.)"],tip:"could have + V3 → geçmişte yapılabilirdi ama yapılmadı."},
    {t:"may / might",r:"may → %50 olasılık, resmi izin. might → daha düşük olasılık.",s:"S + may/might + V1",ex:["It may rain tomorrow. (Yarın yağmur yağabilir — %50.)","This might have caused the crisis. (Bu, krize neden olmuş olabilir.)","May I ask a question? (Bir soru sorabilir miyim? — resmi izin)","He might not come if he's busy. (Meşgulse gelmeyebilir.)"],tip:"may/might have + V3 → geçmişe yönelik belirsiz tahmin."},
    {t:"must / have to",r:"must → güçlü zorunluluk veya güçlü tahmin. have to → dış zorunluluk.",s:"S + must / have to + V1",ex:["She must be tired — she's been working 12 hours. (Yorgun olmalı — 12 saattir çalışıyor.)","I have to wear a uniform at work. (İşte üniforma giymek zorundayım.)","You must not park here. (Buraya park etmek yasak!)","He doesn't have to come if he's busy. (Meşgulse gelmek zorunda değil.)"],tip:"must not → yasak. don't have to → gerek yok. Klasik tuzak!"},
    {t:"should / ought to",r:"Tavsiye, öneri, beklenti.",s:"S + should + V1",ex:["You should read more academic articles. (Daha fazla akademik makale okumalısın.)","She should have studied harder — she regrets it. (Daha çok çalışmalıydı — pişman.)","Governments ought to invest in renewable energy. (Hükümetler yenilenebilir enerjiye yatırım yapmalı.)","The package should arrive tomorrow. (Paket yarın gelmiş olmalı — beklenti.)"],tip:"should have + V3 → yapılması gerekirdi ama yapılmadı (pişmanlık)."},
    {t:"would — Kibarlık, Alışkanlık, Koşul",r:"would → 3 farklı işlev: (1) kibarca istek/teklif, (2) geçmişteki düzenli alışkanlık, (3) Type 2/3 koşul cümlelerinde sonuç.",s:"S + would + V1",ex:["Would you like some coffee? (Kahve ister misiniz? — kibar teklif)","Could you tell me the way, please? / I would like to book a table. (Rezervasyon yaptırmak istiyorum — resmi/kibar)","When I was young, I would walk to school every day. (Çocukken her gün yürüyerek okula giderdim — geçmiş alışkanlık)","If I had more time, I would travel more. (Zamanım olsaydı daha çok seyahat ederdim — koşul sonucu)","I would never do that to a friend. (Bir arkadaşa asla bunu yapmam — kategorik ret)"],tip:"'would' ile 'used to' farkı: would → sadece eylemler için. 'I would live there' ❌ (durum fiili) → 'I used to live there' ✅"},
    {t:"used to — Geçmiş Alışkanlık / Durum",r:"used to → geçmişte düzenli yapılan ama artık yapılmayan eylem VEYA geçmişte var olan ama artık olmayan durum. Şu ana zıtlık ima eder.",s:"S + used to + V1",ex:["I used to play football every weekend. (Her hafta futbol oynardım — artık oynamıyorum.)","She used to live in Paris before she moved to Istanbul. (İstanbul'a taşınmadan önce Paris'te yaşıyordu.)","There used to be a cinema on this street. (Bu sokakta bir sinema vardı — artık yok.)","He didn't use to like vegetables, but now he loves them. (Eskiden sebzeleri sevmezdi, şimdi seviyor.)"],tip:"Soru formu: 'Did you use to...?' ('d' düşer!). Durum fiilleriyle de kullanılır: used to live / believe / know ✅  Ama would ile KULLANILAMAZ: 'I would live there' ❌"},
    {t:"be used to — Alışkın Olmak (şu an)",r:"be used to → bir şeye hâlihazırda alışkın olmak. Geçmiş değil, şu anki durumdur. 'to' burada EDAT — arkasından isim veya V-ing gelir, V1 gelmez!",s:"S + am/is/are/was/were used to + noun / V-ing",ex:["She is used to working long hours. (Uzun saatler çalışmaya alışkın — şu an.)","I'm used to the noise — I've lived here for years. (Gürültüye alıştım — yıllardır burada yaşıyorum.)","He wasn't used to driving on the left when he first moved to the UK. (İngiltere'ye ilk taşındığında soldan sürmeye alışık değildi.)","Are you used to eating spicy food? (Acılı yemek yemeye alışkın mısın?)"],tip:"TUZAK: 'be used to + V-ing' ≠ 'used to + V1'. 'I am used to getting up early' (alışkınım) vs 'I used to get up early' (eskiden kalkardım). 'to' sonrası her zaman isim/gerund!"},
    {t:"get used to — Alışmak (süreç)",r:"get used to → bir şeye alışma SÜRECİNİ anlatır. 'be used to' sonucu, 'get used to' yolculuğu ifade eder.",s:"S + get/got/getting used to + noun / V-ing",ex:["It took me a while to get used to the new schedule. (Yeni programa alışmam biraz zaman aldı.)","You'll get used to the cold weather eventually. (Eninde sonunda soğuk havaya alışacaksın.)","She's slowly getting used to living alone. (Yavaş yavaş yalnız yaşamaya alışıyor.)","I can't get used to waking up so early! (Bu kadar erken kalkmaya bir türlü alışamıyorum!)"],tip:"Üçlü karşılaştırma: 'used to go' (geçmişte giderdim) → 'be used to going' (gitmaya alışkınım) → 'get used to going' (gitmaya alışıyorum/alıştım). Hepsi farklı! Sınav ve günlük konuşmada çok sık karşılaşılır."},
    {t:"be supposed to — Beklenti, Kural, Görev",r:"be supposed to → birinin yapması beklenen / kuralların gerektirdiği şeyi anlatır. Çoğu zaman yapılmayan veya aksine gidilen bir beklentiyi ima eder.",s:"S + am/is/are supposed to + V1",ex:["You are supposed to wear a seatbelt in a car. (Arabada emniyet kemeri takman gerekiyor — kural.)","She was supposed to call me at 8, but she never did. (Saat 8'de aramam gerekiyordu ama aramadı — beklenti karşılanmadı.)","We're not supposed to use phones in the library. (Kütüphanede telefon kullanmamız gerekmiyor — yasak.)","The meeting is supposed to start at 10. (Toplantının 10'da başlaması lazım — program/beklenti.)","You weren't supposed to tell anyone! (Kimseye söylememen gerekiyordu! — ihlal)"],tip:"'supposed to' vs 'should': supposed to → dışarıdan gelen kural/beklenti. should → kişisel tavsiye. 'You should study' (bence) vs 'You're supposed to study' (kurala göre)."},
  ]},
  {id:"ifclauses",title:"If Clauses (Koşul)",icon:"🔀",color:"#f59e0b",subs:[
    {t:"Type 0 — Genel Gerçek",r:"Bilimsel gerçekler, her zaman geçerli sonuçlar.",s:"If + Present Simple, Present Simple",ex:["If you heat water to 100°C, it boils. (Su 100°C'ye ulaşırsa kaynar.)","If people don't sleep enough, they lose concentration. (Yeterince uyumazlarsa konsantrasyon kaybederler.)","Plants die if they don't get water. (Bitkiler su almazsa ölür.)"],tip:"'when' ile de kullanılabilir. Bilimsel metinlerde çok sık görülür."},
    {t:"Type 1 — Gerçek Koşul",r:"Gelecekte gerçekleşmesi mümkün olan koşul ve sonuç.",s:"If + Present Simple, will + V1",ex:["If she studies hard, she will pass the exam. (Çok çalışırsa sınavı geçecek.)","If the government raises taxes, people will spend less. (Hükümet vergileri artırırsa insanlar daha az harcayacak.)","Unless we act now, the situation will get worse. (Şimdi harekete geçmezsek durum kötüleşecek.)"],tip:"unless = if...not. Kafa karıştırıcı ama çok önemli!"},
    {t:"Type 2 — Hayali Koşul",r:"Şu an gerçek olmayan, hayali ya da zor gerçekleşecek durum.",s:"If + Past Simple, would + V1",ex:["If I had more time, I would travel the world. (Zamanım olsaydı dünyayı gezerdim.)","If she were the president, she would change the system. (Cumhurbaşkanı olsaydı sistemi değiştirirdi — 'were' kullan!)","If I knew the answer, I would tell you. (Cevabı bilseydim söylerdim.)"],tip:"'were' her özne için kullanılır: 'If I were you...' kalıbı çok yaygın."},
    {t:"Type 3 — Geçmiş Hayali",r:"Geçmişte olmayan bir koşul. Artık değiştirilemez.",s:"If + Past Perfect, would have + V3",ex:["If she had studied, she would have passed. (Çalışsaydı geçecekti.)","If Columbus hadn't sailed west, someone else would have discovered America. (Kolomb batıya yelken açmasaydı başkası keşfederdi.)","If they had taken precautions, the accident would not have happened."],tip:"'Had she known...' gibi inversiyonlara dikkat — YDS'de çok çıkar."},
    {t:"Mixed Conditionals",r:"Koşul ve sonuç farklı zamanlara ait.",s:"If + Past Perfect → would + V1 (veya tersi)",ex:["If I had studied medicine, I would be a doctor now. (Tıp okusaydım şu an doktor olurdum — geçmiş→şimdi.)","If she weren't so busy, she would have joined us. (Bu kadar meşgul olmasaydı bize katılırdı — şimdi→geçmiş.)"],tip:"Hangi zaman kombinasyonu olduğunu iyi analiz et."},
  ]},
  {id:"relative",title:"Relative Clauses",icon:"🔗",color:"#ec4899",subs:[
    {t:"Defining Relative Clauses",r:"Tanımlayan, olmadan cümle anlamsız olur.",s:"who (kişi), which (şey), that (her ikisi), where (yer), whose (iyelik)",ex:["The student who answered first won the prize. (İlk cevaplayan öğrenci ödülü kazandı.)","This is the book which changed my life. (Bu, hayatımı değiştiren kitap.)","The city where I was born has changed a lot. (Doğduğum şehir çok değişti.)","The company whose CEO resigned is in trouble. (CEO'su istifa eden şirket zor durumda.)"],tip:"Tanımlamalı cümlede virgül yok."},
    {t:"Non-defining Relative Clauses",r:"Ekstra bilgi verir, olmasa da cümle anlam taşır.",s:"Virgülle ayrılır. 'that' kullanılmaz.",ex:["My brother, who lives in Berlin, is a doctor. (Kardeşim — Berlin'de yaşıyor — doktordur.)","The Eiffel Tower, which was built in 1889, is in Paris. (Eyfel Kulesi, 1889'da inşa edildi, Paris'te.)","Einstein, whose theories changed physics, was born in Germany."],tip:"Virgüller kritik! that → YOK, who/which → VAR."},
  ]},
  {id:"conjunctions",title:"Bağlaçlar",icon:"🔗",color:"#8b5cf6",subs:[
    {t:"Zıtlık (Contrast)",r:"although, even though, however, despite, in spite of, whereas, while",s:"Although/Even though + cümle / Despite/In spite of + isim/gerund",ex:["Although it was raining, we went for a walk. (Yağmur yağmasına rağmen yürüyüşe çıktık.)","Despite the bad weather, they enjoyed the trip. (Kötü havaya rağmen gezinin tadını çıkardılar.)","She passed the exam; however, she wasn't happy. (Sınavı geçti; bununla birlikte mutlu değildi.)","He is tall, whereas his brother is short. (O uzun, oysa kardeşi kısadır.)"],tip:"despite/in spite of → isim ya da V-ing ile gelir, cümle ile gelmez!"},
    {t:"Sebep-Sonuç (Cause-Effect)",r:"because, since, as, therefore, consequently, as a result, thus",s:"because/since/as + cümle",ex:["She failed because she didn't study. (Çalışmadığı için başarısız oldu.)","Since it was late, we decided to stay. (Geç olduğundan kalmaya karar verdik.)","He was late; therefore, he missed the meeting. (Geç kaldı; bu yüzden toplantıyı kaçırdı.)","As a result of the storm, many trees fell. (Fırtına sonucunda birçok ağaç devrildi.)"],tip:"therefore/consequently/thus → noktalı virgülden sonra gelir: ; therefore,"},
    {t:"Ekleme (Addition)",r:"moreover, furthermore, in addition, besides, not only...but also, as well as",s:"Moreover/Furthermore, + cümle",ex:["She is intelligent; moreover, she works very hard. (Zeki; dahası, çok çalışıyor.)","Not only is he smart, but he also works hard. (Yalnızca zeki değil, aynı zamanda çok çalışıyor.)","The project was expensive as well as time-consuming. (Proje pahalı olduğu kadar zaman alıcıydı.)"],tip:"Not only → cümle başında gelince fiil başa geçer (inversion)."},
    {t:"Şart / Bağlantı",r:"unless, otherwise, provided that, as long as, in case",s:"",ex:["Unless you study, you will fail. (Çalışmazsan başarısız olursun.)","You must study; otherwise, you will fail. (Çalışmalısın; aksi hâlde başarısız olursun.)","You can borrow my car, provided that you fill it up. (Arabamı ödünç alabilirsin, yeter ki benzin doldur.)","Take an umbrella in case it rains. (Yağmur yağar diye şemsiyeni al.)"],tip:"unless = if...not. otherwise = aksi takdirde, yoksa."},
  ]},
  {id:"getmaketake",title:"GET / MAKE / TAKE / HAVE",icon:"🤲",color:"#06b6d4",subs:[
    {t:"GET — Alma, Olma, Değişim",r:"get → 3 ana işlevi: (1) bir şeyi ALMAK / edinmek, (2) bir duruma OLMAK / geçmek (değişim), (3) phrasal verb yapılarıyla geniş anlam kazanmak. 'Olma' anlamını 'be' ile karıştırmamak gerekir — ayrıntılar aşağıda.",s:"",ex:["▸ get + sıfat (OLMA / DEĞİŞİM):","She gets angry whenever someone interrupts her. (Biri sözünü kestiğinde sinirleniyor.)","I got tired after walking for two hours. (İki saat yürüdükten sonra yoruldum.)","We got lost in the old part of the city last night. (Dün gece şehrin eski kısmında kaybolduk.)","They got married in a small ceremony last summer. (Geçen yaz küçük bir törende evlendiler.)","She got dressed quickly and ran out the door. (Hızla giyinip kapıdan koşarak çıktı.)","He got hungry waiting for the food to arrive. (Yemek gelmesini beklerken acıktı.)","The weather is getting colder every day. (Hava her gün soğuyor.)","It's getting dark — we should head home. (Hava kararıyor — eve gitsek iyi olur.)","▸ get + isim (ALMA / EDİNME):","She got a promotion after only six months at the company. (Şirkette sadece altı ay sonra terfi aldı.)","I got a job offer from a tech firm yesterday. (Dün bir teknoloji firmasından iş teklifi aldım.)","Did you get my message about the meeting? (Toplantıyla ilgili mesajımı aldın mı?)","He got a haircut before the interview. (Görüşme öncesi saçını kestirdi.)","She got an A on her final exam. (Final sınavından A aldı.)","I got a call from the doctor this morning. (Bu sabah doktordan telefon geldi.)","▸ get + phrasal (BİRLEŞİK):","He's slowly getting over the flu. (Gripten yavaş yavaş kurtuluyor.)","I need to get rid of these old clothes. (Bu eski kıyafetlerden kurtulmam lazım.)","She gets along really well with her colleagues. (Meslektaşlarıyla çok iyi geçiniyor.)","It was great to get to know you at the conference. (Konferansta seni tanımak harikaydı.)","She finally got used to living alone. (Sonunda yalnız yaşamaya alıştı.)"],tip:"GET vs BE farkı: 'get' → değişim/süreç anlatır. 'be' → var olan durumu anlatır. 'She got tired' = yoruldu (değişti). 'She was tired' = yorgundu (zaten öyleydi). 'He got married' = evlendi (olay). 'He is married' = evli (durum). Kural: süreç/değişim → get. Mevcut durum → be."},
    {t:"GET vs BE — Olma Farkı",r:"Bu iki kelime sık karıştırılır. 'get' değişim ve süreci, 'be' ise var olan kalıcı veya anlık durumu anlatır. İkisi birbirine yakın görünse de anlam farkı önemlidir.",s:"get + adj = olmak (değişmek) / be + adj = olmak (durum)",ex:["▸ Hava / Ortam:","'It's getting dark, we should turn on the lights.' (Hava kararıyor — değişim süreci.)","'It's dark in here — I can't see anything.' (Burası karanlık — mevcut durum.)","'It's getting cold; please close the window.' (Soğuyor — yavaş değişim.)","'It's cold outside; wear your coat.' (Dışarısı soğuk — şu anki gerçek.)","▸ Duygu / Hâl:","'She got angry when she heard the news.' (Sinirlendi — duygu değişti, olay.)","'She was angry the whole evening.' (Bütün akşam sinirliydi — süre boyunca durum.)","'He got tired after climbing five flights of stairs.' (Yoruldu — eylem sonucu değişim.)","'He was tired from a long day at work.' (Yorgundu — gün boyu süren hâl.)","▸ Konum / Statü:","'He got lost on his way to the museum.' (Kayboldu — bir şey oldu, an.)","'He was lost for over an hour before someone helped.' (Bir saatten fazla kaybıydı — süreç içindeki hâl.)","'They got divorced after twelve years of marriage.' (Boşandılar — olay, değişim.)","'They have been divorced for three years now.' (Üç yıldır boşanmışlar — mevcut durum.)","'I got married last June in a small ceremony.' (Geçen Haziran evlendim — olay.)","'I am married and have two children.' (Evliyim ve iki çocuğum var — durum.)"],tip:"Zaman testleri: Eğer bir süreç veya anlık değişim varsa → get. Sabit bir durumu tanımlıyorsan → be. 'get' genellikle Past Simple veya Progressive ile, 'be' ise Simple tenses ile daha doğal gelir."},
    {t:"MAKE — Üretme, Yapma",r:"make → üretmek, yaratmak, neden olmak, bir şeyi oluşturmak. Sınavlarda 'do' ile karıştırılan en yaygın fiildir; kalıplar ezberlenmelidir.",s:"",ex:["▸ make + zihinsel eylem:","She made a difficult decision after weeks of consideration. (Haftalarca düşündükten sonra zor bir karar verdi.)","Everyone makes mistakes — what matters is learning from them. (Herkes hata yapar — önemli olan onlardan ders almak.)","We need to make a plan before the deadline. (Son tarihten önce bir plan yapmamız lazım.)","The CEO will make a speech at the opening ceremony. (CEO açılış töreninde bir konuşma yapacak.)","I'll make a list of everything we need to buy. (Almamız gereken her şeyin bir listesini yapacağım.)","She had to make a choice between two job offers. (İki iş teklifi arasında bir seçim yapmak zorunda kaldı.)","▸ make + soyut isim:","The students have made significant progress this term. (Öğrenciler bu dönem önemli ilerleme kaydetti.)","He made a real effort to improve his English. (İngilizcesini geliştirmek için gerçek bir çaba gösterdi.)","One person can really make a difference in their community. (Bir kişi topluluğunda gerçekten fark yaratabilir.)","Volunteering at the shelter made an impact on her life. (Barınakta gönüllülük hayatında bir etki bıraktı.)","His arguments don't make sense to me. (İddiaları bana mantıklı gelmiyor.)","She made a great impression at the job interview. (İş görüşmesinde harika bir izlenim bıraktı.)","▸ make + birini bir hâle sokmak:","His joke made everyone laugh. (Şakası herkesi güldürdü.)","The news made her cry. (Haber onu ağlattı.)","Loud music makes me nervous. (Yüksek sesli müzik beni gerginleştiriyor.)","His behaviour made his parents proud. (Davranışı ailesini gururlandırdı.)","▸ make up — phrasal:","I haven't made up my mind yet. (Henüz karar veremedim.)","Children love making up stories. (Çocuklar hikaye uydurmayı sever.)","They had a big fight but made up the next day. (Büyük bir kavga ettiler ama ertesi gün barıştılar.)"],tip:"make + noun kombinasyonları ezberlenmeli: 'do a mistake' YANLIŞ → 'make a mistake' ✅. make = bir şeyi var etmek, üretmek, oluşturmak. Genel kural: make → bir şeyi yaratmak / üretmek; do → bir eylem gerçekleştirmek (do homework, do the dishes)."},
    {t:"TAKE — Almak, Götürmek, Sürmek",r:"take → almak, sürmek, kabul etmek, götürmek. Eylem isimleriyle birleşip 'o eylemi yapmak' anlamına gelir (take a shower, take a break).",s:"",ex:["▸ take + eylem ismi (= o eylemi yapmak):","Let me take a photo of you in front of the bridge. (Köprünün önünde fotoğrafını çekeyim.)","I'm going to take a quick shower before dinner. (Yemekten önce çabuk bir duş alacağım.)","She decided to take a break after working for six hours. (Altı saat çalıştıktan sonra mola vermeye karar verdi.)","I usually take a short nap after lunch. (Genelde öğle yemeğinden sonra kısa bir şekerleme yaparım.)","Take a deep breath and try to relax. (Derin bir nefes al ve rahatlamaya çalış.)","Let's take a walk in the park this afternoon. (Bu öğleden sonra parkta yürüyüş yapalım.)","Take a seat — the doctor will be with you in a moment. (Otur lütfen — doktor birazdan gelecek.)","▸ take + risk / sorumluluk:","Don't be afraid to take risks in your career. (Kariyerinde risk almaktan korkma.)","She took a chance and applied for the senior position. (Şansını denedi ve üst pozisyona başvurdu.)","He took full responsibility for the team's mistake. (Ekibin hatasının tüm sorumluluğunu aldı.)","Someone needs to take charge of this project. (Birinin bu projeyi üstlenmesi gerekiyor.)","▸ take place / take effect:","The wedding will take place in a small village church. (Düğün küçük bir köy kilisesinde gerçekleşecek.)","The new law takes effect next Monday. (Yeni yasa önümüzdeki Pazartesi yürürlüğe giriyor.)","The painkillers should take effect within twenty minutes. (Ağrı kesicilerin yirmi dakika içinde etki etmesi gerekir.)","▸ take advantage of / take part in:","We took advantage of the sunny weather and went for a hike. (Güneşli havadan yararlandık ve yürüyüşe çıktık.)","Over a thousand students took part in the survey. (Anketle binden fazla öğrenci katıldı.)","▸ take + zaman (sürmek):","It takes about thirty minutes to walk to the station. (İstasyona yürümek yaklaşık otuz dakika sürer.)","The project will take at least six months to complete. (Projeyi tamamlamak en az altı ay sürecek.)","It took me ages to find a parking spot downtown. (Şehir merkezinde park yeri bulmam yıllar aldı.)","▸ take someone somewhere (götürmek):","Can you take me to the airport tomorrow morning? (Yarın sabah beni havaalanına götürebilir misin?)","Her parents took her to Paris for her birthday. (Doğum günü için ailesi onu Paris'e götürdü.)"],tip:"take time → sürmek. 'It takes + süre + to + V1' kalıbı çok yaygın. take + eylem adı → o eylemi yapmak. AmE'de 'take a shower / take a bath' tercih edilir; BrE'de 'have a shower / have a bath' daha yaygın."},
    {t:"HAVE — Sahip Olmak, Deneyimlemek, Yaptırmak",r:"have → 4 temel işlev: (1) sahip olmak, (2) bir deneyim yaşamak / eylem yapmak, (3) birine bir şey yaptırmak (causative), (4) 'have + V3' ile perfect zaman kurmak. Causative 'have' sınavda sıkça çıkar!",s:"",ex:["▸ have + isim (SAHİP OLMAK):","I have an old car that still runs perfectly. (Hâlâ çok iyi çalışan eski bir arabam var.)","Do you have any plans for the weekend? (Hafta sonu için planın var mı?)","She has three brothers and one sister. (Üç erkek kardeşi ve bir kız kardeşi var.)","I don't have time to chat right now. (Şu an sohbet edecek vaktim yok.)","I think I have an idea — let me try something. (Sanırım bir fikrim var — bir şey deneyeyim.)","▸ have + eylem ismi (DENEYİM):","We had a meeting with the new clients this morning. (Bu sabah yeni müşterilerle toplantımız oldu.)","Let's have lunch together next week. (Önümüzdeki hafta birlikte öğle yemeği yiyelim.)","I had a long conversation with my professor yesterday. (Dün hocamla uzun bir sohbet ettim.)","We had a great time at your birthday party. (Doğum günü partinde harika vakit geçirdik.)","Did you have a good flight? (İyi bir uçuş muydu?)","I'd love to have a chat with you when you're free. (Müsait olduğunda seninle sohbet etmek isterim.)","Can I have a look at your notes? (Notlarına bakabilir miyim?)","I'm going to have a shower before bed. (Yatmadan önce duş alacağım. — BrE)","Let me have a go at this puzzle. (Bu bulmacaya bir deneyim ben.)","▸ have + nesne + V3 (CAUSATIVE — yaptırmak):","I had my hair cut yesterday — what do you think? (Dün saçımı kestirdim — ne dersin?)","She had her car repaired at the garage down the road. (Arabasını sokaktaki tamirde tamir ettirdi.)","We had the kitchen painted last weekend. (Geçen hafta sonu mutfağı boyattık.)","He had his photo taken for the new ID card. (Yeni kimlik için fotoğrafını çektirdi.)","I need to have my eyes tested — I think my vision is getting worse. (Gözlerimi muayene ettirmem lazım — galiba görüşüm zayıflıyor.)","▸ have + soyut isim (mecazi sahiplik):","Sleep deprivation has a serious effect on cognitive function. (Uyku yoksunluğunun bilişsel işlev üzerinde ciddi etkisi var.)","Climate change has a huge impact on global food supply. (İklim değişikliğinin küresel gıda arzında büyük etkisi var.)","I have no choice but to accept the offer. (Teklifi kabul etmekten başka çarem yok.)","She has a tendency to overthink small problems. (Küçük sorunları çok düşünme eğilimi var.)","▸ have + perfect (yardımcı fiil olarak):","We've had a lot of rain this month. (Bu ay çok yağmur yaşadık / aldık.)","She has lived in Istanbul since 2018. (2018'den beri İstanbul'da yaşıyor.)"],tip:"Causative 'have': 'have + nesne + V3' = bir şeyi birine yaptırmak. 'I cut my hair' → kendim kestim. 'I had my hair cut' → birisi kesti. Bu yapı YDS'de sıkça çıkar! Alternatifi: 'get + nesne + V3' aynı anlamı verir, biraz daha gündelik: 'I got my hair cut' ✅. Ayrıca: 'have someone do sth' (V1, baseform) → birine yaptırmak: 'I had the mechanic fix my car.'"},
  ]},
  {id:"daily",title:"Gündelik İfadeler",icon:"💬",color:"#f97316",subs:[
    {t:"Katılma (Agreeing)",r:"Birinin fikrine katıldığını belirtmek.",s:"",ex:["Exactly! / Absolutely! / That's right! (Kesinlikle! / Aynen öyle!)","I couldn't agree more. (Daha fazla katılamam — tamamen katılıyorum.)","You make a good point. (İyi bir noktaya değiniyorsun.)","I'm of the same opinion. (Aynı fikirdeyim — resmi/akademik)"],tip:""},
    {t:"Karşı Çıkma (Disagreeing)",r:"Nazikçe farklı düşünceni belirtmek.",s:"",ex:["I see your point, but... (Anladığını anlıyorum ama...)","I'm not sure I agree with that. (Bununla hemfikir olduğumdan emin değilim.)","That's not quite right. (Bu tam olarak doğru değil.)","With all due respect, I disagree. (Saygıyla ifade etmek gerekirse, katılmıyorum.)"],tip:"Doğrudan 'you're wrong' demek kaba sayılır."},
    {t:"Adres Tarifi",r:"Yön tarifi yaparken kullanılan kalıplar.",s:"",ex:["Go straight ahead and turn left at the corner. (Düz gidin ve köşede sola dönün.)","It's on your right, just past the traffic lights. (Trafik ışıklarını geçince sağınızda.)","You can't miss it — it's right next to the bank. (Kaçıramazsınız — bankanın hemen yanında.)","Take the second turning on the right. (İkinci sağa sapın.)"],tip:""},
    {t:"Doğal Karşılaşma",r:"Biriyle karşılaşınca söylenenler.",s:"",ex:["Long time no see! (Çok oldu görüşmeyeli!)","Fancy meeting you here! (Seni burada görmeyi beklemiyordum!)","How have you been? (Nasıl gidiyordu?)","What are you up to these days? (Bu aralar ne yapıyorsun?)","We should catch up sometime. (Bir gün buluşup sohbet etmeliyiz.)"],tip:""},
    {t:"Katılma & Ekleme",r:"Konuşmaya katkı eklemek.",s:"",ex:["Not only that, but... (Yalnızca o değil, ayrıca...)","What's more, ... / On top of that, ... (Dahası, / Bunun üstüne...)","Speaking of which, ... (Bu arada bu konudan bahsetmişken...)","Come to think of it, ... (Şimdi düşününce...)"],tip:""},
    {t:"Sipariş Verme (Ordering)",r:"Restoran, kafe veya mağazada sipariş/istek bildirirken kullanılan kalıplar. 'Give me...' yerine bunları kullanmak çok daha doğal ve nazik kaçar.",s:"I'd like / Can I get / Could I have / I'll have + sipariş",ex:["I'd like a cappuccino and a slice of cheesecake, please. (Bir kapuçino ve bir dilim cheesecake lütfen. — en yaygın, kibarca)","Can I get a table for two? (İki kişilik masa alabilir miyim? — ABD & Avustralya'da çok doğal)","Could I have the bill, please? / Could we get the menu? (Hesabı alabilir miyim? / Menüyü getirebilir misiniz?)","I'll have the grilled salmon with a side salad. (Izgara somonu yan salatayla alacağım. — restoranda kesin seçim belirtme)","Could you make that without onions? (Onu soğansız yapabilir misiniz? — özel istek)","Is the pasta dish suitable for vegetarians? (Makarna yemeği vejeteryanlar için uygun mu? — bilgi sorma)","I'm afraid this isn't what I ordered. (Korkarım sipariş ettiğim bu değil. — nazikçe şikayet)","Could I swap the fries for a salad? (Patatesi salatayla değiştirebilir miyim? — değişiklik isteği)"],tip:"'Give me...' ➜ kaba. 'I'll have...' veya 'I'd like...' ➜ kibar ve doğal. 'Can I get...' ➜ ABD İngilizcesinde çok yaygın, İngiliz İngilizcesinde biraz resmi dışı ama anlaşılır."},
  ]},
  {id:"prepositions",title:"Prepositions — in / on / at",icon:"📍",color:"#14b8a6",subs:[
    {t:"AT — Zaman (Time)",r:"at → belirli/spesifik zaman noktaları. Saatler, kısa özel zamanlar ve gün bölümü istisnaları için kullanılır.",s:"at + belirli zaman noktası",ex:["The meeting starts at 3 o'clock. (Toplantı saat 3'te başlıyor — belirli saat.)","I can't sleep at night. (Geceleri uyuyamıyorum — gün bölümü istisnası.)","We usually visit family at Christmas / at Easter. (Noel'de / Paskalya'da — kısa bayramlar.)","Everyone was silent at that moment. (O anda — at the moment, at the same time.)","I'll meet you at lunchtime / at midnight. (Öğle vakti / gece yarısı.)"],tip:"İSTİSNALAR: at night (in the night değil!), at the weekend (BrE — AmE'de 'on the weekend'), at Christmas/Easter AMA on Christmas Day. Gün/tarih değil, NOKTA → at."},
    {t:"ON — Zaman (Time)",r:"on → günler ve tarihler için. Spesifik bir gün veya belirli bir günün bölümü için kullanılır.",s:"on + gün / tarih",ex:["The exam is on Monday. (Sınav Pazartesi günü.)","She was born on July 4th, 1995. (4 Temmuz 1995'te doğdu — tam tarih.)","We had a party on my birthday. (Doğum günümde parti verdik.)","I'll call you on Friday morning. (Cuma sabahı arayacağım — belirli bir günün bölümü → on.)","Shops are closed on New Year's Day. (Yılbaşı günü dükkanlar kapalı — özel gün.)"],tip:"TUZAK: 'in the morning' (genel) AMA 'on Monday morning' (belirli bir günün sabahı) → spesifiklik 'on' gerektirir. Ayrıca 'on time' = tam zamanında, 'in time' = yetişerek. Karıştırma!"},
    {t:"IN — Zaman (Time)",r:"in → aylar, mevsimler, yıllar, yüzyıllar ve uzun dönemler. Ayrıca gün bölümlerinin GENEL hâli ve 'X zaman sonra' için.",s:"in + ay / mevsim / yıl / dönem",ex:["She was born in January / in 1998 / in the 21st century. (Ocak'ta / 1998'de / 21. yüzyılda.)","It often rains in spring / in winter. (İlkbaharda / kışın — mevsimler.)","I study best in the morning / in the evening. (Sabahları / akşamları — genel gün bölümü.)","The report will be ready in two hours. (Rapor iki saat SONRA hazır olacak — gelecekte süre.)","Life was very different in the Middle Ages. (Orta Çağ'da — uzun dönem.)"],tip:"KLASİK YDS TUZAĞI: 'in two hours' = iki saat SONRA (gelecek). 'for two hours' = iki saat BOYUNCA (süre). 'within two hours' = iki saat içinde (sınır). Üçü de farklı!"},
    {t:"AT — Yer (Place)",r:"at → spesifik bir NOKTA veya etkinlik. 'Tam olarak nerede?' sorusunun cevabı bir nokta ise 'at'.",s:"at + spesifik nokta / etkinlik",ex:["I'll wait for you at the bus stop / at the door. (Otobüs durağında / kapıda — spesifik nokta.)","She's at home / at work / at school. (Evde / işte / okulda — article'sız sabit kalıplar.)","We met at the conference / at the meeting. (Konferansta / toplantıda — etkinlik.)","Turn left at the traffic lights. (Trafik ışıklarında sola dön — nokta.)","He studies at Oxford University. (Oxford Üniversitesi'nde okuyor — kurum.)"],tip:"EZBERLENECEK KALIPLAR: at home, at work, at school, at university, at the airport, at the station, at the top/bottom, at the corner. Bunlar sabittir, article almaz."},
    {t:"ON — Yer (Place)",r:"on → bir YÜZEY üzerinde temas. Ayrıca sokaklar, katlar, büyük toplu taşıma araçları ve medya için.",s:"on + yüzey / hat / araç",ex:["The book is on the table / on the wall. (Masada / duvarda — yüzey teması.)","My office is on the second floor. (Ofisim ikinci katta.)","I live on Oxford Street. (Oxford Caddesi'nde — AmE'de 'on', BrE'de 'in' da kullanılır.)","She's on the bus / on the train / on a plane. (Otobüste / trende / uçakta — büyük toplu taşıma.)","I saw it on TV / on the internet / on the news. (Televizyonda / internette / haberlerde — medya.)"],tip:"ULAŞIM KURALI (ÇOK ÖNEMLİ): BÜYÜK araçlar (içinde ayakta durabileceğin) → on: on the bus, on the train, on a plane, on a ship. KÜÇÜK araçlar → in: in a car, in a taxi. Bisiklet/motosiklet/at ise 'on': on a bike, on a horse!"},
    {t:"IN — Yer (Place)",r:"in → KAPALI / ÇEVRİLİ bir alan içinde. Şehirler, ülkeler, odalar, kutular ve küçük araçlar için.",s:"in + kapalı / sınırlı alan",ex:["She lives in Istanbul / in Turkey. (İstanbul'da / Türkiye'de — şehir, ülke.)","The keys are in the drawer / in the box. (Çekmecede / kutuda — iç mekân.)","Get in the car, quickly! (Arabaya bin — küçük araç için 'in'.)","I read it in the newspaper / in a book. (Gazetede / kitapta okudum.)","There are no clouds in the sky today. (Bugün gökyüzünde bulut yok.)"],tip:"HİYERARŞİ: at (nokta) → on (yüzey/hat) → in (kapalı alan). 'at the house' = adreste/kapıda; 'in the house' = evin içinde. Şehir/ülke DAİMA 'in': 'in London' ✅, 'at London' ❌"},
    {t:"Sabit Edatlar (Fixed Prepositions)",r:"Bazı fiil ve sıfatlar belirli edatlarla sabit biçimde gelir. Bunlar ezberlenmelidir; mantıkla çözmek çoğu zaman yanıltır.",s:"fiil / sıfat + sabit edat",ex:["FİİL + edat: depend ON, rely ON, insist ON, focus ON; think OF/ABOUT, dream OF/ABOUT; listen TO, belong TO, object TO; consist OF, approve OF; look FOR, apologise FOR, wait FOR; agree WITH, cope WITH, deal WITH.","SIFAT + edat: interested IN, fluent IN, successful IN; good AT, bad AT, surprised AT; afraid OF, proud OF, aware OF, capable OF; similar TO, married TO, addicted TO; satisfied WITH, familiar WITH; famous FOR, responsible FOR.","İNCE AYRIM: 'agree WITH sb' (biriyle hemfikir) vs 'agree ON sth' (bir konuda anlaş) vs 'agree TO sth' (bir şeyi kabul et). Üç farklı anlam!","'Look AT' (bakmak) vs 'look FOR' (aramak) vs 'look AFTER' (ilgilenmek) vs 'look UP' (sözlükten aramak) — hepsi farklı.","'Different FROM' (BrE) / 'different THAN' (AmE) / 'different TO' (BrE konuşma) — sınavlarda 'from' beklenir."],tip:"EN SIK YAPILAN HATALAR (edat YOK — takmayın!): 'discuss ABOUT sth' ❌ → 'discuss sth' ✅. 'attend TO a meeting' ❌ → 'attend a meeting' ✅. 'marry WITH sb' ❌ → 'marry sb' ya da 'get married TO sb' ✅. 'enter INTO the room' ❌ → 'enter the room' ✅. 'mention ABOUT sth' ❌ → 'mention sth' ✅."},
  ]},
  {id:"questions",title:"Soru Cümleleri (WH-Questions)",icon:"❓",color:"#ef4444",subs:[
    {t:"Soru Kurma — Temel Yapı",r:"İngilizcede iki ana soru türü vardır: (1) Yes/No soruları — yardımcı fiil başa gelir. (2) WH-soruları — soru kelimesi + yardımcı fiil + özne + ana fiil sırasıyla dizilir. Yardımcı fiil yoksa 'do/does/did' kullanılır.",s:"WH-word + aux + S + V1 ...?  /  Aux + S + V1 ...?",ex:["Where DO you live? (Nerede yaşıyorsun? — aux: do)","When DID she arrive? (Ne zaman geldi? — aux: did, ana fiil V1)","Why IS he crying? (Neden ağlıyor? — aux: is, to be kendi yardımcısı)","Have you finished your homework? (Ödevini bitirdin mi? — Yes/No, aux başta)","What HAS he done? (Ne yapmış? — aux: has)","Can you swim? (Yüzebilir misin? — modal başta)"],tip:"ALTIN KURAL: 'do/does/did' kullanılıyorsa ana fiil DAİMA V1 (yalın) olur! 'Where did you went?' ❌ → 'Where did you go?' ✅. 'to be' (am/is/are/was/were) ve modaller (can, will, should) kendi yardımcısıdır — ekstra 'do' gerekmez."},
    {t:"who / whom / whose — Kim / Kimi / Kimin",r:"who → kişi sorgusu (özne veya nesne). whom → resmi/yazılı dilde nesne/edat sonrası ('To whom...'). whose → sahiplik. Unutma: 'who' günlük dilde hem özne hem nesne için kullanılabilir.",s:"Who + V ? / Who(m) + aux + S + V1 ? / Whose + noun ?",ex:["Who called you last night? (Seni dün akşam KİM aradı? — özne sorgusu, 'did' YOK!)","Who(m) did you call? (Sen KİMİ aradın? — nesne sorgusu, 'did' VAR.)","Who is that woman in the red coat? (Kırmızı paltolu o kadın kim?)","To whom should I address the letter? (Mektubu KİME yazmalıyım? — resmi.)","Whose bag is this? (Bu kimin çantası?)","Whose is this pen? (Bu kalem kimin? — sahibi kim?)"],tip:"KRİTİK AYRIM: 'Who called you?' (Seni kim aradı? — özne) vs 'Who(m) did you call?' (Sen kimi aradın? — nesne). Özne sorgusunda yardımcı fiil YOK, fiil üçüncü tekilse '-s' alır. Nesne sorgusunda do/does/did zorunlu."},
    {t:"what — Ne / Nasıl bir",r:"what → nesne, kavram, tanım sorgusu; ayrıca 'Ne tür / hangi' anlamında isim öncesi kullanılır. Seçenek sınırsızken 'what', sınırlıyken 'which' tercih edilir.",s:"What + aux + S + V1 ? / What + noun + aux + S + V1 ?",ex:["What do you want for dinner? (Akşam yemeğinde ne istiyorsun?)","What happened at the meeting? (Toplantıda ne oldu? — özne sorgusu, 'did' YOK!)","What kind of music do you like? (Ne tür müzik seversin?)","What colour is your new car? (Yeni arabanın rengi ne?)","What does 'serendipity' mean? (Serendipity ne demek?)","What are you doing this weekend? (Bu hafta sonu ne yapıyorsun?)"],tip:"'What... like?' → tanımlama/nitelik: 'What is she like?' (nasıl biri?) ≠ 'What does she look like?' (neye benziyor — fiziksel) ≠ 'What does she like?' (neyi sever?). Üçü de farklı!"},
    {t:"when / what time — Zaman",r:"when → genel zaman (gün, ay, yıl, dönem). what time → spesifik saat. 'When' geniş, 'what time' dar kapsamlıdır.",s:"When/What time + aux + S + V1 ?",ex:["When did you move to Istanbul? (İstanbul'a ne zaman taşındın? — tarih/dönem.)","What time does the film start? (Film saat kaçta başlıyor? — spesifik saat.)","When is your birthday? (Doğum günün ne zaman?)","What time is it? (Saat kaç? — saat sorusu.)","When will the report be ready? (Rapor ne zaman hazır olacak?)","What time do you usually wake up? (Genellikle saat kaçta uyanırsın?)"],tip:"'What time is it?' ✅ en yaygın saat sorusu. 'How is the time?' ❌ yanlış. Resmi/yazılı dilde 'At what time...?' de kullanılır: 'At what time does the ceremony begin?'"},
    {t:"where — Nerede / Nereye / Nereden",r:"where → yer/yön sorgusu. Edatlar (to, from, at) genellikle soru sonuna atılır; resmi dilde 'To where / From where' başa gelebilir.",s:"Where + aux + S + V1 (+ edat) ?",ex:["Where do you live? (Nerede yaşıyorsun?)","Where are you going? (Nereye gidiyorsun? — 'to' düşürüldü.)","Where did you buy that jacket? (O ceketi nereden aldın? — 'from' düşürüldü.)","Where is the nearest pharmacy? (En yakın eczane nerede?)","Where were you born? (Nerede doğdun?)","Where does this road lead to? (Bu yol nereye çıkıyor? — 'to' sonda.)"],tip:"TUZAK: Türkçede 'nereye/nereden' diyoruz ama İngilizce'de çoğu zaman sadece 'where' yeter. 'Where are you from?' (Nerelisin?) — 'from' şart. 'Where are you going?' (Nereye gidiyorsun?) — 'to' opsiyonel, genelde atılır."},
    {t:"why — Neden / Niçin",r:"why → sebep sorgusu. Cevabı genellikle 'because', 'since', 'due to' ile başlar. 'Why not...?' öneri/teklif kalıbıdır.",s:"Why + aux + S + V1 ?",ex:["Why are you so quiet today? (Bugün neden bu kadar sessizsin?)","Why didn't you tell me earlier? (Neden bana daha önce söylemedin?)","Why is learning English so difficult? (İngilizce öğrenmek neden bu kadar zor?)","Why not try a different approach? (Farklı bir yaklaşım denesek? — öneri.)","Why should I trust him? (Ona neden güvenmeliyim?)","Why has the meeting been postponed? (Toplantı neden ertelendi?)"],tip:"'Why don't you + V1?' ve 'Why not + V1?' → her ikisi de 'neden ... yapmıyorsun/yapmıyoruz?' anlamında öneri. 'Why don't we go to the cinema?' (Sinemaya gitsek mi?) — çok doğal kullanım."},
    {t:"which — Hangi / Hangisi",r:"which → SINIRLI/bilinen bir grup içinden seçim. 'what' ise SINIRSIZ seçenek. 'Which one' = hangisi (tek). 'which of' + zamir/isim öbeği yaygındır.",s:"Which (+ noun) + aux + S + V1 ?",ex:["Which colour do you prefer, red or blue? (Hangi rengi tercih edersin, kırmızı mı mavi mi? — sınırlı: 2 seçenek.)","Which of these books is yours? (Bu kitaplardan hangisi senin?)","Which university did she attend? (Hangi üniversiteye gitti?)","Which one do you want? (Hangisini istiyorsun?)","Which route is faster? (Hangi güzergah daha hızlı?)","Which of you speaks French? (Hanginiz Fransızca konuşuyor?)"],tip:"'what' vs 'which' TUZAĞI: 'What car do you drive?' (herhangi bir araba — sınırsız) vs 'Which car is yours?' (park yerindeki arabalardan — sınırlı). Seçenek sayısı belliyse DAİMA 'which'. Sınavda klasik soru!"},
    {t:"whose — Kimin / Kime ait",r:"whose → sahiplik sorgusu. İsimsiz tek başına da kullanılır. Relative clause'larda da geçer ('the man whose car...').",s:"Whose (+ noun) + aux + S + V ?",ex:["Whose phone is ringing? (Kimin telefonu çalıyor?)","Whose car did you borrow? (Kimin arabasını ödünç aldın?)","Whose is this jacket? (Bu ceket kimin?)","Whose turn is it to pay? (Ödeme sırası kimde?)","Whose idea was it to come here? (Buraya gelmek kimin fikriydi?)","Whose side are you on? (Sen kimin tarafındasın?)"],tip:"KARIŞTIRILAN: 'whose' (kimin — sahiplik) ≠ 'who's' (who is/has — kısaltma). 'Who's coming?' (Kim geliyor?) vs 'Whose coat is this?' (Bu ceket kimin?). Telaffuzları aynı, anlamları farklı!"},
    {t:"how — Nasıl / Ne kadar",r:"how → yöntem/durum sorgusu. Tek başına 'nasıl'; sıfat/zarfla birleşince 'ne kadar ___'. En üretken soru kelimesidir.",s:"How (+ adj/adv) + aux + S + V1 ?",ex:["How do you know him? (Onu nereden/nasıl tanıyorsun?)","How was your weekend? (Hafta sonun nasıldı?)","How did you solve this problem? (Bu sorunu nasıl çözdün?)","How old are you? (Kaç yaşındasın? — literally 'ne kadar yaşlı'.)","How tall is she? (Boyu kaç?)","How far is the station? (İstasyon ne kadar uzakta?)"],tip:"'How' + sıfat kalıpları SINAV ALTINI: how old (yaş), how tall (boy), how far (uzaklık), how deep (derinlik), how heavy (ağırlık), how wide (genişlik), how fast (hız). 'How are you?' (nasılsın?) ≠ 'How old are you?' (kaç yaşında?)."},
    {t:"how often — Ne sıklıkta",r:"how often → bir eylemin sıklığını sorar. Cevap olarak sıklık zarfları (always, usually, often, sometimes, rarely, never) veya sıklık ifadeleri (once a week, every day, twice a month) gelir.",s:"How often + aux + S + V1 ?",ex:["How often do you exercise? (Ne sıklıkta egzersiz yaparsın? — Cevap: three times a week.)","How often does she visit her parents? (Ailesini ne sıklıkta ziyaret ediyor?)","How often do you check your email? (E-postanı ne sıklıkta kontrol ediyorsun?)","How often did you travel last year? (Geçen yıl ne sıklıkta seyahat ettin?)","How often should I water this plant? (Bu bitkiyi ne sıklıkta sulamalıyım?)","How often have you been to the dentist this year? (Bu yıl dişçiye kaç kez gittin?)"],tip:"TİPİK CEVAPLAR: every day / week / month / year; once/twice/three times a week; daily, weekly, monthly; always, usually, often, sometimes, rarely, hardly ever, never. 'How often...?' sorusu DAİMA Present Simple ile sorulur (alışkanlık)."},
    {t:"how long — Ne kadar süre / Ne kadar uzun",r:"how long → (1) süre sorgusu — 'ne kadar süredir / sürecek'. (2) uzunluk/mesafe sorgusu — 'ne kadar uzun'. Bağlam belirler.",s:"How long + aux + S + V ?",ex:["How long have you been studying English? (Ne zamandır İngilizce çalışıyorsun? — süre, Present Perfect.)","How long does the flight take? (Uçuş ne kadar sürüyor?)","How long will the meeting last? (Toplantı ne kadar sürecek?)","How long is the Nile River? (Nil nehri ne kadar uzun? — fiziksel uzunluk.)","How long did you wait for him? (Onu ne kadar bekledin?)","How long have they been married? (Ne zamandır evliler?)"],tip:"SÜRE SORGUSU KALIBI: 'How long have you + V3/V-ing...?' → Present Perfect (Continuous) ile sorulur. Cevap: 'for two years' (iki yıldır) veya 'since 2020' (2020'den beri). 'How long is it?' = fiziksel uzunluk. Bağlam farkı yaratır."},
    {t:"how much / how many — Ne kadar / Kaç tane",r:"how much → SAYILAMAZ isimlerle (water, money, time, information, sugar). how many → SAYILABİLİR çoğul isimlerle (books, people, cups, cars). Fiyat sorgusunda DAİMA 'how much'.",s:"How much + uncountable ? / How many + countable plural ?",ex:["How much water do you drink daily? (Günde ne kadar su içersin? — sayılamaz.)","How many cups of coffee have you had? (Kaç fincan kahve içtin? — sayılabilir.)","How much does this cost? (Bu ne kadar? — fiyat DAİMA 'much'.)","How many people came to the party? (Partiye kaç kişi geldi?)","How much time do we have left? (Ne kadar vaktimiz kaldı? — time sayılamaz.)","How many languages can you speak? (Kaç dil konuşabiliyorsun?)"],tip:"TUZAK: 'how much money' ✅ (money sayılamaz), 'how many dollars' ✅ (dollars sayılabilir). Aynı kavram, farklı isim → farklı soru! Ölçü birimi girince sayılabilir olur: 'How much sugar?' → 'How many spoons of sugar?'"},
    {t:"Özne Sorgusu vs Nesne Sorgusu",r:"Bu ayrım YDS/YÖKDİL'de en sık çıkan tuzaklardan biri. Özne sorgusunda yardımcı fiil KULLANILMAZ; fiil özne konumundaki soru kelimesine göre çekimlenir. Nesne sorgusunda do/does/did zorunludur.",s:"Özne: WH + V (no aux!) / Nesne: WH + aux + S + V1",ex:["ÖZNE: Who called you? (Seni kim aradı? — 'who' öznedir, fiil doğrudan.)","NESNE: Who did you call? (Sen kimi aradın? — 'you' özne, 'who' nesne, 'did' zorunlu.)","ÖZNE: What happened? (Ne oldu? — 'did' YOK!)","NESNE: What did you do? (Sen ne yaptın? — 'did' VAR.)","ÖZNE: Which team won? (Hangi takım kazandı?)","NESNE: Which team did you support? (Hangi takımı destekledin?)"],tip:"ALTIN KURAL: 'who/what/which' cümlenin ÖZNESİ ise yardımcı fiil eklemezsin; fiil üçüncü tekil şahıs gibi çekimlenir. 'Who likes pizza?' ✅ / 'Who does like pizza?' ❌ (vurgu dışında). Soru zamirinden hemen sonra EYLEM geliyorsa özne sorgusudur."},
    {t:"Dolaylı Sorular (Indirect Questions)",r:"Başka bir cümlenin içine yerleştirilmiş sorular. Word order soru sıralaması DEĞİL, düz cümle sıralamasıdır. Yardımcı fiil ('do/does/did') ortadan kaybolur. 'if/whether' Yes/No sorularında kullanılır.",s:"... + WH-word + S + V ... / ... + if/whether + S + V ...",ex:["Direct: Where does she live? → Indirect: Do you know where she LIVES? ('does' kayboldu, fiil çekimlendi.)","Direct: What time is it? → Indirect: Can you tell me what time it IS? (düz sıralama!)","Direct: Did he call? → Indirect: I wonder if he CALLED. (Yes/No → 'if/whether'.)","Could you tell me where the nearest bank is? (En yakın banka nerede söyler misiniz?)","I'm not sure whether she agrees or not. (Kabul edip etmediğinden emin değilim.)","Do you have any idea why the flight was delayed? (Uçuşun neden geciktiğini biliyor musun?)"],tip:"EN BÜYÜK HATA: 'Can you tell me where IS the bank?' ❌ → 'Can you tell me where the bank IS?' ✅. Dolaylı soruda soru sıralaması YOK! Nezaket için dolaylı yapı kullanılır — doğrudan 'Where is the bank?' yerine restoranda/otelde daha kibar."},
  ]},
];

// ══════════════════════════════════════════════════════════════
//  GRAMMAR QUIZ DATA
// ══════════════════════════════════════════════════════════════
const GRAMMAR_QUIZ = {
  "Zamanlar": [
    {q:"She ___ in this city for five years.",opts:["lives","is living","has lived","had lived"],ans:2,exp:"Present Perfect — 'for' ile süren durum."},
    {q:"When I arrived at the party, most people ___.",opts:["left","were leaving","had left","have left"],ans:2,exp:"Past Perfect — 'arrived' eyleminden önce tamamlanmış."},
    {q:"Look at those clouds — it ___ to rain.",opts:["will","is going","is going to","shall"],ans:2,exp:"'going to' — gözlemden çıkarılan yakın gelecek tahmini."},
    {q:"While he ___ TV, the doorbell rang.",opts:["watched","was watching","had watched","has watched"],ans:1,exp:"Past Continuous — devam eden eylemi kesen başka eylem."},
    {q:"The sun ___ in the east. That's a scientific fact.",opts:["rises","is rising","has risen","rose"],ans:0,exp:"Present Simple — her zaman geçerli genel gerçek."},
    {q:"I ___ to Paris twice in my life so far.",opts:["went","was going","have been","had gone"],ans:2,exp:"Present Perfect — 'in my life' ile deneyim/yaşam geçmişi."},
    {q:"By the time she arrives, we ___ the presentation.",opts:["will finish","are finishing","will have finished","finished"],ans:2,exp:"Future Perfect — gelecekte belirli bir ana kadar tamamlanmış olacak."},
    {q:"He ___ his homework before his parents came home.",opts:["finished","has finished","had finished","was finishing"],ans:2,exp:"Past Perfect — geçmişte daha önce tamamlanan eylem."},
    {q:"I ___ a great new café downtown. Let's go!",opts:["found","have found","had found","was finding"],ans:1,exp:"Present Perfect — yakın geçmişte olup şu ana bağlı ('just found')."},
    {q:"She ___ TV every evening as a habit.",opts:["watches","is watching","has watched","was watching"],ans:0,exp:"Present Simple — düzenli alışkanlık."},
    {q:"Don't call me at 3 PM — I ___ in a meeting.",opts:["will be","am","have been","was"],ans:0,exp:"Future Continuous — gelecekte belli bir anda devam edecek eylem."},
    {q:"She ___ for the company since 2015.",opts:["works","worked","has worked","had worked"],ans:2,exp:"Present Perfect — 'since' ile başlangıç noktasından bu yana süren durum."},

  vocab:{"passive":"edilgen, pasif","cognitive":"bilişsel, zihinsel","consolidation":"pekiştirme, sağlamlaştırma","emotional":"duygusal","regulation":"düzenleme, regülasyon","deprivation":"yoksunluk, mahrumiyet","impair":"zayıflatmak, bozmak","cardiovascular":"kardiyovasküler, kalp-damar","sacrificed":"feda edilmiş, vazgeçilmiş","optimal":"en uygun, ideal","consolidates":"pekiştirir, güçlendirir","chronic":"kronik, uzun süren","leisure":"boş zaman, serbest zaman"},body:`Sleep is not merely a passive state of rest but an active process essential for cognitive function, memory consolidation, and emotional regulation. Research suggests that adults require between seven and nine hours of quality sleep per night to maintain optimal health.

During sleep, the brain consolidates memories by transferring information from short-term to long-term storage. Moreover, sleep deprivation has been shown to impair decision-making and increase the risk of chronic diseases such as diabetes and cardiovascular illness.

Despite its importance, sleep is frequently sacrificed in favour of work or leisure activities. Establishing consistent sleep schedules and minimising screen exposure before bedtime are practical strategies to improve sleep quality.`,
  bodyTr:`Uyku, yalnızca edilgen bir dinlenme hali değil; bilişsel işlev, bellek pekiştirme ve duygusal düzenleme açısından vazgeçilmez bir aktif süreçtir. Araştırmalar, yetişkinlerin en iyi sağlık düzeyini koruyabilmek için geceleri yedi ila dokuz saat kaliteli uyku alması gerektiğini ortaya koymaktadır.

Uyku sırasında beyin, bilgileri kısa süreli bellekten uzun süreli belleğe aktararak anıları pekiştirir. Üstelik uyku yoksunluğunun karar verme yetisini zayıflattığı ve diyabet ile kalp-damar hastalıkları gibi kronik rahatsızlık riskini artırdığı da gösterilmiştir.

  {id:2,topic:"Günlük",title:"A Busy Morning",
  vocab:{"overslept":"geç uyandı, fazla uyudu","rushed":"koşturdu, aceleyle gitti","breathless":"nefes nefese, soluk soluğa","colleague":"iş arkadaşı, meslektaş","anniversary":"yıl dönümü","considered":"göz önünde bulundurdu, düşündü","greeted":"karşıladı, selamladı"},body:`It was one of those mornings when everything seemed to go wrong. The alarm didn't go off, which meant Sarah overslept by an hour. She rushed to the bathroom, only to find that there was no hot water. She made do with a cold shower and was out the door in fifteen minutes.

On the bus, she realised she had forgotten her laptop at home. She considered going back but decided against it — the meeting couldn't wait. She called her colleague to explain the situation, who kindly offered to share a screen.

By the time she arrived at the office, slightly breathless, her team greeted her with a cake. She had completely forgotten it was her work anniversary. Suddenly, the morning didn't seem so bad after all.`,
  bodyTr:`Her şeyin ters gittiği sabahlardan biriydi bu. Alarm çalmadı; Sarah bir saat uyuya kaldı. Koşarak banyoya gitti, ancak sıcak su olmadığını fark etti. Soğuk duşla idare edip on beş dakikada kapıdan çıktı.

Otobüste dizüstü bilgisayarını evde unuttuğunu fark etti. Geri dönmeyi düşündü ama vazgeçti — toplantı bekleyemezdi. Durumu açıklamak için iş arkadaşını aradı; o da nazikçe ekranını paylaşmayı teklif etti.

Ofise geldiğinde, nefes nefese ve biraz soluğu kesilmiş halde, ekibi onu bir pasta ile karşıladı. İş yıl dönümünü tamamen unutmuştu. Birden sabah o kadar da kötü görünmemeye başladı.`,

  {id:3,topic:"Şehircilik",title:"The Right to the City",
  vocab:{"articulated":"dile getirdi, ifade etti","collective":"kolektif, toplumsal","inhabitants":"sakinler, ikamet edenler","accumulation":"birikim, yığılma","gentrification":"soylaştırma, dönüşüm","displaces":"yerinden eder, tasfiye eder","privatised":"özelleştirilmiş","civic":"kentsel, sivil, yurttaşlık","prioritises":"önceliklendirmek","inclusive":"kapsayıcı","infrastructure":"altyapı","regardless":"bakılmaksızın, ne olursa"},body:`The concept of the 'right to the city', first articulated by French philosopher Henri Lefebvre in 1968, goes far beyond mere access to urban resources. It is a collective demand to reshape the city in accordance with the needs of its inhabitants rather than the logic of capital accumulation.

In contemporary cities, however, this right is increasingly under threat. Gentrification displaces long-standing communities, transforming affordable neighbourhoods into spaces catering primarily to wealthier newcomers. Public spaces are privatised, and the design of urban environments often prioritises consumption over civic life.

Reclaiming the right to the city therefore requires more than individual choice — it demands organised collective action, democratic participation in urban planning, and policies that guarantee affordable housing, accessible public space, and inclusive infrastructure for all residents, regardless of income.`,
  bodyTr:`Fransız düşünür Henri Lefebvre tarafından 1968'de ilk kez dile getirilen "kente hak" kavramı, kentsel kaynaklara erişimin çok ötesine geçer. Bu kavram, kenti sakinlerinin ihtiyaçları doğrultusunda biçimlendirme talebi; yani sermaye birikim mantığına değil, insana dayalı bir kent anlayışı için kolektif bir çağrıdır.

Ne var ki çağdaş kentlerde bu hak giderek artan bir baskıyla karşı karşıyadır. Soylaştırma, köklü toplulukları yerinden ederek uygun fiyatlı mahalleleri ağırlıklı olarak daha varlıklı yeni sakinlere hizmet eden mekânlara dönüştürmektedir. Kamusal alanlar özelleştirilmekte; kentsel tasarım çoğunlukla sivil yaşamı değil tüketimi öncelikli kılmaktadır.

Bu nedenle kente hakkı yeniden kazanmak bireysel tercihten fazlasını gerektirir: örgütlü kolektif eylem, kent planlamasına demokratik katılım ve tüm sakinlere — gelir düzeyi ne olursa olsun — uygun fiyatlı konut, erişilebilir kamusal alan ve kapsayıcı altyapı güvencesi sağlayan politikalar şarttır.`,

  {id:4,topic:"Ekoloji",title:"Urban Ecology and Green Infrastructure",
  vocab:{"encroach":"tecavüz etmek, el atmak","fragmenting":"parçalayan, bölen","biodiversity":"biyoçeşitlilik","wastelands":"atıl alanlar, çorak alanlar","aesthetic":"estetik","bioswales":"biyolojik drenaj kanalları","corridors":"koridorlar, geçiş yolları","permeable":"geçirgen","stormwater":"yağmur suyu, sel suyu","mortality":"ölüm oranı","disparity":"eşitsizlik, uçurum","equitable":"adil, eşit","proximity":"yakınlık, coğrafi mesafe"},body:`As cities expand, they increasingly encroach upon natural habitats, fragmenting ecosystems and reducing biodiversity. Yet urban environments need not be ecological wastelands. The emerging field of urban ecology examines how nature persists and even thrives within city boundaries, and how urban green infrastructure can be designed to support it.

Green roofs, urban forests, bioswales, and wildlife corridors are not merely aesthetic additions to the cityscape. They perform crucial ecological services: regulating temperature, absorbing stormwater, filtering air pollutants, and providing habitat for a surprisingly wide range of species. Research has shown that cities with well-connected green networks support significantly higher levels of biodiversity than those where green spaces are isolated and fragmented.

Moreover, equitable access to urban green space has profound implications for public health. Studies consistently link proximity to parks and trees with lower levels of stress, improved mental health outcomes, and reduced mortality from cardiovascular disease. Critically, however, green spaces are not distributed equally — low-income neighbourhoods frequently suffer from a severe lack of accessible greenery, a disparity that urban planners and policymakers must urgently address.`,
  bodyTr:`Kentler büyüdükçe doğal yaşam alanlarına giderek daha fazla el atmakta, ekosistemleri parçalamakta ve biyoçeşitliliği azaltmaktadır. Oysa kentsel çevreler ekolojik açıdan çorak alanlar olmak zorunda değildir. Gelişmekte olan kent ekolojisi alanı, doğanın kent sınırları içinde nasıl varlığını sürdürdüğünü ve hatta nasıl gelişebildiğini araştırmaktadır.

Yeşil çatılar, kent ormanları, biyolojik drenaj kanalları ve yaban hayatı koridorları, kentsel manzaraya katılan sıradan estetik unsurlar değildir. Sıcaklığı düzenleme, yağmur suyunu emme, hava kirleticilerini filtreleme ve geniş bir tür yelpazesine habitat sağlama gibi kritik ekolojik işlevler üstlenirler. Araştırmalar, birbirine iyi bağlı yeşil ağlara sahip kentlerin çok daha yüksek biyoçeşitlilik düzeylerini desteklediğini ortaya koymaktadır.

Dahası, kentsel yeşil alanlara eşit erişim halk sağlığı açısından derin sonuçlar doğurmaktadır. Araştırmalar, park ve ağaçlara yakınlığı düşük stres düzeyleriyle, iyileşmiş ruh sağlığı sonuçlarıyla ve kalp-damar hastalıklarından kaynaklanan ölümlerin azalmasıyla tutarlı biçimde ilişkilendirmektedir. Ancak yeşil alanlar eşit dağılmamaktadır; düşük gelirli mahalleler sıklıkla ciddi ölçüde bu alanlardan yoksundur.`,

  {id:5,topic:"İklim Değişikliği",title:"Climate Change and Urban Vulnerability",
  vocab:{"existential":"varoluşsal","intensify":"yoğunlaştırmak, şiddetlendirmek","phenomenon":"olgu, fenomen","prevalence":"yaygınlık","impervious":"geçirimsiz, su geçirmez","prolonged":"uzun süren, uzatılmış","vulnerable":"savunmasız, kırılgan","infrastructural":"altyapısal","withstand":"dayanmak, göğüs germek","permeable":"geçirgen","marginalised":"marjinalleştirilmiş, dışlanmış","adaptation":"uyum, adaptasyon","resilient":"dayanıklı, dirençli"},body:`Climate change poses an existential challenge to cities worldwide. Rising sea levels threaten coastal urban centres, while increasing temperatures intensify the urban heat island effect — a phenomenon whereby cities absorb and retain more heat than surrounding rural areas due to the prevalence of impervious surfaces such as concrete and asphalt.

Extreme weather events, including prolonged droughts, flash floods, and heatwaves, are becoming more frequent and more severe. Cities in the Global South are particularly vulnerable, as they often lack the financial and infrastructural resources needed to adapt. Yet even wealthy cities are ill-prepared; studies have consistently shown that existing infrastructure was not designed to withstand the climate conditions now being projected for the coming decades.

Meaningful climate adaptation requires a fundamental rethinking of urban design. This includes the expansion of permeable surfaces to reduce flooding, investment in cooling centres and heat-resilient building materials, early warning systems for extreme weather, and the relocation of communities situated in high-risk zones. Most urgently, it demands that those who bear the greatest burden of climate impacts — typically the poorest and most marginalised — be placed at the centre of planning and decision-making processes.`,
  bodyTr:`İklim değişikliği, dünya genelindeki kentler için varoluşsal bir meydan okuma oluşturmaktadır. Yükselen deniz seviyeleri kıyı kentlerini tehdit ederken, artan sıcaklıklar kentsel ısı adası etkisini şiddetlendirmektedir. Bu olgu, beton ve asfalt gibi geçirimsiz yüzeylerin yaygınlığı nedeniyle kentlerin çevrelerindeki kırsal alanlara oranla daha fazla ısı emip tutması anlamına gelir.

Uzun süren kuraklıklar, ani seller ve sıcak hava dalgaları gibi aşırı hava olayları giderek daha sık ve daha şiddetli bir hal almaktadır. Küresel Güney'deki kentler özellikle savunmasızdır; bu kentler çoğunlukla uyum sağlamak için gereken finansal ve altyapısal kaynaklardan yoksundur. Oysa varlıklı kentler bile hazırlıksız yakalanmaktadır.

Anlamlı bir iklim uyumu, kentsel tasarımın köklü biçimde yeniden düşünülmesini gerektirmektedir. Bu; geçirgen yüzeylerin genişletilmesini, serin merkezlere yatırım yapılmasını, erken uyarı sistemlerinin kurulmasını ve yüksek riskli bölgelerdeki toplulukların yerinden edilmesini kapsamaktadır. En acil olan ise iklim etkilerinin en ağır yükünü taşıyanları — çoğunlukla en yoksul ve en dışlanmış kesimleri — planlama süreçlerinin merkezine koymaktır.`,

  {id:6,topic:"Yoksulluk",title:"The Structural Roots of Urban Poverty",
  vocab:{"misrepresented":"yanlış sunulmuş, çarpıtılmış","consequence":"sonuç, netice","framing":"çerçeveleme, sunum biçimi","obscures":"gizler, karartır","perpetuate":"sürdürmek, devam ettirmek","precarious":"güvencesiz, kırılgan","inadequate":"yetersiz","discrimination":"ayrımcılık","systematic":"sistematik, düzenli","defunding":"finansmanı kesmek","compounding":"birleşik, katmerleşen","disproportionately":"orantısız biçimde","bureaucratic":"bürokratik","intervention":"müdahale"},body:`Urban poverty is frequently misrepresented as a consequence of individual failure — laziness, poor decision-making, or lack of ambition. This framing conveniently obscures the structural forces that produce and perpetuate poverty: precarious labour markets, inadequate social protection, discrimination in housing and employment, and the systematic defunding of public services in low-income areas.

In cities across the world, the working poor often face a compounding series of disadvantages. They are concentrated in informal or low-wage employment with no job security, paid sick leave, or prospects for advancement. They are disproportionately affected by environmental hazards such as air pollution and flooding. Their children attend underfunded schools. And they must navigate bureaucratic systems designed without their needs in mind.

Addressing urban poverty therefore requires not charity but structural change: living wages, universal access to quality public services, anti-discrimination enforcement, and democratic control over urban development. Without confronting the political economy of the city — who owns it, who profits from it, and who is systematically excluded — any anti-poverty intervention risks treating symptoms while the underlying causes persist.`,
  bodyTr:`Kent yoksulluğu, çoğunlukla bireysel başarısızlığın — tembelliğin, yanlış kararların ya da hırs eksikliğinin — bir sonucu olarak yanlış biçimde tanımlanmaktadır. Bu çerçeveleme, yoksulluğu üreten ve sürdüren yapısal güçleri elverişli biçimde gizlemektedir: güvencesiz emek piyasaları, yetersiz sosyal güvence, ayrımcılık ve kamu hizmetlerinin sistematik olarak yoksunlaştırılması.

Dünya genelindeki kentlerde çalışan yoksullar çoğunlukla katmerleşen bir dezavantajlar silsilesiyle yüzleşmek zorunda kalmaktadır. İş güvencesi, ücretli hastalık izni ya da kariyer olanağı olmaksızın enformel veya düşük ücretli işlerde yoğunlaşmaktadırlar. Çevre kirliliği ve seller gibi tehlikelerden orantısız biçimde etkilenmektedirler. Çocukları yetersiz finanse edilen okullara gitmektedir.

Kent yoksulluğunu ele almak, hayırseverliği değil yapısal değişimi gerektirir: yaşanabilir ücretler, kaliteli kamu hizmetlerine evrensel erişim, ayrımcılıkla mücadele ve kentsel gelişim üzerinde demokratik denetim. Kentin siyasi ekonomisiyle — kimin sahip olduğuyla, kimin kâr ettiğiyle ve kimin dışlandığıyla — yüzleşmeksizin herhangi bir müdahale, köklü nedenler sürerken yalnızca belirtileri tedavi etme riskiyle karşı karşıya kalacaktır.`,

  ],

  {id:7,topic:"Anarşizm",title:"Anarchism and the Self-Organised City",
  vocab:{"synonymous":"eşanlamlı, özdeş","hierarchical":"hiyerarşik, ast-üst ilişkisine dayalı","domination":"tahakküm, egemenlik","voluntary":"gönüllü, isteğe bağlı","municipalism":"belediyecilik, yerel yönetim anlayışı","confederalism":"konfederalizm","assemblies":"meclisler, toplantılar","federate":"federasyon kurmak, birleşmek","surrendering":"teslim olmak, vazgeçmek","explicitly":"açıkça, doğrudan","contend":"öne sürmek, iddia etmek","authentic":"özgün, gerçek","liberation":"kurtuluş, özgürleşme"},body:`Anarchism is widely misunderstood as synonymous with chaos. In fact, as a political philosophy, it is precisely the opposite: a principled argument against hierarchical domination and for voluntary, self-organised cooperation among equals. For anarchist thinkers from Peter Kropotkin to Murray Bookchin, the city is not merely a backdrop to political life but a potential site of radical democratic transformation.

Bookchin's concept of 'libertarian municipalism' — later developed into 'democratic confederalism' — proposes that genuine democracy cannot be exercised through the nation-state but must be built from the ground up through directly democratic neighbourhood assemblies. These assemblies would federate horizontally, coordinating decisions across larger territories without surrendering authority to any centralised power.

This vision has found practical expression in places such as Rojava in northern Syria, where Kurdish communities have established council-based governance structures drawing explicitly on Bookchin's ideas. Critics argue that such models are difficult to scale and vulnerable to external pressure. Supporters, however, contend that they offer the most authentic form of self-governance yet attempted — one in which the city itself becomes an instrument of liberation rather than control.`,
  bodyTr:`Anarşizm geniş ölçüde kaoşun eş anlamlısı olarak yanlış anlaşılmaktadır. Oysa bir siyasi felsefe olarak tam anlamıyla bunun tersidir: hiyerarşik tahakküme karşı ve eşitler arasında gönüllü, öz-örgütlü işbirliği için ilkesel bir argümandır. Peter Kropotkin'den Murray Bookchin'e uzanan anarşist düşünürler için kent, köklü demokratik dönüşümün gerçekleşebileceği potansiyel bir alandır.

Bookchin'in "liberteryenist belediyecilik" kavramı, gerçek demokrasinin ulus-devlet aracılığıyla değil, doğrudan demokratik mahalle meclisleri aracılığıyla tabandan inşa edilmesi gerektiğini öne sürer. Bu meclisler yatay biçimde federasyonlaşarak, herhangi bir merkezileşmiş iktidara yetki devretmeksizin daha geniş coğrafyalarda kararları koordine edecektir.

Bu vizyon, Kuzey Suriye'deki Rojava'da pratik ifadesini bulmuştur; burada Kürt topluluklar açıkça Bookchin'in fikirlerinden yararlanarak konsey temelli yönetim yapıları kurmuşlardır. Eleştirmenler, bu tür modellerin ölçeklenmesinin güç olduğunu öne sürmektedir. Destekçiler ise bu modellerin, kentin bir denetim aracı değil özgürleşmenin bir aracı haline geldiği en özgün öz-yönetim biçimini sunduğunu savunmaktadır.`,

  {id:8,topic:"Ekoloji",title:"The Commons and Ecological Stewardship",
  vocab:{"renaissance":"rönesans, yeniden doğuş","rehabilitated":"rehabilite edilmiş, itibarı iade edilmiş","empirical":"ampirik, deneyimsel","sustainably":"sürdürülebilir biçimde","privatisation":"özelleştirme","sanctions":"yaptırımlar","stewardship":"koruyuculuk, yöneticilik","embed":"yerleştirmek, içine işlemek","governance":"yönetişim, yönetim biçimi","prominent":"öne çıkan, belirgin","boundaries":"sınırlar","cooperative":"kooperatif, işbirliğe dayalı"},body:`The concept of 'the commons' — resources held collectively and managed by a community for shared benefit — has enjoyed a remarkable renaissance in ecological and political thought. Long declared 'tragically' doomed by Garrett Hardin's influential 1968 essay, the commons has been rehabilitated by decades of empirical research, most prominently by the work of Elinor Ostrom, who won the Nobel Prize in Economics for demonstrating that communities are capable of managing shared resources sustainably without either privatisation or state control.

Ostrom's research identified key conditions under which commons governance succeeds: clearly defined boundaries, rules adapted to local conditions, collective decision-making, mechanisms for monitoring and enforcement, and graduated sanctions for rule violations. Crucially, those who use the resource must have a meaningful voice in the rules that govern it.

In the context of ecological crisis, the commons framework offers a powerful alternative to both unregulated markets and top-down state management. Urban land trusts, community-managed forests, water cooperatives, and seed banks are contemporary examples of commons institutions that embed ecological responsibility into governance. They suggest that sustainability is not merely a technical problem but a political one — achievable only when communities have genuine power over the resources on which their lives depend.`,
  bodyTr:`Ortak fayda için bir topluluk tarafından kolektif biçimde tutulan ve yönetilen kaynaklara verilen ad olan "müşterekler" kavramı, ekolojik ve siyasi düşüncede dikkate değer bir rönesans yaşamaktadır. Garrett Hardin'in 1968 tarihli etkili makalesinde "trajik" biçimde mahkûm edilen müşterekler, yıllar içinde yapılan ampirik araştırmalarla rehabilite edilmiştir. Bu süreçte öne çıkan isim Elinor Ostrom'dur; özelleştirme ya da devlet kontrolü olmaksızın toplulukların ortak kaynakları sürdürülebilir biçimde yönetebildiğini kanıtlayan çalışmasıyla Ekonomi Nobel Ödülü'ne layık görülmüştür.

Ostrom'un araştırması, müşterekler yönetiminin başarılı olduğu temel koşulları belirlemiştir: açıkça tanımlanmış sınırlar, yerel koşullara uyarlanmış kurallar, kolektif karar alma ve kademeli yaptırımlar. Belirleyici olan şudur: kaynağı kullananların onu yöneten kurallarda anlamlı bir söz hakkına sahip olması gerekmektedir.

Ekolojik kriz bağlamında müşterekler çerçevesi, hem kontrolsüz piyasalara hem de yukarıdan aşağıya devlet yönetimine güçlü bir alternatif sunmaktadır. Kentsel arazi vakıfları, topluluk yönetimindeki ormanlar ve su kooperatifleri çağdaş örneklerdir. Sürdürülebilirlik yalnızca teknik bir sorun değil, aynı zamanda siyasi bir sorundur.`,

  questions:[{q:"What three contemporary examples of commons institutions does the text mention?",a:"Urban land trusts, community-managed forests, water cooperatives (and seed banks)."},{q:"What does Ostrom's research suggest about the relationship between communities and shared resources?",a:"Communities are capable of managing shared resources sustainably when they have a voice in the rules governing those resources."}]},

  {id:9,topic:"Tarih",title:"The Black Death and the Transformation of Medieval Europe",
  vocab:{"catastrophic":"yıkıcı, felakete yol açan","bubonic":"veba türüne ait (bubonic plague = veba)","penetrated":"nüfuz etti, içine işledi","staggering":"sarsıcı, şaşırtıcı","depopulated":"nüfusu eritilmiş, boşaltılmış","disproportionately":"orantısız biçimde","unprecedented":"emsalsiz, daha önce görülmemiş","scarcity":"kıtlık, azlık","feudalism":"feodalizm, derebeylik sistemi","demographic":"demografik, nüfusla ilgili","orthodoxy":"ortodoksluk, geleneksel inanç","clergy":"din adamları, ruhban sınıfı","mortality":"ölüm oranı","negotiate":"müzakere etmek","serfdom":"serflik, köylü köleliği","peasantry":"köylüler, tarım işçileri"},
  body:`Between 1347 and 1351, the Black Death swept across Europe with catastrophic force, killing an estimated one-third to one-half of the continent's population. Originating in Central Asia and spreading along trade routes through the Mediterranean, the bubonic plague reached Sicily in 1347 and rapidly penetrated northward and westward, leaving devastated communities in its wake.

The immediate consequences were staggering. Entire villages were depopulated. The clergy, who ministered to the dying, suffered disproportionately high mortality rates. Traditional social hierarchies were upended: with so many labourers dead, the surviving peasantry found themselves in a position of unprecedented bargaining power. Landowners who had relied on cheap, dependent serf labour suddenly faced acute scarcity, and many peasants were able to negotiate better wages and conditions — or simply to leave their lords and seek employment elsewhere.

The longer-term effects proved no less transformative. The plague deeply destabilised the authority of the Catholic Church, whose prayers and rituals had visibly failed to halt the catastrophe. Survivors began to question theological orthodoxy, contributing to the intellectual climate that would eventually give rise to the Renaissance and, a century and a half later, the Reformation. Economically, the demographic collapse accelerated the decline of feudalism, encouraging the shift towards wage labour and early market economies that would characterise the early modern period.`,
  bodyTr:`1347'den 1351'e dek Kara Veba, yıkıcı bir güçle Avrupa'yı kasıp kavurdu ve kıtanın nüfusunun tahminen üçte biri ile yarısı arasında bir kesimini yok etti. Orta Asya'da başlayıp Akdeniz üzerinden ticaret yollarıyla yayılan veba, 1347'de Sicilya'ya ulaştı ve hızla kuzeye ve batıya doğru ilerledi.

Anlık sonuçlar sarsıcıydı. Tüm köyler ıssızlaştı. Din adamları orantısız biçimde yüksek ölüm oranlarıyla yüzleşti. Geleneksel toplumsal hiyerarşiler altüst oldu: pek çok emekçinin ölmesiyle birlikte hayatta kalan köylüler emsalsiz bir pazarlık gücüne kavuştu. Toprak sahipleri ciddi bir işgücü kıtlığıyla karşılaştı; birçok köylü daha iyi ücret ve koşullar için müzakere edebildi.

Uzun vadeli etkiler de dönüştürücüydü. Veba, Katolik Kilisesi'nin otoritesini derinden sarstı. Hayatta kalanlar teolojik ortodoksiyi sorgulamaya başladı; bu durum sonunda Rönesans'a ve Reform'a zemin hazırladı. Ekonomik açıdan ise demografik çöküş, feodalizmin gerilişini hızlandırdı ve ücretli emek ile erken piyasa ekonomilerine geçişi teşvik etti.`,

    {q:"Approximately what proportion of Europe's population died during the Black Death?",opts:["One tenth","One quarter","One third to one half","Two thirds"],ans:2},

    {q:"According to the text, which long-term economic change did the Black Death help accelerate?",opts:["The establishment of centralised national banks","The decline of feudalism and growth of wage labour","The expansion of international trade networks","The rise of industrial manufacturing"],ans:1},
    {q:"The word 'upended' in the second paragraph most closely means:",opts:["strengthened and reinforced","overturned or disrupted completely","studied carefully","gradually reformed"],ans:1},
  ],

  {id:10,topic:"Tarih",title:"The Industrial Revolution and the Making of the Modern City",
  vocab:{"industrialisation":"sanayileşme","unprecedented":"emsalsiz, daha önce görülmemiş","sanitation":"sanitasyon, temizlik altyapısı","cholera":"kolera","tenements":"eski kiracı apartmanları","exploitation":"sömürü, istismar","legislation":"mevzuat, yasalar","proletariat":"proletarya, işçi sınıfı","squalor":"sefalet, berbat koşullar","philanthropists":"hayırseverler","mechanisation":"mekanizasyon, makineleşme","surplus":"artı, fazlalık","precedent":"emsal, örnek","appalling":"dehşet verici, iç karartıcı","contaminated":"kirletilmiş, zehirlenmiş","progressively":"giderek, aşamalı olarak"},
  body:`The Industrial Revolution, which began in Britain in the latter half of the eighteenth century and spread across Europe and North America throughout the nineteenth, fundamentally reshaped human settlement patterns. The introduction of steam-powered machinery and factory production drew millions of rural labourers into rapidly expanding urban centres in search of employment, triggering a wave of urbanisation without historical precedent.

The cities that emerged from this process were, for the great majority of their inhabitants, places of immense hardship. Workers — including children as young as five or six — laboured for twelve to sixteen hours a day in dangerous factory conditions for wages that barely sustained survival. Housing conditions in working-class districts were appalling: overcrowded tenements lacked clean water and adequate sanitation, and recurring cholera epidemics — the most deadly of which struck London in 1854 — were directly traceable to contaminated water supplies. Life expectancy in industrial slums was startlingly low, sometimes barely half that of rural areas.

This era also produced the ideological and political responses that would define the modern world. Karl Marx and Friedrich Engels, witnessing the conditions of the Manchester working class first-hand, developed their analysis of capitalism and the revolutionary role of the industrial proletariat. Trade union movements grew steadily in power, eventually winning legislative victories: the Factory Acts in Britain progressively restricted child labour and working hours. By the end of the century, urban reformers, public health advocates, and philanthropists had begun to lay the foundations of what would become the modern welfare state — transforming the city from an engine of unregulated exploitation into a site of social rights and democratic demand.`,
  bodyTr:`On sekizinci yüzyılın ikinci yarısında İngiltere'de başlayan ve on dokuzuncu yüzyıl boyunca Avrupa ile Kuzey Amerika'ya yayılan Sanayi Devrimi, insanlığın yerleşim kalıplarını kökten dönüştürdü. Buhar gücüyle çalışan makineler ve fabrika üretimi, milyonlarca kırsal işçiyi hızla büyüyen kentsel merkezlere çekti ve tarihte emsali görülmemiş bir kentleşme dalgası yaşandı.

Bu süreçten doğan kentler, sakinlerinin büyük çoğunluğu için muazzam bir çilekeşlik mekânıydı. İşçiler — beş ya da altı yaşındaki çocuklar dahil — günde on iki ile on altı saat arasında tehlikeli koşullarda çalıştı. Konut koşulları ürpertici bir görünüm taşıyordu: kalabalık apartmanlar temiz su ve sanitasyondan yoksundu; kolera salgınları kirlenmiş su kaynaklarına bağlanabiliyordu.

Bu dönem, modern dünyayı biçimlendirecek ideolojik ve siyasi tepkileri de doğurdu. Marx ve Engels, Manchester işçi sınıfının koşullarını gözlemleyerek kapitalizm analizini geliştirdiler. Sendikalar güç kazanarak çocuk işçiliğini kısıtlayan yasal zaferler elde etti. Yüzyıl sonunda kent reformcuları, modern refah devletinin temellerini atmaya başlamıştı.`,
