  {id:11,topic:"Anarşizm / Tarih",title:"The Spanish Revolution: CNT-FAI and the Anarchist Experiment",
  vocab:{"insurrection":"ayaklanma, isyan","collectivisation":"kolektivizasyon, toplulaştırma","anarcho-syndicalism":"anarko-sendikalizm","expropriated":"mülksüzleştirdi, el koydu","militia":"milis, gönüllü ordu","confederación":"konfederasyon (İspanyolca)","libertarian":"özgürlükçü, liberteryenist","spontaneous":"kendiliğinden, spontane","unprecedented":"emsalsiz, daha önce görülmemiş","suppression":"bastırma, baskı altına alma","bourgeois":"burjuva","antifascist":"antifaşist","coercion":"zorlama, baskı","delegates":"delegeler, temsilciler","federation":"federasyon","paralysed":"felç etti, işlevsiz kıldı","simultaneously":"eş zamanlı olarak","dismantled":"söküp dağıttı, tasfiye etti","liquidated":"tasfiye etti, yok etti"},
  body:`In July 1936, General Francisco Franco's military coup against the elected Spanish Republic triggered one of the most remarkable social upheavals of the twentieth century. In Catalonia, Aragon, and parts of the Levante, the response to the coup was not merely military resistance but a sweeping revolutionary transformation — driven above all by the CNT-FAI, the anarcho-syndicalist trade union confederation and its affiliated anarchist federation, which together represented the most powerful working-class organisation in Spanish history.

Within days of the coup, CNT-FAI members — armed workers, peasants, and militants — had defeated the military rebels in Barcelona and much of the east. Simultaneously, they dismantled the existing state apparatus in the territories they controlled. Factories, transport networks, utilities, and agricultural land were expropriated from their owners and placed under workers' self-management. Committees of delegates, elected from the factory floor and the village, coordinated production and distribution without bosses, managers, or state officials. In the Aragon countryside, hundreds of libertarian communes were established, organising collective farming on a voluntary basis. George Orwell, who arrived in Barcelona in December 1936, described the city as one in which the working class appeared to be genuinely running everything — where tipping was forbidden, formal address had been abolished, and a revolutionary egalitarianism pervaded daily life.

The anarchist experiment was remarkable not only for its scale but for its internal logic: unlike authoritarian revolutionary movements, the CNT-FAI explicitly rejected vanguardism, the idea that a disciplined party must lead the working class to revolution. Power was decentralised, decisions made through assemblies, and participation voluntary rather than compelled by coercion. Industrial output in collectivised enterprises often matched or exceeded pre-war levels, suggesting that workers' self-management was not merely an idealistic vision but a practical reality.

The revolution was ultimately crushed — not only by Franco's advancing nationalist forces but by internal enemies. In May 1937, the Communist Party of Spain, backed by Soviet advisors and arms, launched an assault on the Barcelona telephone exchange operated by the CNT, triggering street fighting that ended in the suppression of the anarchists and the reassertion of Republican state authority. The revolutionary collectives were progressively dismantled, their militias subordinated to a centralised command, and many of their leading figures imprisoned or killed. By the time Franco's final victory came in 1939, the revolutionary transformation that had briefly flourished in Spain had been liquidated from both sides — by fascism and by Stalinism alike. Its legacy, however, endured: the Spanish Revolution remains the most extensive anarchist social experiment in history, and a touchstone for all subsequent debates about self-management, direct democracy, and the possibility of a world without hierarchy.`,
  bodyTr:`Temmuz 1936'da General Franco'nun seçilmiş İspanya Cumhuriyeti'ne karşı gerçekleştirdiği askeri darbe, yirminci yüzyılın en dikkat çekici toplumsal altüst oluşlarından birini tetikledi. Katalonya, Aragon ve Levante'nin bir bölümünde darbeye verilen yanıt yalnızca askeri direniş değil, kapsamlı bir devrimci dönüşümdü; bu dönüşümün baş aktörü anarko-sendikalist sendika konfederasyonu CNT-FAI'ydi.

Darbeden yalnızca günler sonra CNT-FAI üyeleri askeri isyancıları Barselona'da yenilgiye uğrattı. Eş zamanlı olarak mevcut devlet aygıtını söküp dağıttılar. Fabrikalar, ulaşım ağları ve tarım arazileri işçi öz yönetimine bırakıldı. Aragon kırsalında yüzlerce liberteryenist komün kuruldu. George Orwell, Barselona'yı işçi sınıfının her şeyi gerçek anlamda yönettiği bir yer olarak tanımladı.

Anarşist deneyim iç mantığıyla da dikkat çekiciydi: CNT-FAI, öncülük anlayışını reddetti. İktidar merkezsizleştirildi; kararlar meclisler aracılığıyla alındı; katılım gönüllülük esasıyla sağlandı. Ancak devrim nihayetinde ezildi — hem Franco'nun kuvvetleri hem de Sovyet destekli Komünist Parti tarafından. İspanya Devrimi, tarihte gerçekleşmiş en kapsamlı anarşist toplumsal deneyim olarak kalmaktadır.`,

  {id:12,topic:"Akademik Yazı",title:"The Problem of Bias in Research",
  vocab:{"bias":"önyargı, taraflılık","validity":"geçerlilik, doğruluk","verify":"doğrulamak, teyit etmek","inaccurate":"yanlış, hatalı","fabricate":"uydurmak, yalan söylemek","assert":"ileri sürmek, iddia etmek","demonstrate":"kanıtlamak, göstermek","indicate":"göstermek, işaret etmek","drawing on":"yararlanarak, başvurarak","estimate":"tahmin etmek","maintain":"savunmak, sürdürmek","confirm":"doğrulamak, onaylamak","examine":"incelemek, araştırmak","ensure":"sağlamak, garantilemek","reveal":"ortaya çıkarmak, göstermek","convince":"ikna etmek","underestimate":"hafife almak, küçümsemek","mere":"sadece, basit","consider":"göz önünde bulundurmak","assessment":"değerlendirme"},
  body:`Research is never conducted in a vacuum. Every scientist, scholar, and analyst brings a set of assumptions and prior beliefs to their work, and these can introduce bias into the way data is collected, interpreted, and presented. Understanding this is not merely an academic exercise — it has serious practical consequences for the reliability of knowledge on which public policy and professional decisions are based.

One of the most common forms of bias in research is confirmation bias: the tendency to seek out, notice, and remember information that confirms what one already believes, while overlooking evidence to the contrary. A researcher who asserts that a particular intervention is effective may unconsciously design their study in ways that make a positive outcome more likely, or they may examine only those data points that support their hypothesis. When peer reviewers later indicate concerns about the methodology, such a researcher might maintain their original position despite the criticism rather than genuinely consider the validity of the objection.

Drawing on decades of meta-research, scholars have revealed that this problem is far more widespread than scientists themselves typically estimate. Studies demonstrate that fields with high levels of professional investment in a particular outcome — pharmaceuticals, nutrition science, and social psychology among them — show significantly higher rates of findings that confirm researchers' prior expectations. It is therefore easy to underestimate how systematically biased a body of research can become over time without anyone deliberately choosing to fabricate results.

To ensure the integrity of scientific knowledge, researchers must take concrete steps to verify their findings through independent replication, disclose potential conflicts of interest, and submit to rigorous external assessment. An inaccurate finding that enters the literature, however inadvertently, can mislead an entire field for years. Convincing the scientific community of a flawed result is surprisingly easy — correcting it is far harder.`,
  bodyTr:`Araştırma hiçbir zaman boşlukta yürütülmez. Her bilim insanı ve akademisyen, çalışmalarına bir dizi varsayım ve önceden edinilmiş inanç taşır; bunlar verilerin toplanma, yorumlanma ve sunulma biçimine önyargı katabilir. Bunu kavramak yalnızca akademik bir egzersiz değildir; kamu politikasının ve mesleki kararların dayandığı bilginin güvenilirliği açısından ciddi pratik sonuçlar doğurur.

En yaygın önyargı biçimlerinden biri teyit önyargısıdır: kişinin zaten inandığı şeyi destekleyen bilgileri arama ve hatırlama, aksini gösteren kanıtları ise göz ardı etme eğilimi. Belirli bir müdahalenin etkili olduğunu ileri süren bir araştırmacı, olumlu sonucu daha olası kılan biçimlerde çalışmasını bilinçsizce tasarlayabilir.

Araştırmalar, bu sorunun bilim insanlarının kendi tahminlerinin çok ötesinde yaygın olduğunu ortaya koymuştur. Bilimsel bilginin bütünlüğünü güvence altına almak için araştırmacılar bulgularını bağımsız replikasyonla doğrulamalı, çıkar çatışmalarını açıklamalı ve titiz dış değerlendirmeye tabi olmalıdır. Bilim topluluğunu hatalı bir sonuca ikna etmek şaşırtıcı derecede kolaydır; onu düzeltmek ise çok daha güçtür.`,
  mc:[
    {q:"What does the text say about confirmation bias?",opts:["It only affects researchers who deliberately cheat","It is a tendency to favour information that supports existing beliefs","It is easily detected by peer reviewers","It only occurs in fields like pharmaceuticals"],ans:1},
    {q:"According to the text, what does meta-research reveal about bias in science?",opts:["It is confined to a small number of dishonest researchers","It is far more widespread than scientists typically estimate","It has been largely solved by peer review","It only affects quantitative fields"],ans:1},

  {id:13,topic:"Akademik Yazı",title:"Language, Meaning and Ambiguity",
  vocab:{"ambiguity":"belirsizlik, çift anlamlılık","clarify":"açıklamak, netleştirmek","elaborate":"ayrıntılandırmak","signify":"anlamına gelmek, belirtmek","indicate":"göstermek, işaret etmek","audience":"hedef kitle, dinleyici","facilitate":"kolaylaştırmak","mere":"sadece, basit","touch on":"değinmek","demonstrate":"kanıtlamak, göstermek","interrupt":"kesmek, aksatmak","distinctive":"ayırt edici, kendine özgü","consider":"göz önünde bulundurmak","break down":"parçalarına ayırmak","prevent":"önlemek, engellemek","density":"yoğunluk","engagement":"katılım, ilgi","occur":"olmak, meydana gelmek","display":"sergilemek, göstermek","assert":"ileri sürmek"},
  body:`Language is never a perfectly transparent medium. Even the most carefully chosen words carry a certain degree of ambiguity — not merely because speakers sometimes fail to be precise, but because meaning itself is relational, contextual, and constantly shifting. What a word signifies depends not only on a dictionary definition but on who is speaking, to what audience, in what context, and against what background of shared assumptions.

This is why skilled communicators must learn to clarify, not just to speak. A speaker who elaborate on a point only when pressed is missing an opportunity: the moment a listener displays uncertainty or hesitation, it indicates that comprehension has broken down somewhere, and no amount of repetition will prevent confusion if the underlying ambiguity is not directly addressed. To facilitate genuine understanding, one must be willing to break down complex ideas into their constituent parts, to consider alternative interpretations that one's audience might bring, and to acknowledge when a term is being used in a distinctive or technical sense that differs from everyday usage.

Academic writing presents particular challenges in this respect. The density of ideas in scholarly texts can make even careful readers lose the thread of an argument. When writers touch on many themes without elaborating sufficiently on any of them, the resulting text may display impressive range while failing to demonstrate genuine depth. Readers cannot be expected to interrupt their reading to independently research a concept the writer has merely gestured towards. Engagement with the audience is not optional — it is the foundation of effective communication.

Perhaps most importantly, good writers assert their claims with appropriate tentativeness. To say that the evidence 'indicates' something is not weakness; it is honesty. It is the arrogant assumption that one's meaning is self-evident — that clarity will somehow occur automatically — that most often produces writing which obscures rather than illuminates.`,
  bodyTr:`Dil hiçbir zaman tam anlamıyla şeffaf bir araç değildir. En özenle seçilmiş sözcükler bile belirli bir belirsizlik taşır — salt konuşmacıların zaman zaman kesin olmaktan uzak düştüğü için değil, anlamın kendisi ilişkisel, bağlamsal ve sürekli değişen bir yapıya sahip olduğundan. Bir sözcüğün ne anlama geldiği yalnızca sözlük tanımına değil; kimin konuştuğuna, hangi kitleye, hangi bağlamda konuşulduğuna da bağlıdır.

Bu yüzden yetenekli iletişimcilerin yalnızca konuşmayı değil, açıklamayı da öğrenmesi gerekir. Dinleyicide belirsizlik görüldüğü an, anlamanın bir yerde çöktüğü anlamına gelir. Gerçek anlamayı kolaylaştırmak için karmaşık fikirleri bileşen parçalarına bölmeye ve kitlenin getirebileceği alternatif yorumları göz önünde bulundurmaya hazır olmak gerekir.

Akademik yazı bu açıdan özel güçlükler barındırır. Akademik metinlerdeki fikir yoğunluğu, dikkatli okuyucuların bile argümanın ipliğini kaybetmesine yol açabilir. İyi yazarlar iddialarını uygun bir temkinlilikle ileri sürer. Kanıtların bir şeyi "işaret ettiğini" söylemek zayıflık değil, dürüstlüktür. Anlamın apaçık olduğunu varsayan kibirli tutum, aydınlatmak yerine karanlık kılan bir yazıyla sonuçlanır.`,
  mc:[
    {q:"According to the text, why is ambiguity unavoidable in language?",opts:["Because speakers are always careless with words","Because meaning depends on context, speaker, audience, and shared assumptions","Because dictionaries are inaccurate","Because listeners never pay full attention"],ans:1},
    {q:"What does the text say skilled communicators must do?",opts:["Speak more slowly and loudly","Learn to clarify and break down complex ideas for their audience","Use simpler vocabulary at all times","Avoid technical language entirely"],ans:1},
    {q:"What criticism does the author make of some academic writing?",opts:["It is too simple and repetitive","It covers many themes without elaborating sufficiently on any","It is written for specialists and ignores general readers","It relies too heavily on statistics"],ans:1},
    {q:"What does the author say about phrases like 'the evidence indicates'?",opts:["They show that the writer lacks confidence","They are overly cautious and should be avoided","They are honest and appropriately tentative","They are characteristic of poor academic writing"],ans:2},
    {q:"The word 'constituent' in paragraph two most likely means:",opts:["important or significant","making up or forming part of a whole","controversial or debated","easily understood"],ans:1},
  ],
  questions:[{q:"What does the author argue is the foundation of effective communication?",a:"Engagement with the audience — taking responsibility for clarity rather than assuming meaning is self-evident."},{q:"Find a word in the text meaning 'the quality of being recognisably different from others'.",a:"'distinctive'"}]},

  {id:14,topic:"Ekonomi / Toplum",title:"Commodities, Consumption and Cultural Appropriation",
  vocab:{"commodities":"mallar, emtialar","appropriation":"sahiplenme, el koyma","engagement":"katılım, bağlılık","thrive":"gelişmek, serpilmek","occur":"olmak, meydana gelmek","reveal":"ortaya çıkarmak","prevent":"önlemek","cause":"neden olmak; dava, sebep","distinctive":"ayırt edici","display":"sergilemek, göstermek","density":"yoğunluk","messiness":"karmaşıklık, dağınıklık","lattice":"ağ yapısı, kafes","push":"zorlamak, itmek","consider":"göz önünde bulundurmak","signify":"anlamına gelmek","ensure":"sağlamak","facilitate":"kolaylaştırmak","underestimate":"hafife almak","assert":"ileri sürmek"},
  body:`In contemporary consumer societies, cultural symbols and practices are routinely transformed into commodities. A piece of traditional clothing, a sacred pattern, a spiritual ritual — each can be extracted from its original context, stripped of its deeper meaning, and repackaged for mass consumption. This process, often described as cultural appropriation, occurs with particular intensity in the fashion, music, and food industries, where the commercial logic of novelty and differentiation pushes companies to seek out distinctive aesthetics from communities that have historically been marginalised.

The messiness of this debate lies partly in the difficulty of drawing clear lines. Not all cultural exchange is appropriation. Scholars assert that the key distinction lies in the power relations involved: appropriation, in the critical sense, occurs when a dominant group adopts elements from a less powerful one without acknowledgement, reciprocity, or understanding of what those elements signify within their original community. A corporate brand displaying an indigenous pattern on a mass-produced garment while the community that created it lives in poverty is a very different situation from the spontaneous cultural exchange that occurs between individuals in a diverse society.

Digital technology has changed the density and speed at which cultural exchange occurs, facilitating both genuine engagement and shallow commodification at an unprecedented scale. Global platforms ensure that a piece of music or a visual style can thrive far beyond its community of origin within days — but they also reveal how quickly meaning can be lost in translation. Critics underestimate the harm caused when symbols that signify grief, resistance, or sacred identity are reduced to a mere aesthetic trend.

To consider these issues seriously is to confront the lattice of economic, historical, and social relationships that connect producers and consumers across unequal systems. Preventing appropriation outright may be neither possible nor desirable; ensuring that communities have the power to define how their cultural heritage is used, and that they benefit materially from its commercial use, may be a more achievable and meaningful goal.`,
  bodyTr:`Çağdaş tüketim toplumlarında kültürel simgeler ve pratikler, rutin olarak metaya dönüştürülmektedir. Geleneksel bir giysi parçası, kutsal bir desen, ruhani bir ritüel — her biri özgün bağlamından koparılabilir, derin anlamından soyutlanabilir ve kitlesel tüketime yönelik yeniden paketlenebilir. Bu süreç, özellikle moda, müzik ve gıda endüstrilerinde yoğun biçimde yaşanmaktadır.

Bu tartışmanın karmaşıklığı kısmen net sınırlar çizmenin güçlüğünden kaynaklanmaktadır. Her kültürel alışveriş sahiplenme değildir. Akademisyenler, kilit ayrımın güç ilişkilerinde yattığını ileri sürmektedir: sahiplenme, baskın bir grubun daha az güçlü bir topluluktan unsurları, o unsurların özgün anlamını tanımadan benimsemesi durumunda gerçekleşir.

Dijital teknoloji, kültürel alışverişin gerçekleştiği yoğunluğu ve hızı değiştirmiş; emsalsiz bir ölçekte hem gerçek katılımı hem de sığ metalaşmayı kolaylaştırmıştır. Toplulukların kültürel miraslarının nasıl kullanılacağını tanımlama gücüne sahip olmasını ve bundan maddi olarak yararlanmasını güvence altına almak, sahiplenmeyi tümüyle önlemekten daha ulaşılabilir ve daha anlamlı bir hedef olabilir.`,
  mc:[
    {q:"According to the text, what drives companies to adopt cultural elements from marginalised communities?",opts:["A genuine interest in cultural diversity","The commercial logic of novelty and differentiation","Legal requirements for cultural inclusion","Pressure from consumers to be more authentic"],ans:1},

//  GÜNÜN DERSİ — Deterministik Kelime Seçimi
//  Aynı tarih → her zaman aynı 10 kelime (kullanıcı + mail eşleşir)
// ══════════════════════════════════════════════════════════════
function getDailyWords(words, dateStr) {
  // Tarih string'inden tohum (seed) oluştur — basit hash
  let seed = 0;
  for (let i = 0; i < dateStr.length; i++) {
    seed = (seed * 31 + dateStr.charCodeAt(i)) >>> 0;
  }
  // Seedlenmiş psödo-rastgele permütasyon
  const arr = [...words];
  let s = seed;
  for (let i = arr.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) >>> 0;
    const j = s % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, 10);
}

function getWeeklyWords(words, dateStr) {
  let seed = 0;
  for (let i = 0; i < dateStr.length; i++) {
    seed = (seed * 31 + dateStr.charCodeAt(i)) >>> 0;
  }
  // Günlük seçimden farklı sıralama için XOR
  seed = (seed ^ 0xABCDEF) >>> 0;
  const arr = [...words];
  let s = seed;
  for (let i = arr.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) >>> 0;
    const j = s % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, 30);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getUrlDay() {
  const params = new URLSearchParams(window.location.search);
  return params.get('day') || todayStr();
}

//  TELAFFUZ — Web Speech API (tarayıcının yerleşik özelliği)
// ══════════════════════════════════════════════════════════════
function speakWord(text, accent = 'en-US') {
  if (!('speechSynthesis' in window)) {
    alert('Tarayıcınız sesli okuma desteklemiyor.');
    return;
  }
  window.speechSynthesis.cancel(); // önceki sesi durdur
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = accent;
  utterance.rate = 0.9;
  window.speechSynthesis.speak(utterance);
}

  }, []);

  // Words
  const [words, setWords] = useState(INIT_WORDS);
  const [wCat, setWCat] = useState("Tümü");

  const [showAddWord, setShowAddWord] = useState(false);

  // Grammar

  // Texts
  const [tOpen, setTOpen] = useState(null);
  const [tAnswers, setTAnswers] = useState({});
  const [tRevealed, setTRevealed] = useState({});
  const [tTrOpen, setTTrOpen] = useState(null); // Turkish translation toggle
  const [vocabPopup, setVocabPopup] = useState(null); // {word, meaning}
  // Notes
  const [notes, setNotes] = useState([
    {id:1,title:"Hoş Geldin! 👋",text:"Bu senin kişisel not defterindir. Öğrendiğin kuralları, kelimeleri veya notları buraya ekle.\n\nSağ üstteki + ile yeni not ekleyebilirsin."},
  ]);
  const [noteEdit, setNoteEdit] = useState(null);
  const [noteForm, setNoteForm] = useState({title:"",text:""});
  // Flashcard
  const [fcCat, setFcCat] = useState("Tümü");
  const [fcIdx, setFcIdx] = useState(0);
  const [fcFlipped, setFcFlipped] = useState(false);
  // Quiz
  const [qType, setQType] = useState("word"); // "word" | "grammar"
  const [qWordCat, setQWordCat] = useState("Tümü");
  const [qGramCat, setQGramCat] = useState("Zamanlar");
  const [quiz, setQuiz] = useState({on:false,cur:0,sel:null,score:0,ans:[],done:false,qs:[]});

  // ── WORDS ───────────────────────────────────────────────────
  const filteredWords = words.filter(w =>
    (wCat==="Tümü" || w.category===wCat) &&

  );
  const PER_PAGE = 15;
  const totalPages = Math.max(1, Math.ceil(filteredWords.length / PER_PAGE));

  function addWord() {
    if (!newWord.en || !newWord.tr) return;
    setWords(ws => [...ws, {...newWord, id: Date.now(), mastery:0}]);

  // ── FLASHCARD ───────────────────────────────────────────────
  const fcWords = fcCat==="Tümü" ? words : words.filter(w=>w.category===fcCat);
  function nextFc(dir) {
    setFcFlipped(false);
    setFcIdx(i => (i + (dir||1) + fcWords.length) % fcWords.length);

  // ── QUIZ ────────────────────────────────────────────────────
  function startQuiz() {
    if (qType==="word") {
      const pool = qWordCat==="Tümü" ? words : words.filter(w=>w.category===qWordCat);
      if (pool.length < 4) return;
      const qs = [...pool].sort(()=>Math.random()-.5).slice(0,10).map(w => {

    hsub: {fontSize:11,color:"#64748b",marginTop:3,letterSpacing:"1px",textTransform:"uppercase"},
    tabBar: {display:"flex",justifyContent:"center",flexWrap:"wrap",gap:4,padding:"10px 14px 6px",borderBottom:"1px solid rgba(255,255,255,.06)",marginBottom:4},
    tabBtn: (active) => ({display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 11px",border:"none",background:active?"rgba(167,139,250,.12)":"none",cursor:"pointer",color:active?"#a78bfa":"#475569",borderRadius:12,transition:"all .2s",minWidth:52}),
    tabIcon: {fontSize:17},
    tabLabel: (active) => ({fontSize:9,fontWeight:700,letterSpacing:".5px",textTransform:"uppercase",color:active?"#a78bfa":"#475569"}),
    section: {padding:"12px 14px",animation:"fi .3s ease"},
    card: {background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,marginBottom:8,overflow:"hidden"},
    pill: (active,color) => ({padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:active?(color||"#6366f1"):"rgba(255,255,255,.06)",color:active?"#fff":"#94a3b8",transition:"all .15s"}),
    input: {width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:"9px 12px",color:"#e2e8f0",fontSize:13},
    btn: (col) => ({padding:"10px 20px",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,background:col||"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",transition:"all .18s"}),
  };

  return (
    <>
      <style>{CSS}</style>
      <div style={S.wrap}>
        {/* HEADER */}
        <div style={S.header}>
          <h1 style={S.htitle}>İngilizce Çalışma</h1>
          <p style={S.hsub}>English Study App</p>
        </div>

        {/* TAB BAR */}
        <nav style={S.tabBar}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={S.tabBtn(tab===t.id)}>
            <span style={S.tabIcon}>{t.icon}</span>
            <span style={S.tabLabel(tab===t.id)}>{t.label}</span>
          </button>)}
        </nav>

        {/* ══ GÜNÜN DERSİ ══ */}
        {tab==="daily" && (() => {
          const dWords = getDailyWords(words, dailyDate);
          const isToday = dailyDate === todayStr();

          // Quiz başlatma
          const startDailyQuiz = () => {
            const qs = [...dWords].sort(()=>Math.random()-.5).map(w => {
              const wrongs = words.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3);
              const opts = [...wrongs.map(x=>x.tr), w.tr].sort(()=>Math.random()-.5);
              return {q:`"${w.en}" kelimesinin anlamı nedir?`, opts, ans:opts.indexOf(w.tr), en:w.en};
            });
            setDailyQuiz({cur:0, sel:null, score:0, done:false, qs});
            setDailyStep("quiz");
          };

          // INTRO ekranı
          if (dailyStep === "intro") return <div style={S.section}>
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:48,marginBottom:8}}>📅</div>
              <h2 style={{color:"#e2e8f0",fontSize:22,fontWeight:700,marginBottom:4}}>Günün Dersi</h2>
              <p style={{color:"#94a3b8",fontSize:13,marginBottom:6}}>{dailyDate} {isToday && "(bugün)"}</p>
              <p style={{color:"#64748b",fontSize:13,marginBottom:20}}>Bugün için seçilmiş 10 kelime hazır.<br/>Önce flashcard ile öğren, sonra quiz ile pekiştir.</p>
            </div>

            <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)",borderRadius:12,padding:14,marginBottom:16}}>
              <p style={{fontSize:11,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>📖 Bugünün Kelimeleri</p>
              {dWords.map((w,i) => <div key={w.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<9?"1px solid rgba(255,255,255,.04)":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:"#64748b",minWidth:18}}>{i+1}.</span>
                  <span style={{fontWeight:600,fontSize:14,color:"#e2e8f0"}}>{w.en}</span>
                  <button onClick={()=>speakWord(w.en,'en-US')} style={{background:"rgba(56,189,248,.15)",border:"1px solid rgba(56,189,248,.3)",borderRadius:6,padding:"2px 6px",fontSize:11,cursor:"pointer",color:"#38bdf8"}}>🔊</button>
                </div>
                <span style={{fontSize:12,color:"#a78bfa",textAlign:"right",maxWidth:180}}>{w.tr.split(',')[0]}</span>
              </div>)}
            </div>

            <button onClick={()=>{setDailyStep("flashcard");setDailyFcIdx(0);setDailyFcFlipped(false);}} style={{...S.btn(),width:"100%",padding:"12px 16px",fontSize:14}}>🃏 Flashcard ile Başla</button>
            <button onClick={startDailyQuiz} style={{...S.btn("#10b981"),width:"100%",padding:"10px 16px",fontSize:13,marginTop:8}}>🎯 Doğrudan Quiz'e Geç</button>

            {!isToday && <button onClick={()=>setDailyDate(todayStr())} style={{...S.btn("#334155"),width:"100%",padding:"8px",fontSize:12,marginTop:8}}>← Bugünün Dersine Dön</button>}
          </div>;

          // FLASHCARD ekranı
          if (dailyStep === "flashcard") {
            const w = dWords[dailyFcIdx];
            return <div style={S.section}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <button onClick={()=>setDailyStep("intro")} style={{...S.btn("#334155"),padding:"6px 10px",fontSize:12}}>← Geri</button>
                <span style={{fontSize:12,color:"#94a3b8"}}>Kelime {dailyFcIdx+1} / {dWords.length}</span>
              </div>

              <div onClick={()=>setDailyFcFlipped(f=>!f)} style={{background:"linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.15))",border:"1px solid rgba(99,102,241,.3)",borderRadius:20,padding:"28px 24px",textAlign:"center",cursor:"pointer",minHeight:240,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center"}}>
                {!dailyFcFlipped ? <>
                  <p style={{fontSize:28,fontWeight:700,fontFamily:"'Playfair Display',serif",color:"#e2e8f0",marginBottom:10}}>{w.en}</p>
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    <button onClick={(e)=>{e.stopPropagation();speakWord(w.en,'en-US');}} style={{background:"rgba(56,189,248,.15)",border:"1px solid rgba(56,189,248,.3)",borderRadius:8,padding:"5px 12px",fontSize:13,cursor:"pointer",color:"#38bdf8"}}>🔊 US</button>
                    <button onClick={(e)=>{e.stopPropagation();speakWord(w.en,'en-GB');}} style={{background:"rgba(167,139,250,.15)",border:"1px solid rgba(167,139,250,.3)",borderRadius:8,padding:"5px 12px",fontSize:13,cursor:"pointer",color:"#a78bfa"}}>🔊 UK</button>
                  </div>
                  <span style={{fontSize:11,color:"#64748b",background:"rgba(255,255,255,.06)",padding:"2px 10px",borderRadius:10,marginBottom:8}}>{w.category}</span>
                  <p style={{fontSize:11,color:"#64748b",letterSpacing:"1px",marginTop:4}}>Dokun ↕</p>
                </> : <>
                  <p style={{fontSize:20,fontWeight:700,color:"#a78bfa",marginBottom:8}}>{w.tr}</p>
                  {w.syn && <p style={{fontSize:12,color:"#38bdf8",marginBottom:8,fontStyle:"italic"}}>≈ {w.syn}</p>}
                  {w.usage && <div style={{background:"rgba(99,102,241,.15)",borderRadius:8,padding:"6px 12px",marginBottom:10,maxWidth:300}}>
                    <p style={{fontSize:11,color:"#c7d2fe"}}>{w.usage}</p>
                  </div>}
                  {(w.examples||[]).slice(0,2).map((ex,i)=><p key={i} style={{fontSize:12,color:"#64748b",fontStyle:"italic",lineHeight:1.6,maxWidth:280,marginBottom:4}}>{ex}</p>)}
                </>}
              </div>

              <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"center",alignItems:"center"}}>
                <button onClick={()=>{setDailyFcIdx(i=>Math.max(0,i-1));setDailyFcFlipped(false);}} disabled={dailyFcIdx===0} style={{...S.btn("#334155"),opacity:dailyFcIdx===0?0.5:1}}>‹ Önceki</button>
                {dailyFcIdx < dWords.length-1
                  ? <button onClick={()=>{setDailyFcIdx(i=>i+1);setDailyFcFlipped(false);}} style={S.btn()}>Sonraki ›</button>
                  : <button onClick={startDailyQuiz} style={S.btn("#10b981")}>Quiz'e Geç 🎯</button>
                }
              </div>
            </div>;
          }

          // QUIZ ekranı
          if (dailyStep === "quiz") {
            const q = dailyQuiz.qs[dailyQuiz.cur];
            if (dailyQuiz.done) return <div style={S.section}>
              <div style={{textAlign:"center",padding:"30px 10px"}}>
                <div style={{fontSize:56,marginBottom:10}}>{dailyQuiz.score >= 8 ? "🏆" : dailyQuiz.score >= 5 ? "👏" : "💪"}</div>
                <h2 style={{color:"#e2e8f0",fontSize:24,fontWeight:700,marginBottom:6}}>Ders Tamamlandı!</h2>
                <p style={{color:"#94a3b8",fontSize:14,marginBottom:20}}>Skorun: <strong style={{color:"#a78bfa",fontSize:18}}>{dailyQuiz.score} / {dailyQuiz.qs.length}</strong></p>
                <button onClick={()=>{setDailyStep("intro");}} style={{...S.btn(),padding:"10px 24px"}}>← Ana Ekrana Dön</button>
              </div>
            </div>;

            return <div style={S.section}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>Soru {dailyQuiz.cur+1} / {dailyQuiz.qs.length}</span>
                <span style={{fontSize:12,color:"#10b981",fontWeight:700}}>Skor: {dailyQuiz.score}</span>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,.05)",borderRadius:2,marginBottom:18,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${((dailyQuiz.cur)/dailyQuiz.qs.length)*100}%`,background:"linear-gradient(90deg,#6366f1,#a78bfa)",transition:"width .3s"}} />
              </div>
              <div style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.25)",borderRadius:12,padding:16,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <p style={{color:"#e2e8f0",fontSize:15,fontWeight:600}}>{q.q}</p>
                <button onClick={()=>speakWord(q.en,'en-US')} style={{background:"rgba(56,189,248,.15)",border:"1px solid rgba(56,189,248,.3)",borderRadius:8,padding:"5px 10px",fontSize:13,cursor:"pointer",color:"#38bdf8"}}>🔊</button>
              </div>
              {q.opts.map((opt,i) => {
                const isSel = dailyQuiz.sel === i;
                const isCorrect = i === q.ans;
                const showResult = dailyQuiz.sel !== null;
                let bg = "rgba(255,255,255,.04)", bd = "rgba(255,255,255,.08)";
                if (showResult && isCorrect) { bg = "rgba(16,185,129,.15)"; bd = "rgba(16,185,129,.5)"; }
                else if (showResult && isSel && !isCorrect) { bg = "rgba(239,68,68,.15)"; bd = "rgba(239,68,68,.5)"; }
                return <button key={i} onClick={()=>{
                  if (dailyQuiz.sel !== null) return;
                  const correct = i === q.ans;
                  setDailyQuiz(s => ({...s, sel:i, score: s.score + (correct?1:0)}));
                }} style={{width:"100%",textAlign:"left",padding:"12px 14px",marginBottom:8,background:bg,border:`1px solid ${bd}`,borderRadius:10,color:"#e2e8f0",fontSize:14,cursor:dailyQuiz.sel!==null?"default":"pointer"}}>{opt}</button>;
              })}
              {dailyQuiz.sel !== null && <button onClick={()=>{
                if (dailyQuiz.cur < dailyQuiz.qs.length-1) {
                  setDailyQuiz(s => ({...s, cur:s.cur+1, sel:null}));
                } else {
                  setDailyQuiz(s => ({...s, done:true}));
                }
              }} style={{...S.btn(),width:"100%",marginTop:10}}>{dailyQuiz.cur < dailyQuiz.qs.length-1 ? "Sonraki →" : "Sonuçları Gör"}</button>}
            </div>;
          }

          return null;
        })()}

        {/* ══ KELIMELER ══ */}
        {tab==="words" && <div style={S.section}>
          {/* search + add */}
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input style={{...S.input,flex:1}} placeholder="🔍 Kelime ara..." value={wSearch} onChange={e=>{setWSearch(e.target.value);setWPage(1);}} />
            <button onClick={()=>setShowAddWord(v=>!v)} style={{...S.btn(),padding:"9px 14px",fontSize:16}}>{showAddWord?"✕":"+"}</button>
          </div>

          {/* add form */}
          {showAddWord && <div style={{...S.card,padding:12,marginBottom:12,background:"rgba(99,102,241,.08)",borderColor:"rgba(99,102,241,.2)"}}>
            <p style={{fontSize:12,color:"#a78bfa",fontWeight:700,marginBottom:8}}>Yeni Kelime Ekle</p>
            {[["İngilizce","en"],["Türkçe","tr"],["Örnek cümle","example"]].map(([pl,k])=>
              <input key={k} style={{...S.input,marginBottom:6}} placeholder={pl}
                value={newWord[k]} onChange={e=>setNewWord(n=>({...n,[k]:e.target.value}))} />
            )}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              {["Fiil","Sıfat","İsim","Zarf","Phrasal Verbs","Günlük","Gelişmiş"].map(c=>
                <button key={c} onClick={()=>setNewWord(n=>({...n,category:c}))} style={S.pill(newWord.category===c)}>{c}</button>
              )}
            </div>
            <button onClick={addWord} style={S.btn()}>Ekle ✓</button>
          </div>}

          {/* cat filter */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {WORD_CATS.map(c=><button key={c} onClick={()=>{setWCat(c);setWPage(1);}} style={S.pill(wCat===c)}>{c}</button>)}
          </div>

          {/* word list */}
          {pageWords.map(w => <div key={w.id} style={S.card}>
            <div onClick={()=>setWOpen(wOpen===w.id?null:w.id)} style={{padding:"10px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:700,fontSize:14,color:"#e2e8f0"}}>{w.en}</span>
                <button onClick={(e)=>{e.stopPropagation();speakWord(w.en,'en-US');}} title="US telaffuz" style={{background:"rgba(56,189,248,.15)",border:"1px solid rgba(56,189,248,.3)",borderRadius:6,padding:"2px 6px",fontSize:11,cursor:"pointer",color:"#38bdf8"}}>🔊 US</button>
                <button onClick={(e)=>{e.stopPropagation();speakWord(w.en,'en-GB');}} title="UK telaffuz" style={{background:"rgba(167,139,250,.15)",border:"1px solid rgba(167,139,250,.3)",borderRadius:6,padding:"2px 6px",fontSize:11,cursor:"pointer",color:"#a78bfa"}}>🔊 UK</button>
                <span style={{fontSize:11,color:"#94a3b8",marginLeft:4,background:"rgba(255,255,255,.06)",padding:"2px 7px",borderRadius:10}}>{w.category}</span>
              </div>
            </div>
            {wOpen===w.id && <div style={{padding:"0 12px 12px",animation:"fi .2s ease"}}>
              <p style={{color:"#a78bfa",fontSize:14,fontWeight:600,marginBottom:6}}>{w.tr}</p>
              {w.syn && <div style={{marginBottom:8}}>
                <span style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:".5px"}}>Eş anlamlı · </span>
                <span style={{fontSize:12,color:"#38bdf8",fontStyle:"italic"}}>{w.syn}</span>
              </div>}
              {w.usage && <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",borderRadius:8,padding:"6px 10px",marginBottom:8}}>
                <span style={{fontSize:10,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:".5px"}}>Kullanım · </span>
                <span style={{fontSize:12,color:"#c7d2fe"}}>{w.usage}</span>
              </div>}
              {(w.examples||[w.example]).filter(Boolean).map((ex,i)=><p key={i} style={{fontSize:12,color:"#94a3b8",fontStyle:"italic",lineHeight:1.6,paddingLeft:10,borderLeft:"2px solid rgba(99,102,241,.3)",marginBottom:5}}>{ex}</p>)}
              <div style={{display:"flex",justifyContent:"flex-end",marginTop:6}}>
                <button onClick={()=>deleteWord(w.id)} style={{...S.btn("#ef4444"),padding:"5px 10px",fontSize:12}}>🗑</button>
              </div>
            </div>}
          </div>)}

          {/* pagination */}
          {totalPages > 1 && <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:10}}>
            <button onClick={()=>setWPage(p=>Math.max(1,p-1))} style={S.pill(false)} disabled={wPage===1}>‹</button>
            <span style={{fontSize:12,color:"#94a3b8",padding:"4px 8px"}}>{wPage}/{totalPages}</span>
            <button onClick={()=>setWPage(p=>Math.min(totalPages,p+1))} style={S.pill(false)} disabled={wPage===totalPages}>›</button>
          </div>}
        </div>}

        {/* ══ METİNLER ══ */}
        {tab==="texts" && <div style={S.section}>
          {/* Vocab popup */}
          {vocabPopup && <div onClick={()=>setVocabPopup(null)} style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.55)",padding:"20px"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#1e1e35",border:"1px solid rgba(99,102,241,.4)",borderRadius:16,padding:"18px 20px",maxWidth:300,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
              <p style={{fontSize:17,fontWeight:800,color:"#a78bfa",marginBottom:6}}>{vocabPopup.word}</p>
              <p style={{fontSize:14,color:"#cbd5e1",lineHeight:1.6}}>{vocabPopup.meaning}</p>
              <button onClick={()=>setVocabPopup(null)} style={{...S.btn(),marginTop:12,width:"100%",padding:"8px"}}>Tamam</button>
            </div>
          </div>}

          {TEXTS_DATA.map(t=>{
            // Build highlighted body
            const vocab = t.vocab || {};
            const vocabKeys = Object.keys(vocab);
            const renderBody = (text) => {
              if(!vocabKeys.length) return <p style={{fontSize:13,lineHeight:1.8,color:"#cbd5e1",whiteSpace:"pre-line",marginBottom:16}}>{text}</p>;
              const regex = new RegExp(`\\b(${vocabKeys.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')})\\b`,'gi');
              const parts = text.split(regex);
              return <p style={{fontSize:13,lineHeight:1.9,color:"#cbd5e1",whiteSpace:"pre-wrap",marginBottom:16}}>
                {parts.map((part,pi)=>{
                  const lower = part.toLowerCase();
                  const match = vocabKeys.find(k=>k.toLowerCase()===lower);
                  if(match) return <span key={pi} onClick={()=>setVocabPopup({word:part,meaning:vocab[match]})}
                    style={{color:"#fbbf24",borderBottom:"1px dotted #fbbf24",cursor:"pointer",fontWeight:600}}>{part}</span>;
                  return <span key={pi}>{part}</span>;
                })}
              </p>;
            };
            return <div key={t.id} style={S.card}>
              <div style={{padding:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div onClick={()=>setTOpen(tOpen===t.id?null:t.id)} style={{flex:1,cursor:"pointer"}}>
                  <span style={{fontSize:11,color:"#6366f1",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>{t.topic}</span>
                  <p style={{fontWeight:700,fontSize:14,color:"#e2e8f0",marginTop:2}}>{t.title}</p>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0,marginLeft:8}}>
                  {t.bodyTr && <button onClick={e=>{e.stopPropagation();setTTrOpen(tTrOpen===t.id?null:t.id);if(tOpen!==t.id)setTOpen(t.id);}}
                    style={{padding:"4px 10px",border:`1px solid ${tTrOpen===t.id?"#a78bfa":"rgba(167,139,250,.3)"}`,borderRadius:8,background:tTrOpen===t.id?"rgba(167,139,250,.18)":"transparent",color:tTrOpen===t.id?"#a78bfa":"#64748b",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:".3px"}}>
                    TR
                  </button>}
                  <span onClick={()=>setTOpen(tOpen===t.id?null:t.id)} style={{color:"#64748b",fontSize:16,cursor:"pointer"}}>{tOpen===t.id?"▲":"▼"}</span>
                </div>
              </div>
              {tOpen===t.id && <div style={{padding:"0 12px 12px",animation:"fi .25s ease"}}>
                {/* Turkish translation panel */}
                {tTrOpen===t.id && t.bodyTr && <div style={{background:"rgba(167,139,250,.07)",border:"1px solid rgba(167,139,250,.2)",borderRadius:12,padding:"12px 14px",marginBottom:14,animation:"fi .2s ease"}}>
                  <p style={{fontSize:10,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>🇹🇷 Türkçe Çeviri</p>
                  <p style={{fontSize:13,lineHeight:1.85,color:"#c4b5fd",whiteSpace:"pre-wrap"}}>{t.bodyTr}</p>
                </div>}
                {vocabKeys.length>0 && <p style={{fontSize:10,color:"#f59e0b",marginBottom:10,background:"rgba(251,191,36,.07)",padding:"5px 10px",borderRadius:7,border:"1px solid rgba(251,191,36,.2)"}}>
                  💡 Sarı ile vurgulanan kelimelere tıklayarak anlamını görebilirsin
                </p>}
                {renderBody(t.body)}

                {t.mc && t.mc.length > 0 && <>
                  <p style={{fontSize:11,fontWeight:700,color:"#38bdf8",marginBottom:10,textTransform:"uppercase",letterSpacing:"1px"}}>🎯 Çoktan Seçmeli</p>
                  {t.mc.map((q,qi)=>{
                    const selKey = `mc-${t.id}-${qi}`;
                    const sel = tAnswers[selKey];
                    return <div key={qi} style={{marginBottom:14,background:"rgba(255,255,255,.03)",borderRadius:10,padding:"10px 12px",border:"1px solid rgba(255,255,255,.06)"}}>
                      <p style={{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:8,lineHeight:1.5}}>{qi+1}. {q.q}</p>
                      {q.opts.map((o,oi)=>{
                        let bg="rgba(255,255,255,.04)",border="rgba(255,255,255,.08)",col="#cbd5e1";
                        if(sel!==undefined){
                          if(oi===q.ans){bg="rgba(16,185,129,.15)";border="#10b981";col="#34d399";}
                          else if(oi===sel&&oi!==q.ans){bg="rgba(239,68,68,.12)";border="#ef4444";col="#f87171";}
                        }
                        return <button key={oi} onClick={()=>{if(sel===undefined)setTAnswers(a=>({...a,[selKey]:oi}));}}
                          style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",marginBottom:5,background:bg,border:`1px solid ${border}`,borderRadius:8,cursor:sel!==undefined?"default":"pointer",textAlign:"left",color:col,fontFamily:"inherit",fontSize:12,transition:"all .15s"}}>
                          <span style={{minWidth:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,background:"rgba(255,255,255,.06)",fontSize:10,fontWeight:700,color:"#64748b",flexShrink:0}}>{String.fromCharCode(65+oi)}</span>
                          {o}
                        </button>;
                      })}
                      {sel!==undefined && <p style={{fontSize:11,color:sel===q.ans?"#34d399":"#f87171",marginTop:4,fontWeight:600}}>{sel===q.ans?"✅ Doğru!":"❌ Yanlış — doğru cevap: "+String.fromCharCode(65+q.ans)}</p>}
                    </div>;
                  })}
                </>}

                {t.questions && t.questions.length > 0 && <>
                  <p style={{fontSize:11,fontWeight:700,color:"#a78bfa",marginBottom:8,textTransform:"uppercase",letterSpacing:"1px",marginTop:6}}>✏️ Açık Uçlu Sorular</p>
                  {t.questions.map((q,i)=><div key={i} style={{marginBottom:10}}>
                    <p style={{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:4}}>{i+1}. {q.q}</p>
                    <textarea rows={2} style={{...S.input,resize:"none",marginBottom:4}} placeholder="Cevabını yaz..."
                      value={tAnswers[`open-${t.id}-${i}`]||""} onChange={e=>setTAnswers(a=>({...a,[`open-${t.id}-${i}`]:e.target.value}))} />
                    <button onClick={()=>setTRevealed(r=>({...r,[`${t.id}-${i}`]:!r[`${t.id}-${i}`]}))} style={S.pill(tRevealed[`${t.id}-${i}`],"#10b981")}>
                      {tRevealed[`${t.id}-${i}`]?"Gizle":"Cevabı Gör"}
                    </button>
                    {tRevealed[`${t.id}-${i}`] && <p style={{fontSize:12,color:"#34d399",marginTop:6,padding:"6px 10px",background:"rgba(16,185,129,.07)",borderRadius:8}}>{q.a}</p>}
                  </div>)}
                </>}
              </div>}
            </div>;
          })}
        </div>}

        {/* ══ GRAMER ══ */}
        {tab==="grammar" && <div style={S.section}>
          {GRAMMAR_DATA.map(sec=><div key={sec.id} style={{...S.card,marginBottom:10}}>
            <div onClick={()=>{setGOpen(gOpen===sec.id?null:sec.id);setGSubOpen(null);}} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{sec.icon}</span>
              <span style={{flex:1,fontWeight:700,fontSize:14,color:"#e2e8f0"}}>{sec.title}</span>
              <span style={{fontSize:11,color:sec.color,fontWeight:700}}>{sec.subs.length} konu</span>
              <span style={{color:"#64748b"}}>{gOpen===sec.id?"▲":"▼"}</span>
            </div>
            {gOpen===sec.id && <div style={{borderTop:"1px solid rgba(255,255,255,.06)"}}>
              {sec.subs.map((sub,si)=><div key={si} style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                <div onClick={()=>setGSubOpen(gSubOpen===`${sec.id}-${si}`?null:`${sec.id}-${si}`)} style={{padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:600,color:"#cbd5e1"}}>{sub.t}</span>
                  <span style={{color:"#64748b",fontSize:12}}>{gSubOpen===`${sec.id}-${si}`?"▲":"▼"}</span>
                </div>
                {gSubOpen===`${sec.id}-${si}` && <div style={{padding:"8px 14px 14px",animation:"fi .2s ease"}}>
                  {sub.r && <div style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                    <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.6}}>{sub.r}</p>
                  </div>}
                  {sub.s && <p style={{fontSize:12,fontFamily:"monospace",color:sec.color,background:"rgba(0,0,0,.3)",padding:"5px 10px",borderRadius:7,marginBottom:8}}>{sub.s}</p>}
                  <p style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Örnekler</p>
                  {sub.ex.map((ex,ei)=><div key={ei} style={{padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                    <p style={{fontSize:13,color:"#e2e8f0",lineHeight:1.6}}>{ex}</p>
                  </div>)}
                  {sub.tip && <div style={{marginTop:10,background:`rgba(${sec.color==="#6366f1"?"99,102,241":sec.color==="#10b981"?"16,185,129":sec.color==="#f59e0b"?"245,158,11":"139,92,246"},.08)`,border:`1px solid ${sec.color}30`,borderRadius:8,padding:"7px 10px"}}>
                    <span style={{fontSize:11,color:sec.color,fontWeight:700}}>💡 İpucu: </span>
                    <span style={{fontSize:12,color:"#94a3b8"}}>{sub.tip}</span>
                  </div>}
                </div>}
              </div>)}
            </div>}
          </div>)}
        </div>}

        {/* ══ NOTLARIM ══ */}
        {tab==="notes" && <div style={S.section}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{fontSize:13,color:"#94a3b8"}}>{notes.length} not</p>
            <button onClick={()=>{setNoteEdit("new");setNoteForm({title:"",text:""}); }} style={S.btn()}>+ Yeni Not</button>
          </div>
          {noteEdit && <div style={{...S.card,padding:12,marginBottom:12,background:"rgba(99,102,241,.07)",borderColor:"rgba(99,102,241,.2)"}}>
            <input style={{...S.input,marginBottom:8}} placeholder="Başlık..." value={noteForm.title} onChange={e=>setNoteForm(n=>({...n,title:e.target.value}))} />
            <textarea rows={5} style={{...S.input,resize:"vertical"}} placeholder="Not içeriği..." value={noteForm.text} onChange={e=>setNoteForm(n=>({...n,text:e.target.value}))} />
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={()=>{
                if (!noteForm.title) return;
                if (noteEdit==="new") setNotes(ns=>[...ns,{id:Date.now(),...noteForm}]);
                else setNotes(ns=>ns.map(n=>n.id===noteEdit?{...n,...noteForm}:n));
                setNoteEdit(null);
              }} style={S.btn()}>Kaydet</button>
              <button onClick={()=>setNoteEdit(null)} style={S.btn("#334155")}>İptal</button>
            </div>
          </div>}
          {notes.map(n=><div key={n.id} style={S.card}>
            <div style={{padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1,marginRight:8}}>
                <p style={{fontWeight:700,fontSize:14,color:"#a78bfa",marginBottom:4}}>{n.title}</p>
                <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.65,whiteSpace:"pre-line"}}>{n.text}</p>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <button onClick={()=>{setNoteEdit(n.id);setNoteForm({title:n.title,text:n.text});}} style={{...S.btn("#334155"),padding:"4px 8px",fontSize:11}}>✏️</button>
                <button onClick={()=>setNotes(ns=>ns.filter(x=>x.id!==n.id))} style={{...S.btn("#ef4444"),padding:"4px 8px",fontSize:11}}>🗑</button>
              </div>
            </div>
          </div>)}
        </div>}

        {/* ══ FLASHCARD ══ */}
        {tab==="flashcard" && <div style={S.section}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {WORD_CATS.map(c=><button key={c} onClick={()=>{setFcCat(c);setFcIdx(0);setFcFlipped(false);}} style={S.pill(fcCat===c)}>{c}</button>)}
          </div>
          {fcWords.length === 0 ? <p style={{color:"#64748b",textAlign:"center",marginTop:40}}>Bu kategoride kelime yok.</p> :
          <div>
            <div onClick={()=>setFcFlipped(f=>!f)} style={{background:"linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.15))",border:"1px solid rgba(99,102,241,.3)",borderRadius:20,padding:"28px 24px",textAlign:"center",cursor:"pointer",minHeight:220,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",animation:"pop .2s ease"}}>
              {!fcFlipped ? <>
                <p style={{fontSize:26,fontWeight:700,fontFamily:"'Playfair Display',serif",color:"#e2e8f0",marginBottom:8}}>{fcWords[fcIdx]?.en}</p>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <button onClick={(e)=>{e.stopPropagation();speakWord(fcWords[fcIdx].en,'en-US');}} style={{background:"rgba(56,189,248,.15)",border:"1px solid rgba(56,189,248,.3)",borderRadius:8,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"#38bdf8"}}>🔊 US</button>
                  <button onClick={(e)=>{e.stopPropagation();speakWord(fcWords[fcIdx].en,'en-GB');}} style={{background:"rgba(167,139,250,.15)",border:"1px solid rgba(167,139,250,.3)",borderRadius:8,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"#a78bfa"}}>🔊 UK</button>
                </div>
                <span style={{fontSize:11,color:"#64748b",background:"rgba(255,255,255,.06)",padding:"2px 10px",borderRadius:10,marginBottom:8}}>{fcWords[fcIdx]?.category}</span>
                <p style={{fontSize:11,color:"#64748b",letterSpacing:"1px",marginTop:4}}>Dokunarak çevir ↕</p>
              </> : <>
                <p style={{fontSize:19,fontWeight:700,color:"#a78bfa",marginBottom:6}}>{fcWords[fcIdx]?.tr}</p>
                {fcWords[fcIdx]?.syn && <p style={{fontSize:12,color:"#38bdf8",marginBottom:8,fontStyle:"italic"}}>≈ {fcWords[fcIdx].syn}</p>}
                {fcWords[fcIdx]?.usage && <div style={{background:"rgba(99,102,241,.15)",borderRadius:8,padding:"5px 12px",marginBottom:10,maxWidth:300}}>
                  <p style={{fontSize:11,color:"#c7d2fe"}}>{fcWords[fcIdx].usage}</p>
                </div>}
                {(fcWords[fcIdx]?.examples||[]).slice(0,2).map((ex,i)=><p key={i} style={{fontSize:12,color:"#64748b",fontStyle:"italic",lineHeight:1.6,maxWidth:280,marginBottom:3}}>{ex}</p>)}
                <p style={{fontSize:11,color:"#64748b",marginTop:8,letterSpacing:"1px"}}>Dokunarak geri çevir ↕</p>
              </>}
            </div>
            <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"center",alignItems:"center"}}>
              <button onClick={()=>nextFc(-1)} style={S.btn("#334155")}>‹ Önceki</button>
              <span style={{fontSize:12,color:"#64748b",minWidth:60,textAlign:"center"}}>{fcIdx+1}/{fcWords.length}</span>
              <button onClick={()=>nextFc(1)} style={S.btn()}>Sonraki ›</button>
            </div>
          </div>}
        </div>}

        {/* ══ QUIZ ══ */}
        {tab==="quiz" && <div style={S.section}>
          {!quiz.on ? <>
            {/* Quiz type toggle */}
            <div style={{display:"flex",gap:8,marginBottom:14,justifyContent:"center"}}>
              <button onClick={()=>setQType("word")} style={S.pill(qType==="word","#6366f1")}>📚 Kelime Quizi</button>
              <button onClick={()=>setQType("grammar")} style={S.pill(qType==="grammar","#10b981")}>🎓 Gramer Quizi</button>
            </div>

            {qType==="word" && <>
              <p style={{fontSize:12,color:"#94a3b8",marginBottom:8,textAlign:"center"}}>Kategori seç:</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:16}}>
                {WORD_CATS.map(c=><button key={c} onClick={()=>setQWordCat(c)} style={S.pill(qWordCat===c)}>{c}</button>)}
              </div>
            </>}

            {qType==="grammar" && <>
              <p style={{fontSize:12,color:"#94a3b8",marginBottom:8,textAlign:"center"}}>Gramer kategorisi seç:</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:16}}>
                {Object.keys(GRAMMAR_QUIZ).map(c=><button key={c} onClick={()=>setQGramCat(c)} style={S.pill(qGramCat===c,"#10b981")}>{c}</button>)}
              </div>
              <div style={{background:"rgba(16,185,129,.06)",border:"1px solid rgba(16,185,129,.15)",borderRadius:12,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>
                <p style={{fontSize:12,color:"#6ee7b7"}}>
                  <strong>{qGramCat}</strong> — {GRAMMAR_QUIZ[qGramCat]?.length} soru havuzu, {Math.min(10,GRAMMAR_QUIZ[qGramCat]?.length||0)} soru sorulacak
                </p>
              </div>
            </>}

            <div style={{textAlign:"center"}}>
              <div style={{fontSize:44,marginBottom:8}}>🎯</div>
              <button onClick={startQuiz} style={{...S.btn("linear-gradient(135deg,#4f46e5,#7c3aed)"),padding:"12px 40px",fontSize:15,boxShadow:"0 6px 24px rgba(99,102,241,.4)"}}>
                Başla 🚀
              </button>
            </div>
          </> : quiz.done ? <>
            {/* Results */}
            <div style={{textAlign:"center",animation:"fi .4s ease",padding:"16px 0"}}>
              <div style={{fontSize:52,marginBottom:8}}>{quiz.score>=quiz.qs.length*.8?"🏆":quiz.score>=quiz.qs.length*.5?"👍":"💪"}</div>
              <p style={{fontSize:32,fontWeight:800,color:"#10b981",marginBottom:4}}>{quiz.score}/{quiz.qs.length}</p>
              <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>
                {quiz.score===quiz.qs.length?"Mükemmel! Hepsi doğru!":quiz.score>=quiz.qs.length*.8?"Harika! Çok iyi gidiyorsun.":quiz.score>=quiz.qs.length*.5?"İyi! Biraz daha pratik lazım.":"Daha çok çalışalım! Başarabilirsin."}
              </p>
              <div style={{marginBottom:20,textAlign:"left"}}>
                {quiz.ans.map((a,i)=><div key={i} style={{display:"flex",gap:8,padding:"6px 10px",background:"rgba(255,255,255,.03)",borderRadius:8,marginBottom:4,borderLeft:`3px solid ${a.correct?"#10b981":"#ef4444"}`}}>
                  <span style={{fontSize:14}}>{a.correct?"✅":"❌"}</span>
                  <div style={{flex:1}}>
                    <p style={{fontSize:12,color:"#94a3b8"}}>{a.q}</p>
                    {!a.correct && <p style={{fontSize:11,color:"#ef4444"}}>Senin cevabın: {a.given}</p>}
                    <p style={{fontSize:11,color:"#10b981"}}>Doğru: {a.right}</p>
                  </div>
                </div>)}
              </div>
              <button onClick={()=>setQuiz({on:false,cur:0,sel:null,score:0,ans:[],done:false,qs:[]})} style={S.btn()}>Tekrar Oyna 🔄</button>
            </div>
          </> : <>
            {/* Active quiz */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:11,color:"#64748b",fontWeight:700}}>SORU {quiz.cur+1}/{quiz.qs.length}</span>
                <span style={{fontSize:11,color:"#10b981",fontWeight:700}}>✓ {quiz.score} doğru</span>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,.08)",borderRadius:4}}>
                <div style={{height:"100%",width:`${((quiz.cur+1)/quiz.qs.length)*100}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:4,transition:"width .3s"}} />
              </div>
            </div>

            {/* Question */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,padding:"16px",marginBottom:12}}>
              <p style={{fontSize:16,fontWeight:600,color:"#e2e8f0",lineHeight:1.6}}>{quiz.qs[quiz.cur]?.q}</p>
            </div>

            {/* Options */}
            {quiz.qs[quiz.cur]?.opts.map((o,i)=>{
              const cur = quiz.qs[quiz.cur];
              let bg = "rgba(255,255,255,.05)";
              let border = "rgba(255,255,255,.1)";
              let color = "#e2e8f0";
              if (quiz.sel !== null) {
                if (i === cur.ans) { bg="rgba(16,185,129,.15)"; border="#10b981"; color="#34d399"; }
                else if (i === quiz.sel && i !== cur.ans) { bg="rgba(239,68,68,.15)"; border="#ef4444"; color="#f87171"; }
              }
              return <button key={i} onClick={()=>selectOpt(i)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 14px",marginBottom:7,background:bg,border:`1px solid ${border}`,borderRadius:10,cursor:quiz.sel!==null?"default":"pointer",textAlign:"left",color,fontFamily:"inherit",fontSize:13,fontWeight:500,transition:"all .15s"}}>
                <span style={{minWidth:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:11,background:"rgba(255,255,255,.08)",fontSize:11,fontWeight:700,color:"#64748b"}}>{String.fromCharCode(65+i)}</span>
                {o}
              </button>;
            })}

            {/* Explanation after answering */}
            {quiz.sel!==null && <div style={{marginTop:10,padding:"10px 14px",borderRadius:10,background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)",animation:"fi .3s ease"}}>
              {quiz.qs[quiz.cur]?.exp && <>
                <p style={{fontSize:11,color:"#6366f1",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Açıklama</p>
                <p style={{fontSize:13,color:"#c7d2fe",lineHeight:1.6}}>{quiz.qs[quiz.cur].exp}</p>
              </>}
              <button onClick={nextQ} style={{...S.btn(),marginTop:10,width:"100%"}}>
                {quiz.cur+1 >= quiz.qs.length ? "Sonuçları Gör 🏆" : "Sonraki Soru →"}
              </button>
            </div>}
          </>}
        </div>}

      </div>

    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
